,"githubSlug":"hellomy20_s01e02","audioFolder":"../audio","viAudioFile":"hellomy20_s01e02_VI_Dub.mp3","koAudioFile":"hellomy20_s01e02_KO_Live.mp3","source":"Subtitle Dub VI + KO Live Cut Studio","blocks":[{"id":0,"readerNo":1,"displayNo":1,"n":1,"type":"narration","text":"Xin Chào Tuổi Hai Mươi S01E02\n청춘시대\nHello My Twenties S01E02","sourceUid":"ko-mql0e9i4-836","sourceNo":1},{"id":1,"readerNo":2,"displayNo":1,"n":1,"type":"dialogue","text":"NỘI QUY CỦA BELLE EPOQUE CẤM ĐƯA ĐÀN ÔNG VÀO NHÀ\nHOUSE RULES: NO BOYFRIENDS ALLOWED","sourceUid":"merged-mql0kr2q-3727","sourceNo":1},{"id":2,"readerNo":3,"displayNo":4,"n":4,"type":"narration","text":"[Nhạc nền bắt đầu]\n[Tiếng máy nướng bánh mì nhổ bánh mì]\n[Nhạc chủ đề chính kết thúc]\n[배경 음악 시작]\n[토스터기 빵 뱉는 소리]\n[메인 주제 음악 끝]\n[Background music starts]\n[Sound of toaster spitting bread]\n[Main theme music ends]","sourceUid":"merged-mql0mnww-3729","sourceNo":4},{"id":3,"readerNo":4,"displayNo":2,"n":2,"type":"narration","text":"Có hai kiểu bí mật.\n(유은재) 비밀에는 두 가지가 있다\nThere are two types of secrets,","sourceUid":"merged-mql0mui7-3730","sourceNo":2},{"id":4,"readerNo":5,"displayNo":3,"n":3,"type":"narration","text":"Bí mật có thể bật mí và bí mật chôn xuống mồ.\n말할 수 있는 비밀과 말할 수 없는 비밀\none you can share, and the other you can't.","sourceUid":"merged-mql0nq7y-3734","sourceNo":3},{"id":5,"readerNo":6,"displayNo":5,"n":5,"type":"narration","text":"Mọi người muốn nghe bí mật thật sự của mị không?\n내 진짜 비밀을 말해줄까?\nCan I tell you a true secret of mine?","sourceUid":"merged-mql0nx1c-3735","sourceNo":5},{"id":6,"readerNo":7,"displayNo":6,"n":6,"type":"narration","text":"Tôi có một bí mật tuyệt đối không thể nói ra.\n(유은재) 나는 절대로 말할 수 없는 비밀이 하나 있다\nI have a secret which I can never tell.","sourceUid":"merged-mql0o4ag-3736","sourceNo":6},{"id":7,"readerNo":8,"displayNo":8,"n":8,"type":"narration","text":"Thật ra…\nem có thể nhìn thấy ma.\n나 사실은... 귀신 본다\nI see ghosts. Actually, I...","sourceUid":"merged-mql0ofgo-3737","sourceNo":8},{"id":8,"readerNo":9,"displayNo":9,"n":9,"type":"narration","text":"Tôi từng giết người.\n(유은재) 나는... 사람을 죽였다\nI killed someone.","sourceUid":"merged-mql0ookh-3738","sourceNo":9},{"id":9,"readerNo":10,"displayNo":11,"n":11,"type":"narration","text":"Cái gì? Cậu nhìn thấy gì cơ?\n에? 뭐 본다고?\nWhat do you see?\nWhat?","sourceUid":"merged-mql0oz3h-3739","sourceNo":11},{"id":10,"readerNo":11,"displayNo":12,"n":12,"type":"narration","text":"Ma.\n귀신\nGhosts.","sourceUid":"merged-mql0p5fv-3740","sourceNo":12},{"id":11,"readerNo":12,"displayNo":15,"n":15,"type":"narration","text":"Thật á? Từ khi nào? Thật ra là vì…\n(정예은) 진짜? 언제부터? 그게 사실은...\nReally? Since when? Actually...","sourceUid":"merged-mql0q0ph-3741","sourceNo":15},{"id":12,"readerNo":13,"displayNo":16,"n":16,"type":"narration","text":"Ngay bây giờ cũng có một con ở đằng kia.\n지금 저기도 하나 있어\nthere is one over there now.","sourceUid":"merged-mql0s2eq-3742","sourceNo":16},{"id":13,"readerNo":14,"displayNo":21,"n":21,"type":"narration","text":"Tôi từng giết người.\nVậy thì chắc là người\nchị đã giết lúc đó.\n나는...사람을 죽인 적이 있다\n\n아 그러면...\n그때 내가 죽인 게 맞나 보다...\nI have killed someone before.\nkilled then. Then I must have...","sourceUid":"merged-mql2lu67-3750","sourceNo":21},{"id":14,"readerNo":15,"displayNo":20,"n":20,"type":"narration","text":"Có một người mà chị rất muốn họ chết.\n난 죽었으면 하는 사람이 있는데...\nI have someone I am wishing to be dead.","sourceUid":"merged-mql0tg9f-3745","sourceNo":20},{"id":15,"readerNo":16,"displayNo":28,"n":28,"type":"narration","text":"[tiếng chó sủa]\n[Nhạc nền thô ráp bắt đầu]\n[Nhạc nền thô ráp kết thúc]\n[Nhạc nền kết thúc]\n[개가 짖는다]\n[거친 배경 음악 시작]\n[거친 배경 음악 끝]\n[배경 음악 끝]\n[dog barks]\n[Rough background music starts]\n[Rough background music ends]\n[Background music ends]","sourceUid":"merged-mql0tpwh-3746","sourceNo":28},{"id":16,"readerNo":17,"displayNo":21,"n":21,"type":"narration","text":"Chắc xạo thôi.\n(정예은) 거짓말이야. 거짓말\nThat's a lie.","sourceUid":"merged-mql0ujd6-3747","sourceNo":21},{"id":17,"readerNo":18,"displayNo":30,"n":30,"type":"narration","text":"[ngáy]\n[코를 골다]\n[snoring]","sourceUid":"ko-mql0e9i4-865","sourceNo":30},{"id":18,"readerNo":19,"displayNo":22,"n":22,"type":"narration","text":"Song Ji Won nói dối đâu phải một hai lần.\n송지원 거짓말에 한두 번 속아봤나?\nShe had lied several times before.","sourceUid":"merged-mql0v2w3-3748","sourceNo":22},{"id":19,"readerNo":20,"displayNo":24,"n":24,"type":"narration","text":"Là Song Chém Gió, Song Dối Trá, Song Nổ. Cậu ấy là ai cơ chứ?\n송지원이 누구야\n송구라, 송공갈, 송뻥\nThink of her nicknames. Lying Song, fib Song, bluff Song.","sourceUid":"merged-mql2t023-3751","sourceNo":24},{"id":20,"readerNo":21,"displayNo":25,"n":25,"type":"narration","text":"Cậu ấy nói mười phần thì bảy phần là xạo rồi.\n뱉은 말의 7할은 거짓말이라고 봐야 돼\nSeventy percent of the story are lies.","sourceUid":"merged-mql2ts41-3752","sourceNo":25},{"id":21,"readerNo":22,"displayNo":27,"n":27,"type":"narration","text":"Chắc thấy lừa người khác vui lắm. Nhìn thấy ma?\n칫!\n매번 속아주니까 아주 재미 들린 거야\n귀신을 봐?\nSeeing ghosts?\nNow she is enjoying fooling everyone.","sourceUid":"merged-mql2umni-3754","sourceNo":27},{"id":22,"readerNo":23,"displayNo":28,"n":28,"type":"narration","text":"Thà bảo Song Joong Ki là anh họ thì mình còn tin.\n차라리 송중기가 사촌오빠라는 말을 믿고 말지\nI'd rather believe that Song Joong-ki is her cousin.","sourceUid":"merged-mql2uy3h-3755","sourceNo":28},{"id":23,"readerNo":24,"displayNo":39,"n":39,"type":"narration","text":"Nói dối. \n\nChắc chắn là thế.\n\n[Thở dài]\n거짓말이야 거짓말이어야 돼\n\n[한숨 쉰다]\nThat's a lie. It should be.\n\n[Sighs]","sourceUid":"merged-mql2vrqk-3756","sourceNo":39},{"id":24,"readerNo":25,"displayNo":31,"n":31,"type":"narration","text":"Nếu là thật thì sợ quá.\n진짜면 무섭잖아\nIt would be scary if it is true.","sourceUid":"merged-mql2wdra-3757","sourceNo":31},{"id":25,"readerNo":26,"displayNo":32,"n":32,"type":"narration","text":"Hồi nãy nghe đâu có sợ mà sao giờ lại vậy nhỉ?\n들을 땐 하나도 안 무섭더니 왜 지금서 생각나는 거야?\nIf it was okay earlier then why is it bothering me now?","sourceUid":"merged-mql2wobo-3758","sourceNo":32},{"id":26,"readerNo":27,"displayNo":33,"n":33,"type":"narration","text":"Ngủ ngon quá cơ. Cái đồ tội lỗi.\n[코를 골다]\n잘도 자네...\n죄 많은 인간\nSleeping like a child. She should feel guilty.","sourceUid":"merged-mql2xmb1-3760","sourceNo":33},{"id":27,"readerNo":28,"displayNo":34,"n":34,"type":"narration","text":"Làm người khác chả ngủ được.\n남은 잠 못 자게 해놓고\nI can't even sleep.","sourceUid":"merged-mql2zpyn-3761","sourceNo":34},{"id":28,"readerNo":29,"displayNo":46,"n":46,"type":"narration","text":"Vừa có tiếng gì thế? Gì vậy? Ôi, thôi dừng đi. Ngủ đi. Chỉ là nói xạo thôi. Ngủ thôi nào. Mình không sợ gì cả. Ngủ nào. Buồn ngủ lắm rồi. Ngủ thôi. Buồn ngủ lắm rồi. Ngủ thôi. Sao không thở nữa? Tỉnh rồi sao? Cậu ấy đang làm gì vậy?\n\n[Ngáy] [Nhạc nền bắt đầu]\n아... 그만하고... 자자 거짓말이야... 자자... 하나도 안 무섭다. 자자... 잠이 쏟아진다... 자자... 나는 졸립다. 자자... 뭐야? 왜 숨을 안 쉬어? 깼나? 뭐 하는 거야? 방금 무슨 소리 났지?\n\n[코를 골다]\n[배경 음악 시작]\nLet's sleep.\nI should get over this\nand get some sleep. It's a lie.\nI am not scared at all. Sleep.\nI am so sleepy.\nSleep.\nWhat now?\nWhy isn't she breathing?\nIs she awake?\nWhat is she doing?\nWhat was that sound?\n\n[Snoring]\n[Background music starts]","sourceUid":"merged-mql377t1-3765","sourceNo":46},{"id":29,"readerNo":30,"displayNo":60,"n":60,"type":"narration","text":"Cậu ấy động đậy sao?\nSao vậy?\nĐi đâu chứ?\nCó nên kiểm tra không?\nMình không thể.\nLỡ chạm mắt thì sao?\nPhải giả vờ ngủ đi.\nGiả vờ ngủ.\nChân mình.\nLòi ra ngoài rồi.\nChúng đang bị nguy hiểm!\nChúa ơi.\nCậu thật là!\nLàm gì vậy hả?\n움직인 거야? 왜?\n어디로?\n확인할까?\n못 하겠어\n눈 마주치면 어떡해?\n잠든 척하자 잠든 척... 잠든 척...\n으아아아! 발이...\n발... 발이 나왔어. 발이\n발이 위험해. 내 발! 어떡해 어떡해. 주여!\n으악!\n아악 아악!\n아... 아이, 너 진짜 너\n뭐 하는 거야? 어우...\nWhat are you doing?\nWas she moving?\nWhy?\nTo where?\nShould I go check?\nI can't.\nWhat if we make eye contact?\nI should pretend like I'm sleeping.\nI am sleeping.\nMy feet.\nThey are uncovered.\nPlease, Lord.\nYou! It's you!","sourceUid":"merged-mql3u81g-3767","sourceNo":60},{"id":30,"readerNo":31,"displayNo":67,"n":67,"type":"narration","text":"Chóng mặt quá. Tụt đường rồi. Cho miếng đi. Cậu tự xuống mà ăn đi. Thôi đi! Thảo nào cứ thèm đồ ngọt. Hèn gì cứ thấy thèm đồ ngọt. Ôi mẹ ơi!\n\n\n[Nhạc nền kết thúc] \n[Thở dài] \n[Nhạc cổ điển bắt đầu] \n[Tiếng ực] \n[Nhạc cổ điển kết thúc] \n[Tiếng mở cửa] \n[Tiếng túi xào xạc]\n아이, 어지러워. 당 떨어져 아... \n한 입만 아이, 네가 내려와서 먹어 아! 하지 마! 아이... \n어쩐지 단 게 당긴다 싶었어\n 아... 어쩐지... \n단 게 당긴다 싶었어 어, 뭐야!\n\n[배경 음악 끝] \n[한숨 쉰다] \n[클래식 음악 시작] \n[꿀꺽 삼키다] \n[클래식 음악 끝] \n[문 여는 소리] \n[봉지 부스럭 거리는 소리]\nWhat is it?\nThey are in danger!\nI'm dizzy now.\nOne bite?\nCome down and take it yourself.\nStop it!\nThat's why I was craving sweets.\nThat was the reason I was craving for sweets.\n\n[Background music ends] [Sighs] [Classical music starts] [Gulps] [Classical music ends] [Sound of door opening] [Sound of rustling bags]","sourceUid":"merged-mql3x7o3-3768","sourceNo":67},{"id":31,"readerNo":32,"displayNo":68,"n":68,"type":"narration","text":"Gì thế? Con gián ấy mà.\n왜? 뭔데? 어... 바퀴벌레\nWhat's up? Just a cockroach.","sourceUid":"merged-mql3bceu-3766","sourceNo":68},{"id":32,"readerNo":33,"displayNo":70,"n":70,"type":"narration","text":"Xịt thuốc rồi mà vẫn còn là sao?\n- 아우... - 또? 약 놨는데도 그럼 어떡하냐?\nWhat? So roach killer isn't working.","sourceUid":"merged-mql3ycl8-3769","sourceNo":70},{"id":33,"readerNo":34,"displayNo":99,"n":99,"type":"narration","text":"Đến cái này mà cũng để quên được.\n\n[Tiếng chuông cửa]\n흘리고 갈 게 따로 있지. 어휴...\n\n[초인종 소리]\nHow clumsy.\n\n[Doorbell sounds]","sourceUid":"merged-mql3zcu9-3770","sourceNo":99},{"id":34,"readerNo":35,"displayNo":102,"n":102,"type":"narration","text":"Anh ơi, vẫn đang ngủ sao?\n\n[Bíp bíp bíp tiếng cửa]\n오빠! 아직도 자? 아이... 아이! \n\n[삑삑삑 문소리]\nAre you still in bed?\n\n[Beep beep beep sound of door]","sourceUid":"merged-mqmh0svw-1","sourceNo":102},{"id":35,"readerNo":36,"displayNo":106,"n":106,"type":"narration","text":"Sao?\nHôm qua anh uống rượu à?\nRượu chè gì chứ.\nMau dậy đi.\nĐi mà. Nhanh dậy đi nào.\n(고두영) 왜? 어제 술 먹었어? 술은 무슨 술이야... 아이 얼른... 일어나 봐봐, 어?\nWhy?\nDid you drink last night?\nWhat are you talking about?\nCome on, get up. Come on. Hurry and get up.","sourceUid":"merged-mqmh7bcg-3","sourceNo":106},{"id":36,"readerNo":37,"displayNo":110,"n":110,"type":"narration","text":"Sao thế?\nCái này của anh hả?\nSao anh có thể để quên thứ này cơ chứ?\n이거 오빠 거지?\n아 얼른... 일어나 봐봐, 어?\n빨리빨리. 아 일어나. 일어나...\nWhy?\nIs it yours?\nYou can't leave these things behind.","sourceUid":"merged-mqmh9jl1-4","sourceNo":110},{"id":37,"readerNo":38,"displayNo":113,"n":113,"type":"narration","text":"Gì thế?\nAi mà phát hiện anh vào nhà là em bị đuổi đấy.\nEm nói gì thế?\nAnh không nhớ ngày có người mới vào ở sao?\nÀ, hôm đó sao?\nChắc anh đi vội nên bỏ quên rồi bị gom chung với đống đồ giặt của em.\nKhông phải của anh.\nThật á?\nKhông phải à? Anh chắc không?\n\n\n[Tiếng chuông cửa]\n[Nhạc nền sôi động bắt đầu]\n우리 집에 오빠 들어왔던 거 알면 나 쫓겨난단 말이야 아이, 왜? 이런 거 두고 가면 어떡해? 아이... 뭔데?\n아. 그날...\n뭔 소리야?\n저번 날에, 그 새 하메 들어오던 날\n기억 안 나?\n\n아!\n오빠 거 아냐? 확실해? 그때 급하게 가느라고 빠트리고 간 게 내 빨랫감 속에 들어갔나 봐 내 거 아냐... 진짜?\n\n[초인종 소리]\n[경쾌한 배경 음악 시작]\nWhat is it? If they found out you've been in the house, I get kicked out. What do you mean? Don't you remember the other day? Ah... Because you were in hurry, it must have made into my laundry. It's not mine. Really? Not yours? Are you sure?\n\n\n[Doorbell sounds]\n[Upbeat background music starts]","sourceUid":"merged-mqmifujl-9","sourceNo":113},{"id":38,"readerNo":39,"displayNo":132,"n":132,"type":"narration","text":"Anh không mặc quần đùi ngắn.\nAnh chỉ mặc loại này thôi.\nNếu biết không phải của anh thì em đã không phải lo.\nVậy thì của ai nhỉ?\nCủa ai được đây?\nRốt cuộc là ai đã đưa đàn ông vào nhà?\n도대체 누가 집에 남자를 끌어들인 거야?\n나 트렁크 안 입어...\n이런 것만 입어...\n\n오빠 거 아닌지 알았으면\n긴장 안 했는데\n그럼 누구지?\n누구 거야?\n\n[웃는다]\nI don't wear trunks.\nI wear only these.\nI knew this, I would've been worried.\nThen whose is it?\nWho?\nWho brought a guy in the house?","sourceUid":"merged-mqmijz1g-10","sourceNo":132},{"id":39,"readerNo":40,"displayNo":137,"n":137,"type":"narration","text":"Lại đây. - Không được. - Tại sao không? Em đang đến tháng. Vậy em đến làm gì? Sao cơ? Là tại vì em xinh quá ấy. Em mặc đẹp vậy mà không cho anh đụng vào nên anh mới tức đó. Lại đây. - Lại gần đây nào. - Không, không được. Đừng mà!\n왜 왔냐, 그럼?\n이리 와봐\n안 돼...\n아, 왜?\n나 생리한단 말이야\n하지 마...\n뭐?\n네가 너무 이쁘잖아...\n이렇게 이쁘게 하고 와서\n그치만...\n안 된다 그러면 안 되지...\n이리 와봐...\n아 안 돼...\n안 된다고...\n아이구... 아이구...\nCome here.\n-I can't -Why not?\nI am on my period.\nWhy did you come then?\nWhat?\nBecause you are too beautiful.\nHow can you be so beautiful and tell me no?\nCome on.\n-Come close. -No, I can't.\nStop!","sourceUid":"merged-mqmj97ds-13","sourceNo":137},{"id":40,"readerNo":41,"displayNo":148,"n":148,"type":"narration","text":"Thật ra…\nem có thể nhìn thấy ma.\nNgay bây giờ cũng có một con ở đằng kia.\n\n[Nhạc nền sôi động kết thúc]\n[Nhạc nền bắt đầu]\n[Âm thanh êm dịu]\n[Nhạc nền kết thúc]\n나 사실은...\n귀신 본다\n지금 저기도 하나 있어...\n\n\n[경쾌한 배경 음악 끝]\n[배경 음악 시작]\n[음 산한 소리]\n[배경 음악 끝]\nActually...\nI see ghosts.\nThere is one over there right now.\n\n[Upbeat background music ends]\n[Background music starts]\n[Soothing sound]\n[Background music ends]","sourceUid":"merged-mqmjb6vu-14","sourceNo":148},{"id":41,"readerNo":42,"displayNo":160,"n":160,"type":"narration","text":"Chị về rồi ạ?\n- Em ở nhà một mình à? - Vâng.\nMọi người đâu hết rồi?\n\n[Bíp bíp bíp tiếng cửa]\n오셨어요\n혼자 있어?\n예...\n아휴...\n다들 어디 갔어?\n\n[삑삑삑 문소리]\nAre you back? -Is it just you? -Yes. Where is everyone?\n\n[Beep beep beep sound of door]","sourceUid":"merged-mqmjgh3e-15","sourceNo":160},{"id":42,"readerNo":43,"displayNo":164,"n":164,"type":"narration","text":"Tiền bối Yoon thì đi làm.\nChị Yi Na đi tập thể dục.\nCòn chị Ji Won đi xem mắt rồi ạ.\nLại nữa hả?\n또? 윤 선배는 알바 갔구요 강 언니는 운동 갔고 지원 언니는 소개팅 간다고...\nYoon went to part-time.\nKang went to gym.\nJi-Won went on a blind date.\nAgain?","sourceUid":"merged-mqmjiehc-16","sourceNo":164},{"id":43,"readerNo":44,"displayNo":171,"n":171,"type":"narration","text":"Mình là Song Ji Won, năm ba Khoa Báo chí và Truyền thông. Chào bạn. Mình là Park Hae Ra, bạn cùng khoa. Mình là Kim Na Jung, cũng cùng khoa.\n안녕하세요\n언론정보학과 3학년 송지원입니다\n같은 과 3학년 박해나입니다\n[경쾌한 배경 음악 시작]\n같은 과 3학년 김나정입니다\nMy name is Song Ji-Won, a junior studying Journalism. Hello. I am Park Haera, a junior in the same study. I am Kim Najung, also studying with them.","sourceUid":"merged-mqmjkgdi-17","sourceNo":171},{"id":44,"readerNo":45,"displayNo":172,"n":172,"type":"narration","text":"Bạn sống ở đâu vậy ạ? Bằng tuổi không cần lễ phép vậy đâu.\n- 어디 사세요? - 이상형이 어떻게 되세요?\nWhere do you live? Let's speak in casual form.","sourceUid":"merged-mqmjqyzd-18","sourceNo":172},{"id":45,"readerNo":46,"displayNo":178,"n":178,"type":"narration","text":"Mình ở phường Yeonnam, không học Tiểu học Bangyi. Gu mình là Song Joong Ki. Rất vui được gặp mọi người.\n[웃는다]\n어...\n아이!\n아야... 우리 동갑인데 말 놓자\n나 연남동 살고, 당의 초 안 나왔고.\n이상형은 송중기.\n만나서 반가워\nI live in Yeonnam-dong, didn't graduate Bangyi Elementary. And my ideal type is Song Joong-ki. Nice meeting you all.","sourceUid":"merged-mqmjtcrb-20","sourceNo":178},{"id":46,"readerNo":47,"displayNo":181,"n":181,"type":"narration","text":"Ngày nào cũng đi xem mắt thế này,\nchắc cậu ấy vã lắm rồi.\n아주 발정 났어\n하루걸러 소개팅, 미팅, 소개팅...\nGoing out on a blind date every other day, she must be desperate.","sourceUid":"merged-mqmjumrq-21","sourceNo":181},{"id":47,"readerNo":48,"displayNo":184,"n":184,"type":"narration","text":"Chị ấy nói dù có phải bán linh hồn cũng không muốn làm gái còn trinh. Sao lại nói chuyện như thế chứ?\n어으... 걔는 말을 해도 그냥... 영혼을 팔아서라도 꼭... 동정을 떼겠대요\nShe says she would even sell her soul to lose her virginity. How could you say something like that?","sourceUid":"merged-mqmjvggn-22","sourceNo":184},{"id":48,"readerNo":49,"displayNo":133,"n":133,"type":"narration","text":"Cũng đúng thôi, 22 tuổi mà chưa có mảnh tình vắt vai thì thấp thỏm là phải. Dễ thành di sản tự nhiên lắm.\n하긴... 스물둘에 모솔이면 초조하기도 할 거야 \n까딱 잘못하면 천연 기념물이 잖아\nYou could become a natural heritage. Well, if you are still a virgin at the age of 22, it could be a bother to you.","sourceUid":"merged-mqmjwfld-23","sourceNo":133},{"id":49,"readerNo":50,"displayNo":190,"n":190,"type":"narration","text":"Em cũng nỗ lực lên đi.\nCuối tuần mà sao lại ở nhà?\n\nCó sao đâu ạ.\n너도 분발해 주말에 집에나 있으면 어쩌자는 거냐?\n괜찮아요\nYou should work on it as well. Don't stay in the house during weekend.\n\n It's okay.","sourceUid":"merged-mqmjx5rm-24","sourceNo":190},{"id":50,"readerNo":51,"displayNo":192,"n":192,"type":"narration","text":"Tiền bối Yoon cũng độc thân mà.\n윤 선배님도 아직 솔로고...\nYoon's still single as well.","sourceUid":"merged-mqmjxmsw-25","sourceNo":192},{"id":51,"readerNo":52,"displayNo":138,"n":138,"type":"narration","text":"Coi kìa. Em định noi gương chị ấy hả? Chị ấy có bao giờ tận hưởng cuộc sống đâu mà biết về làm tình hay yêu đương.\n얘 봐라 윤 선배를 모델 삼게? 삶의 윤기라고는 요만큼도 없이. 섹스고 연애고 나 몰라라\nWatch out. She can't be your role model. She never relaxes in her life without sex or boyfriend.","sourceUid":"merged-mqmjz983-26","sourceNo":138},{"id":52,"readerNo":53,"displayNo":201,"n":201,"type":"narration","text":"Sống hì hục, cực khổ như ngựa đua vậy.\nEm đừng có như vậy.\nĐó đâu phải là sống,\nlà sinh tồn thì có.\n[한숨 쉰다] \n경주마처럼 이러고 사는 그 고난의 삶을? 그러지 마라... 그게 삶이냐? 생존이지\nLike a racing horse, only running for the finishing line.\nDon't do that.\nThat's not life,\nthat's survival.","sourceUid":"merged-mqmk0fag-27","sourceNo":201},{"id":53,"readerNo":54,"displayNo":202,"n":202,"type":"narration","text":"Mà giờ vụ đó không quan trọng.\n아! 지금 그게 중요한 게 아니고...\nThat's not important now.","sourceUid":"merged-mqmk0wzv-28","sourceNo":202},{"id":54,"readerNo":55,"displayNo":205,"n":205,"type":"narration","text":"Chị tìm được nó ở ban công. Nghĩa là có đàn ông vào nhà.\n베란다에 이게 걸려 있었어\n그 얘기는 즉\n이 집에 남자가 들어왔었다는 뜻이지.\nI found this on the balcony. That means there was a guy in the house.","sourceUid":"merged-mqmk1a52-29","sourceNo":205},{"id":55,"readerNo":56,"displayNo":206,"n":206,"type":"narration","text":"Nhưng sao nó lại ở trong túi xách của chị?\n근데 그게 왜 선배 가방에서 나와요?\nBut why did you keep that in your bag?","sourceUid":"merged-mqmk1hef-30","sourceNo":206},{"id":56,"readerNo":57,"displayNo":209,"n":209,"type":"narration","text":"À, tại chị…\ntính điều tra trước thôi.\n어? 일단 그...\n초동수사를 좀 하느라고\nWell, first... I had to do some investigation.","sourceUid":"merged-mqmk1yx3-31","sourceNo":209},{"id":57,"readerNo":58,"displayNo":211,"n":211,"type":"narration","text":"Quy tắc quan trọng nhất ở Belle Epoque là gì? Cấm đưa đàn ông vào nhà.\n벨에포크의 가장 중요한 규칙이 뭐야?\n남자를 끌어들이지 않는다!\nWhat's the first rule in this house?\nDo not bring a guy into the house.","sourceUid":"merged-mqmk2fhj-32","sourceNo":211},{"id":58,"readerNo":59,"displayNo":213,"n":213,"type":"narration","text":"Ai đó đã vi phạm quy tắc này. Nhưng sao lại để quên quần lót nhỉ?\n누군가 그 원칙을 깨트렸다고\n근데 왜 팬티를 벗어놓고 갔지?\nSomeone broke that rule.\nThen why leave trunks?","sourceUid":"merged-mqmk34ex-33","sourceNo":213},{"id":59,"readerNo":60,"displayNo":217,"n":217,"type":"narration","text":"Em ngốc à? Lẽ nào đại tiện xong để quên? Thì cũng là xả cái gì đó ra, nhưng mà là xả cái khác.\n딴 걸 싼 거지 너 바보냐? 똥 싸서 벗어놨겠어? 싸기는 쌌는데...\nAre you stupid?\nWould he have used a toilet?\nHe did let out something,\nbut it was something else.","sourceUid":"merged-mqmk4hzj-34","sourceNo":217},{"id":60,"readerNo":61,"displayNo":220,"n":220,"type":"narration","text":"Em nghĩ là ai?\nEm cũng không biết.\n누굴 거 같냐? \n\n글쎄요...\nWho do you think?\nWell...","sourceUid":"merged-mqmk5g8m-35","sourceNo":220},{"id":61,"readerNo":62,"displayNo":164,"n":164,"type":"narration","text":"Còn ai vào đây? Chị Yi Na đấy. Chị ấy tự khai rồi mà. Đang bắt cá hai, ba tay luôn.\n누구긴 누구야? 강 언니지... 자기 입으로 얘기했잖아 현재 양다리 삼다리 중이라고\nIt's Kang. What do you mean \"Well\"? She said it herself. She is two-, three-timing.","sourceUid":"merged-mqmk9qxa-36","sourceNo":164},{"id":62,"readerNo":63,"displayNo":225,"n":225,"type":"narration","text":"Nhìn tình hình thì cũng có thể là \"419\". \"419\" là gì vậy chị?\n분위기 보면... 원나잇도 하는 거 같고 원나잇이 뭔데요?\nAnd it seems like she even does one-night stands. What is a one-night stand?","sourceUid":"merged-mqmkali6-37","sourceNo":225},{"id":63,"readerNo":64,"displayNo":228,"n":228,"type":"narration","text":"Quê em đâu phải ở Yeasan nhỉ? Mới ở trển xuống chứ gì? Là vừa gặp nhau đêm đầu tiên đã phát sinh quan hệ đấy.\n너 고향 예산 아니지\n청학동이지?\n그날 만나서 그날 자는 거\nYou are from Yeasan, are you?\nIt must be another planet.\nIt's sleeping with someone you just met.","sourceUid":"merged-mqnw3jk7-1","sourceNo":228},{"id":64,"readerNo":65,"displayNo":230,"n":230,"type":"narration","text":"Thật ấy ạ?\nCó những người như vậy thật ạ?\n진짜요?\n진짜 그런 사람들이 있어요?\nReally?\nAre there such people for real?","sourceUid":"merged-mqnw58km-2","sourceNo":230},{"id":65,"readerNo":66,"displayNo":173,"n":173,"type":"narration","text":"Tất nhiên, chị Kang ấy. Chị ấy như đang đi thi đấu Olympic không bằng, chạy đua từng giây.\n\n[Âm nhạc thú vị từ tai nghe]\n그래! 강 언니\n(정예은)\n무슨 올림픽 나갔대?\n0.01초를 다투는 거야?\n\n[헤드폰에서 신나는 음악 소리]\nShe dresses like she is preparing for the Olympics Of course, Kang.\n\n[Exciting music sounds from headphones]","sourceUid":"merged-mqnwahuu-8","sourceNo":173},{"id":66,"readerNo":67,"displayNo":175,"n":175,"type":"narration","text":"Mặc đồ thun thôi cũng được mà. Chạy có một vòng quanh khu nhà thôi, cần gì ăn mặc như thế.\n기껏 동네 한 바퀴 뛸 거면서 옷이 그게 뭐래? 그냥 츄리닝 입고 달려도 될걸 꼬옥!\nwhen it is just running around the neighborhood.\nShe could be just wearing a training suit.","sourceUid":"merged-mqnwedk7-14","sourceNo":175},{"id":67,"readerNo":68,"displayNo":238,"n":238,"type":"narration","text":"Anh ổn không ạ?\nÀ, vâng.\nLà do chị ấy muốn dụ trai thôi.\n괜찮으세요? 아... 예... 예... (아저씨) 어... (정예은) 그게 다 남자 꼬시려고 그러는 거야\nAre you okay?\nOf course.\nAll she cares is getting a man.","sourceUid":"merged-mqnwiqm6-17","sourceNo":238},{"id":68,"readerNo":69,"displayNo":180,"n":180,"type":"narration","text":"Có người gọi đó là pheromone, tín hiệu mời gọi.\nDâm đãng hết sức.\n음란하기가 아주 그냥... 듣기 좋은 말로 페로몬이라고 하나 본데...\nSo lustful.\nSome people use the word \"pheromone.\"","sourceUid":"merged-mqnwk1kl-21","sourceNo":180},{"id":69,"readerNo":70,"displayNo":182,"n":182,"type":"narration","text":"Chị ấy dễ dãi nên đàn ông mới đeo bám thôi.\nNhưng pheromone con khỉ ấy.\n칫!\n페로몬은 무슨 쥐뿔...\n그냥 헤퍼 보이니까 남자들이 꼬이는 거야\nThat's just a joke. Men get lured because she seems easy.","sourceUid":"merged-mqnwlo5y-25","sourceNo":182},{"id":70,"readerNo":71,"displayNo":248,"n":248,"type":"narration","text":"Chứ nhìn cũng bình thường mà.\n[Âm nhạc sôi động kết thúc]\n솔직히 생긴 건 그냥 그렇잖아\n[신나는 음악 소리 끝]\nShe doesn't look as good, honestly.\n[Exciting music ends]","sourceUid":"merged-mqnwmamv-26","sourceNo":248},{"id":71,"readerNo":72,"displayNo":185,"n":185,"type":"narration","text":"Xinh thì xinh nhưng đâu đến mức nghiêng nước nghiêng thành.\n- Chị ấy xinh mà. - Trời ạ.\n예쁘잖아요\n예쁘긴 예쁜데...\n막 미치게 예쁜 건 아니잖아...\n-She is pretty. -Well... she may be pretty, but not crazy pretty.","sourceUid":"merged-mqnwnk9a-30","sourceNo":185},{"id":72,"readerNo":73,"displayNo":188,"n":188,"type":"narration","text":"Chị ấy chỉ xinh bình thường như chị em mình thôi.\nEm thử so sánh với Song xem.\nCũng đâu có chênh lệch tới mức một trời một vực đâu em.\n아 그냥 대충 예쁜 거지 너나 나나 그래... 송이랑 비교해봐 뭐 그렇게 엄청나게 빈익빈 부익부가 될 만큼 차이 나는 건 아니잖아?\nIt is not like she is on the other extreme.\nShe is so-so pretty, like you, and me.\nAnd Song as well.","sourceUid":"merged-mqnwqka5-38","sourceNo":188},{"id":73,"readerNo":74,"displayNo":258,"n":258,"type":"narration","text":"Tìm chứng cứ thôi.\n증거를 찾자\nLet's find proof.","sourceUid":"merged-mqnwr9od-39","sourceNo":258},{"id":74,"readerNo":75,"displayNo":192,"n":192,"type":"narration","text":"Dạ?\nChị Kang ở một mình một phòng mà.\nNếu chị ấy đưa đàn ông về nhà,\nchắc chắn sẽ còn chứng cứ bên trong.\n[Nhạc nền bắt đầu]\n예? 강 언니 방 혼자 쓰잖아 남자를 끌어들였다면 분명 저 안에 증거가 남아 있을 거야\n\n[배경 음악 시작]\nIf she brought a man here,\nWhat?\nShe has the room to herself.\nthere must be a proof in there.\n\n[Background music starts]","sourceUid":"merged-mqnwtdyp-46","sourceNo":192},{"id":75,"readerNo":76,"displayNo":196,"n":196,"type":"narration","text":"Chứng cứ gì ạ?\nNhìn thì biết thôi.\nNếu tìm thấy thì sao?\n어떤 증거요?\n보면 알겠지\n찾아서 어떡하려고요?\nWhat kind?\nWe will see.\nWhat do we do if we find some?","sourceUid":"merged-mqnx0w1k-50","sourceNo":196},{"id":76,"readerNo":77,"displayNo":197,"n":197,"type":"narration","text":"Quy tắc một, đưa đàn ông vào nhà thì phải dọn khỏi đây.\n아이고...\n벨 에포크 규칙 하나\n남자를 끌어들이면...\n퇴실한다!\nRule one, if you bring a man here, you leave.","sourceUid":"merged-mqnx4ug4-57","sourceNo":197},{"id":77,"readerNo":78,"displayNo":198,"n":198,"type":"narration","text":"Đuổi chị ấy đi sao?\n쫓아내려고요?\nKick her out?","sourceUid":"merged-mqnx5qhr-58","sourceNo":198},{"id":78,"readerNo":79,"displayNo":272,"n":272,"type":"narration","text":"Hoặc đóng phạt tương ứng.\n혹은 그에 상응하는 벌금을 낸다\nOr make a penalty.","sourceUid":"merged-mqnx71r6-59","sourceNo":272},{"id":79,"readerNo":80,"displayNo":274,"n":274,"type":"narration","text":"Tiếng đàn ông nhỉ.\n\n[giọng nam]\n아...남자지?\n\n[남자 목소리]\nThat's a man.\n\n[male voice]","sourceUid":"merged-mqnx8psq-62","sourceNo":274},{"id":80,"readerNo":81,"displayNo":201,"n":201,"type":"narration","text":"Sao chị lại ở đây?\n뭐라는 거야?\n으아!\n아...\n아 왜 여깄어?\nWhy are you here?","sourceUid":"merged-mqnxbovd-66","sourceNo":201},{"id":81,"readerNo":82,"displayNo":280,"n":280,"type":"narration","text":"Sao chị ở trước phòng chị à?\n내 방 앞에 왜 있냐고?\nWhy am I in front of my room?","sourceUid":"merged-mqnxd1pj-67","sourceNo":280},{"id":82,"readerNo":83,"displayNo":282,"n":282,"type":"narration","text":"Người đàn ông trong phòng là ai thế?\n\n[Nhạc nền kết thúc]\n누구야? 방에 있는 남자\n\n[배경 음악 끝]\nWho's the man in your room?\n\n[Background music ends]","sourceUid":"merged-mqnxdspc-68","sourceNo":282},{"id":83,"readerNo":84,"displayNo":284,"n":284,"type":"narration","text":"Đàn ông?\n\n[Tiếng mở cửa]\n남자? [문 여는 소리]\nA man?\n\n[Sound of door opening]","sourceUid":"merged-mqnxtxse-69","sourceNo":284},{"id":84,"readerNo":85,"displayNo":285,"n":285,"type":"narration","text":"Em nói anh ta hả?\n\n[Phát video]\n저 남자 얘기하는 거야?\n\n[비디오 재생]\nYou mean, that man?\n\n[Video Play]","sourceUid":"merged-mqnxw17i-70","sourceNo":285},{"id":85,"readerNo":86,"displayNo":288,"n":288,"type":"narration","text":"Chị để laptop vậy rồi ra ngoài à?\n\n[Phát video]\n노트북 켜 놓고 나갔어?\n\n[비디오 재생]\nDid you leave your laptop on?\n\n[Video Play]","sourceUid":"merged-mqnxxtj2-71","sourceNo":288},{"id":86,"readerNo":87,"displayNo":289,"n":289,"type":"narration","text":"Chị Yoon mà biết là gay to đó.\nNên đừng có nói.\n윤 선배 알면 난리난리 날 텐데\n그러니까 쉬잇!\nIf Yoon finds out, she will--\nSo keep quiet.","sourceUid":"merged-mqnxzxel-72","sourceNo":289},{"id":87,"readerNo":88,"displayNo":291,"n":291,"type":"narration","text":"Bảo sao nghe không hiểu gì cả.\n\n[Tiếng giày]\n어쩐지 하나도 못 알아듣겠더라\n\n[신발 소리]\nThat's why we couldn't understand anything.\n\n[Shoes sound]","sourceUid":"merged-mqny1uf3-73","sourceNo":291},{"id":88,"readerNo":89,"displayNo":293,"n":293,"type":"narration","text":"Nhưng dù sao chị cũng\nđưa trai về rồi nhỉ?\n\n[đổ]\n그건 그렇고\n남자 데려왔었지?\n\n[쾅]\nAnyway,\ndid you have a guy over?\n\n[bang]","sourceUid":"merged-mqny342t-74","sourceNo":293},{"id":89,"readerNo":90,"displayNo":296,"n":296,"type":"narration","text":"Không phải chị.\n\n[Thở dài]\n나 아니야\n\n[한숨 쉰다]\nIt's not me.\n\n[Sighs]","sourceUid":"merged-mqny4in9-75","sourceNo":296},{"id":90,"readerNo":91,"displayNo":298,"n":298,"type":"narration","text":"Chị chứ còn ai vào đây!\n에에이... 맞잖아\nIt must be!","sourceUid":"merged-mqny5j9p-76","sourceNo":298},{"id":91,"readerNo":92,"displayNo":214,"n":214,"type":"narration","text":"Đây là hàng nhái mà. Đám đàn ông chị quen không mặc loại này đâu.\n아, 이거 짝퉁이잖아\n내가 만나는 남자들은 이런 거 안 입어\nThis is imitation. None of my guys would wear them.","sourceUid":"merged-mqny6q4d-79","sourceNo":214},{"id":92,"readerNo":93,"displayNo":301,"n":301,"type":"narration","text":"Đám đàn ông?\n남자들?\nGuys?","sourceUid":"merged-mqny996h-80","sourceNo":301},{"id":93,"readerNo":94,"displayNo":302,"n":302,"type":"narration","text":"Ừ, cả đám luôn.\n- 그래. 남자들! - 아!\nYes, guys.","sourceUid":"merged-mqny9t9o-81","sourceNo":302},{"id":94,"readerNo":95,"displayNo":218,"n":218,"type":"narration","text":"Đừng vậy mà!\nVới cả có nhà nghỉ mà, sao phải làm ở nhà cho phiền phức?\n아이씨! 하지 마\n어으! 그리고 집에서 왜 하냐?\nAnd why would you do that at home when you can go to a motel?\nStop it!","sourceUid":"merged-mqnyczx8-84","sourceNo":218},{"id":95,"readerNo":96,"displayNo":219,"n":219,"type":"narration","text":"Có nhà nghỉ?\n뒤치다꺼리 귀찮게... 모텔이 있는데\n‘모텔이 있는데’\nGoing to a motel?","sourceUid":"merged-mqnyffa9-86","sourceNo":219},{"id":96,"readerNo":97,"displayNo":220,"n":220,"type":"narration","text":"Mẹ chị nghe chắc tự hào vì con gái lắm.\n어머님께서 들으면 ‘아이고 우리 딸’ 하시겠네요\nYour mom will be very proud of you.","sourceUid":"merged-mqnypm9b-90","sourceNo":220},{"id":97,"readerNo":98,"displayNo":311,"n":311,"type":"narration","text":"Gì chứ? Hàng nhái ư?\nVậy thì là ai nhỉ?\n뭐야?\n짝퉁이었어?\n아이, 그럼 누구지?\n\n[문 닫는 소리]\nIs it imitation?\nThen who would that be?","sourceUid":"merged-mqnyrwlz-91","sourceNo":311},{"id":98,"readerNo":99,"displayNo":224,"n":224,"type":"narration","text":"Tiền bối Yoon?\nChắc là không đâu.\n윤 선밴가?\n에에이. 그건 아니지\nNo, no way.\nYoon?","sourceUid":"merged-mqnytxyf-94","sourceNo":224},{"id":99,"readerNo":100,"displayNo":314,"n":314,"type":"narration","text":"Tại sao ạ?\n왜요?\nWhy not?","sourceUid":"merged-mqnyunpz-95","sourceNo":314},{"id":100,"readerNo":101,"displayNo":227,"n":227,"type":"narration","text":"Tiền bối Yoon đâu có thời gian rảnh như thế.\nChị ấy vô cảm trước đàn ông.\n그야... 윤 선배는 그럴 시간도 없고 여유도 없고\n윤 선배는 남자한테 관심 없잖아\nShe is not interested in men.\nShe doesn't have enough time to do so.","sourceUid":"merged-mqnyw3hr-98","sourceNo":227},{"id":101,"readerNo":102,"displayNo":317,"n":317,"type":"narration","text":"Vô cảm sao?\n관심 없어요?\nIs she not?","sourceUid":"merged-mqnyxcdi-99","sourceNo":317},{"id":102,"readerNo":103,"displayNo":318,"n":318,"type":"narration","text":"Để ý tới đàn ông mà ăn mặc như vậy à?\n관심 있는 사람이 그러고 다니냐?\nIf she was, she would not dress like that.","sourceUid":"merged-mqnyyeoe-100","sourceNo":318},{"id":103,"readerNo":104,"displayNo":231,"n":231,"type":"narration","text":"Trang điểm á?\nCó lúc chị ấy còn không rửa mặt luôn.\n\n[Nhạc nền bắt đầu]\n(정예은) 화장?\n어떨 땐 세수도 안 하고 나갈걸\n[배경 음악 시작]\nMake-up? She doesn't even wash her face sometimes.\n\n[Background music starts]","sourceUid":"merged-mqnz11cu-106","sourceNo":231},{"id":104,"readerNo":105,"displayNo":323,"n":323,"type":"narration","text":"Em biết tại sao chị ấy để tóc dài không?\nĐể khỏi phải đi cắt tóc đó.\n윤 선배가 왜 머리 기르는지 알아?\n미용실 안 가려고\nDo you know why she keeps her hair long?\nSo she doesn't have to go to the salon.","sourceUid":"merged-mqp2o6ll-1","sourceNo":323},{"id":105,"readerNo":106,"displayNo":324,"n":324,"type":"narration","text":"Tóc đuôi ngựa đâu còn hợp với tuổi 28 như chị ấy nữa.\nEm có thấy quần áo của chị ấy đều tối màu không?\n아무리 그래도 스물여덟에 포니테일은 좀 아니지 않냐? 윤 선배 옷 색깔 다 칙칙하지?\nHer hair is way too inappropriate for her age.\nAnd all her clothes are dark colored.","sourceUid":"merged-mqp2uvyz-2","sourceNo":324},{"id":106,"readerNo":107,"displayNo":326,"n":326,"type":"narration","text":"Vì không giặt cũng không bị lộ đấy.\nCả năm trời, dù nắng hay mưa cũng chỉ có một đôi giày.\n안 빨아도 표가 안 나거든\n비가 오나 눈이 오나...\n1년 365일 단일 아이템\nSo it doesn't show when it's not washed.\nRain or shine, wears the same shoes all-year around.","sourceUid":"merged-mqp2ylka-3","sourceNo":326},{"id":107,"readerNo":108,"displayNo":330,"n":330,"type":"narration","text":"Có giai thoại kể rằng đôi giày ấy ban đầu màu trắng cơ.\nNhìn dáng vẻ chị ấy đi.\n저 운동화가...\n원래는 하얀색이었다는 전설도 있어\n보아라\nI even heard that pair used to be white.\nLook, here she comes.","sourceUid":"merged-mqp3gxq3-5","sourceNo":330},{"id":108,"readerNo":109,"displayNo":242,"n":242,"type":"narration","text":"Em nghĩ đàn ông có hứng thú nổi không?\nDo chị ấy bận thôi.\nChị ấy không có tư cách làm con gái luôn ấy.\n\n[Nhạc nền kết thúc]\n이 꼬락서니를 남자가 들러붙겠니? 그야... 바쁘니까... \n윤 선배는... 여자라는 자각이 없다니까\n\n[배경 음악 끝]\nWhat kind of guy would be interested in her? Well, she is busy. She doesn't deserve to be a lady.\n\n[Background music ends]","sourceUid":"merged-mqp3kchp-8","sourceNo":242},{"id":109,"readerNo":110,"displayNo":245,"n":245,"type":"narration","text":"Nhưng mà…\nTiền bối Yoon hợp với sinh sản vô tính hơn.\nNhư sinh vật đơn bào ấy.\n그치만... 윤 선배는 무성생식이 어울려 아메바처럼\nLike amoeba.\nBut...\nYoon fits better with asexual reproduction.","sourceUid":"merged-mqp5d054-13","sourceNo":245},{"id":110,"readerNo":111,"displayNo":246,"n":246,"type":"narration","text":"Nhưng theo tâm lý thì cũng có đàn ông thích các cô gái như vậy.\n근데요\n심리학적으로 그런 여자들을 좋아하는 남자도 있대요\nBut there are guys who are interested in such girls for psychological reasons.","sourceUid":"merged-mqp5eck7-15","sourceNo":246},{"id":111,"readerNo":112,"displayNo":342,"n":342,"type":"narration","text":"[웃는다]","sourceUid":"ko-mql0e9i5-1177","sourceNo":342},{"id":112,"readerNo":113,"displayNo":345,"n":345,"type":"narration","text":"\"Tôi sẽ biến cô nàng tomboy đấy thành phụ nữ.\"\nCó vài người lại nghĩ như vậy.\n(유은재) ‘내가 저 선머슴아를 여자로 만들어주겠어‘\n그런 생각하는 남자들이요\n\"I will turn that tomboy into a lady.\"\nThat kind of thoughts.","sourceUid":"merged-mqp5j2sn-18","sourceNo":345},{"id":113,"readerNo":114,"displayNo":249,"n":249,"type":"narration","text":"Cũng đúng, nữ chính trong truyện tình cảm thì một là công chúa, hai là tomboy mà.\n(정예은) 하긴... 순정만화의 양대산맥이 캔디랑 톰보이긴 하지\nIn fact,\nmany heroines in novels are either a princess or a tomboy.","sourceUid":"merged-mqp5jtzq-20","sourceNo":249},{"id":114,"readerNo":115,"displayNo":351,"n":351,"type":"narration","text":"Yoon! Em chưa muộn đâu.\n세잎! 안 늦었어요 (박재완) [달리다가 멈추는 소리]\nYoon!\nYou are not late.","sourceUid":"merged-mqpcy69e-21","sourceNo":351},{"id":115,"readerNo":116,"displayNo":254,"n":254,"type":"narration","text":"Nghỉ cho khô mồ hôi đã.\nVẫn còn năm phút nữa.\n땀 좀 식히고 가요 5분 정도 남았으니까\nCatch your breath.\nYou've got five minutes.","sourceUid":"merged-mqpd63ew-24","sourceNo":254},{"id":116,"readerNo":117,"displayNo":357,"n":357,"type":"narration","text":"[Tiếng băng rung]\n[Tiếng đóng cửa]\n[Thở dài]\n[Tiếng nước uống]\n[얼음 흔들리는 소리]\n[문 닫는 소리]\n[한숨 쉰다]\n[물 쪽쪽 마시는 소리]\n[Sound of shaking ice]\n[Sound of door closing]\n[Sighs]\n[Sound of drinking water]","sourceUid":"merged-mqpd7g2b-25","sourceNo":357},{"id":117,"readerNo":118,"displayNo":364,"n":364,"type":"narration","text":"Lên món cho bàn hai. Hai món cho bàn một.\nLên ngay đây ạ!\n(주방장) 모두 잘 빼고 있나!\n(모두) 파이아!\n(주방장) 파이아!\n(모두) 예!\nDishes for table two. Two dishes for table one.\nYes, it's coming out!","sourceUid":"merged-mqpdbm4r-33","sourceNo":364},{"id":118,"readerNo":119,"displayNo":359,"n":359,"type":"narration","text":"[Tiếng thở ra]\n[Đầu bếp lặp lại lệnh nấu]\n[âm thanh lệnh nấu ăn của đầu bếp]\n[Nhạc chủ đề sôi động bắt đầu]\n[Tak]\n[숨을 토하는 소리]\n아...\n[쉐프들 요리 명령 복창]\n[주방장 요리 명령 소리]\n[경쾌한 테마 음악 시작]\n[탁]\n[Sound of exhaling]\n[Chefs repeat cooking commands]\n[chef cooking command sound]\n[Upbeat theme music starts]\n[Tak]","sourceUid":"merged-mqpd91lb-31","sourceNo":359},{"id":119,"readerNo":120,"displayNo":258,"n":258,"type":"narration","text":"Dù sao cũng không phải tiền bối Yoon đâu.\nChị em mình đều biết chị ấy đâu có thời gian rảnh.\nKhông có luôn.\n(정예은) 아무리 그래도 윤 선밴 아니야\n너도 알고 나도 알지만 윤 선배 스케줄에 틈이 있어?\n없어\nStill, it can't be Yoon.\nYou and I both know, does she ever have time?\nShe doesn't.","sourceUid":"merged-mqpdtata-36","sourceNo":258},{"id":120,"readerNo":121,"displayNo":260,"n":260,"type":"narration","text":"Bản thân còn thiếu ngủ thì thời gian đâu mà ngủ với trai.\n남자랑 잘 시간이 어딨니? 혼자 잘 시간도 없는데...\nHow can she sleep with a man? She has no time to sleep for herself.","sourceUid":"merged-mqpdw5m7-40","sourceNo":260},{"id":121,"readerNo":122,"displayNo":262,"n":262,"type":"narration","text":"Dù vậy thì… Tính ra thì Ji Won đỡ hơn chị Jin Myung.\n그렇긴 한데요... 그렇게 따지면... 윤 선배보다는 송지원이겠지\nAlthough that is true...\nIf you think, there is more chance with Song then.","sourceUid":"merged-mqpe3csa-43","sourceNo":262},{"id":122,"readerNo":123,"displayNo":376,"n":376,"type":"narration","text":"Cậu ấy đi xem mắt suốt, biết đâu sẽ kiếm được ai đó.\nCậu ấy coi vậy cũng dạn lắm.\n하루걸러 한 번씩 소개팅인데...\n그 와중에 하나 걸렸을지도 몰라\nShe goes to a blind date every other day, maybe she's got one finally. She can be quite bold.","sourceUid":"merged-mqq7jdby-1","sourceNo":376},{"id":123,"readerNo":124,"displayNo":378,"n":378,"type":"narration","text":"Bạn thích gì vậy?\nGọi tôi khi quý khách chọn được món nhé!\n뭐 좋아하세요?\n걔가 또 은근히 과감한 데가 있거든\n모르겠어요. 아무거나 좋아요\n결정하시면 말씀 주세요\nWhat do you like?\nPlease let me know once you decide.","sourceUid":"merged-mqq7omhw-4","sourceNo":378},{"id":124,"readerNo":125,"displayNo":269,"n":269,"type":"narration","text":"Gọi món chưa?\nVẫn chưa sao?\nVậy để tôi chọn cho.\n네...\n시켰어?\n뭐 아직도 안 시켰어. 줘봐\nI will make a decision then.\nDid you order?\nNot yet?","sourceUid":"merged-mqq7qa2x-7","sourceNo":269},{"id":125,"readerNo":126,"displayNo":272,"n":272,"type":"narration","text":"Một canh chả cá. Một giá đỗ xào. Một tôm sốt cay.\n내가 시켜줄게 일단 찌개 하나, 볶음 하나 시키고 소주 한 병, 맥주 세 병.\nChili prawn. Fish cake soup. Fried bean sprout.","sourceUid":"merged-mqq7zcv7-10","sourceNo":272},{"id":126,"readerNo":127,"displayNo":276,"n":276,"type":"narration","text":"Canh chả cá ở đây ngon lắm. Giá đỗ xào cũng nhiều. Tôm sốt cay rất cay luôn. Mọi người đều ăn cay chứ?\nMột chai soju, ba chai bia. Thiếu thì gọi thêm nhé? Được chứ?\n여기 오뎅탕 죽음 칠리 새우는 열라 매워 매운 것 잘 먹지? 그리고 숙주 볶음은 양이 많아\n소주 한 병. 맥주 세 병\n모자라면 더 시키는 걸로? 오케이?\nYou all like spicy stuff?\nFish cake soup here is excellent,\nand fried bean sprout dish is huge.\nChili prawn is very spicy.\nOne bottle of Soju, three bottles of beer. We can order more if we need to, okay?","sourceUid":"merged-mqq95ub4-18","sourceNo":276},{"id":127,"readerNo":128,"displayNo":279,"n":279,"type":"narration","text":"Cô ơi!\nTôi lấy thêm một chai rượu. Ghi thêm vào hóa đơn nhé.\n(모두) 응 응...\n이모님!\n(송지원) 이모! 술 가지고 가요 술 추가!\nI am grabbing the bottles myself. Add them to the bill!\nAuntie!","sourceUid":"merged-mqq97yau-21","sourceNo":279},{"id":128,"readerNo":129,"displayNo":282,"n":282,"type":"narration","text":"Không có mình là mọi người không nói chuyện luôn à?\nUống thêm nào!\nUống chung bia với soju nhé.\n너희는 내가 없으면 말을 안 하는구나\n소맥 간다... 소맥 가...\n야... 술 추가... 추가\nI'm going to mix them up!\nYou guys don't say anything without me, we've got more drinks.\nMore!","sourceUid":"merged-mqq9aopw-24","sourceNo":282},{"id":129,"readerNo":130,"displayNo":284,"n":284,"type":"narration","text":"Nếu bạn cảm thấy muốn đi cùng ai trong chặng đường còn lại của tuổi 20\nthì hãy hướng chiếc đũa tình yêu đến người đó nhé.\n[웃는다] 함께 보내고 싶다 하는 사람에게 내 남은 20대를 이 사람과... 사랑의 젓가락을 날리는 거야...\nsend your love through chopstick. If you feel like you want to spend the last of your 20's with this person,","sourceUid":"merged-mqq9d9j2-28","sourceNo":284},{"id":130,"readerNo":131,"displayNo":406,"n":406,"type":"narration","text":"Đếm đến ba nhé?\nMột, hai, ba!\n하나 둘 셋 하나 둘 셋에 하는 거다\nAt one, two, three, okay? One, two, three!","sourceUid":"merged-mqqfp1y2-2","sourceNo":406},{"id":131,"readerNo":132,"displayNo":407,"n":407,"type":"narration","text":"Chắc là Song đấy.\n(정예은) 그래. 송인가 보다\nYeah, it must be Song.","sourceUid":"merged-mqqfpt3l-3","sourceNo":407},{"id":132,"readerNo":133,"displayNo":408,"n":408,"type":"narration","text":"Chị muốn ăn thì nói luôn nhé.\nKhông ăn, vừa chị ăn rồi còn gì.\n먹을 거면 지금 얘기해요? 안 먹어. 방금 과자 먹었잖아\nTell me now if you want some. No, I don't, I just had some snack.","sourceUid":"merged-mqqfqh3o-6","sourceNo":408},{"id":133,"readerNo":134,"displayNo":410,"n":410,"type":"narration","text":"Không ăn thật không?\n진짜 안 먹죠?\nReally?","sourceUid":"merged-mqqfqzpq-7","sourceNo":410},{"id":134,"readerNo":135,"displayNo":413,"n":413,"type":"narration","text":"Hôm nay thật sự rất vui. Tôi cũng vậy. Cậu đi về bằng gì?\n오늘 진짜 즐거웠다 \n아, 나도...\n집에 어떻게 가?\nI had a good time today. Me too. How do you go home?","sourceUid":"merged-mqqfkfk3-1","sourceNo":413},{"id":135,"readerNo":136,"displayNo":414,"n":414,"type":"narration","text":"Tôi đi xe buýt. Số 7027, 751.\n버스 7027번 751번\nBy bus. Number 7027, 751.","sourceUid":"merged-mqqfs976-12","sourceNo":414},{"id":136,"readerNo":137,"displayNo":416,"n":416,"type":"narration","text":"Vậy à? Tôi đi bên này. Tạm biệt.\n그래? 난 이쪽, 안녕\nYeah? I'm going this way. Bye.","sourceUid":"merged-mqqg7inx-1","sourceNo":416},{"id":137,"readerNo":138,"displayNo":420,"n":420,"type":"narration","text":"Chị bảo không ăn mà?\n\n[Nhạc chủ đề lạc quan kết thúc]\n[Tiếng húp mì ramen]\n아이...\n안 먹는다면서요?\n\n[경쾌한 테마 음악 끝]\n[라면 후루룩 먹는 소리]\nYou said you wouldn't eat.\n\n[Upbeat theme music ends]\n[Sound of slurping ramen]","sourceUid":"merged-mqqg7xgw-2","sourceNo":420},{"id":138,"readerNo":139,"displayNo":425,"n":425,"type":"narration","text":"Chị không định ăn rồi.\nTại em đấy. Ai bảo em ăn mì\ntrước mặt người đang giảm cân.\n\n[Tiếng đặt đũa]\n[Tiếng bát đĩa được xếp chồng lên nhau]\n안 먹을라 그랬는데...\n너 때문이야 라면 같은 걸 먹으면 되니?\n다이어트하는 사람 앞에서...\n[젓가락 놓는 소리]\n[그릇 포개는 소리]\nI wasn't going to then. It's your fault. You shouldn't have had it in front of someone who's on diet.\n\n[Sound of placing chopsticks]\n[Sound of dishes being stacked]","sourceUid":"merged-mqqgbzac-3","sourceNo":425},{"id":139,"readerNo":140,"displayNo":427,"n":427,"type":"narration","text":"Mới ăn được ba đũa, còn bao nhiêu chị ấy ăn hết.\n먹으면 먹는다고 말을...\n지가 다 먹고 난 세 젓가락밖에...\nTalking about three bites when she had it all.","sourceUid":"merged-mqqgdb7s-4","sourceNo":427},{"id":140,"readerNo":141,"displayNo":306,"n":306,"type":"narration","text":"Này.\nCái này của cậu nhỉ?\nKhai thật đi.\nCậu đưa trai về nhà chứ gì?\nHai người làm đủ mọi thứ rồi để quên à?\n야!\n이거 너지?\n이실직고하지...\n당신 남자 끌어들였지?\n이것저것 으흥 하다가 깜박하고 두고 간 거지?\n\n[신발 소리]\nHey. Is it yours? You better spill it out. You brought a guy, right? You guys were playing around and left this behind.","sourceUid":"merged-mqqgg3ih-5","sourceNo":306},{"id":141,"readerNo":142,"displayNo":435,"n":435,"type":"narration","text":"Đừng có xát muối vào tim tớ.\nCó được cũng mừng đấy.\n아주 염장을 후벼라\n그럴 남자라도 있었으면 좋겠다\nStop rubbing it in!\nI wish I had one to bring in.","sourceUid":"merged-mqqggzdk-6","sourceNo":435},{"id":142,"readerNo":143,"displayNo":311,"n":311,"type":"narration","text":"Bọn tớ cười cả buổi luôn kia mà.\nLần nào tớ nói gì cậu ấy cũng cười, rồi còn bắt chuyện với mỗi mình tớ mà.\nVậy thì tại sao?\n깔깔 웃었잖아? 내가 말할 때마다 아주 오줌을 싸더구먼. 말도 나한테만 시키고 [한숨 쉰다] 근데 왜에?\nWe were having fun.\nEvery time I said something, he laughed and only spoke to me.\nThen why...","sourceUid":"merged-mqqgihp7-7","sourceNo":311},{"id":143,"readerNo":144,"displayNo":441,"n":441,"type":"narration","text":"Sao chỉ có mỗi cô chủ quán là thích mình cơ chứ? Chắc lại hụt rồi.\n왜 식당 아줌마만 날 좋아하는 거냐고오, 잉!\n또 안 됐나 봐\nWhy does only auntie in the pub like me?\nIt didn't go well again.","sourceUid":"merged-mqqgjeif-8","sourceNo":441},{"id":144,"readerNo":145,"displayNo":444,"n":444,"type":"narration","text":"Đừng nói là em đấy chứ?\nSao cơ?\nEm vừa mới 20,\n혹시 너 아냐? 네에? 치... 이제 막 스무 살\nIs it you then?\nWhat?\nJust turning 20,","sourceUid":"merged-mqqgkayw-9","sourceNo":444},{"id":145,"readerNo":146,"displayNo":446,"n":446,"type":"narration","text":"hết là trẻ vị thành niên rồi nên muốn thử cái này cái kia chứ gì.\nĐặc biệt là người thơ ngây như em dễ bị xiêu lòng lắm.\n미성년자의 굴레도 벗었겠다\n이것저것 막 하고 싶은 나이잖아\n특히나 너같이 순진한 애는 자빠트리기도 쉽다는데\nnot a kid anymore, and wanting to explore everything. Someone so naive like you can easily be conquered.","sourceUid":"merged-mqqgmvuf-13","sourceNo":446},{"id":146,"readerNo":147,"displayNo":450,"n":450,"type":"narration","text":"Eun Jae à, em tin anh chứ?\nĐừng vậy mà.\nKhông sao đâu. Trò này người lớn hay chơi mà.\n'우리 은재 오빠 믿지' 하지 마요 ‘괜찮아. 이게 어른들의 장난이란 거야, 응’\nYou trust me, right? Stop it. It's okay. This is how adults play, right?","sourceUid":"merged-mqqgmfnk-11","sourceNo":450},{"id":147,"readerNo":148,"displayNo":451,"n":451,"type":"narration","text":"Sao mọi người cứ thích trêu em vậy?\n아이... 왜 다들 나만 보면 놀리지 못해 안달이에요?\nHow come everyone wants to just tease me?","sourceUid":"merged-mqqgnwf4-14","sourceNo":451},{"id":148,"readerNo":149,"displayNo":455,"n":455,"type":"narration","text":"Mọi người?\nCòn ai nữa vậy?\n\n[Thở dài] \n[Nhạc nền vui vẻ bắt đầu]\n다들? 또 누가 그러는데? \n\n[한숨 쉰다]\n[즐거운 배경 음악 시작]\nEveryone?\nWho else does?\n\n[Sighs] \n[Happy background music starts]","sourceUid":"merged-mqqpyvje-3","sourceNo":455},{"id":149,"readerNo":150,"displayNo":459,"n":459,"type":"narration","text":"Em không ăn lạc à?\nSao thế?\nChỉ là…\nEm để dành ăn sau hả?\n땅콩 안 먹어? 왜 안 먹어? 그냥... 나중에 먹으려고 아껴놨던 거야?\nYou don't eat peanuts?\nWhy not?\nJust because...\nWere you saving this for later?","sourceUid":"merged-mqqq2d4w-4","sourceNo":459},{"id":150,"readerNo":151,"displayNo":463,"n":463,"type":"narration","text":"Không ạ.\nHay là hư rồi?\nVậy em làm rơi hả?\n아니요 상한 거야? 아... 아니요 혹시 이거 떨어트렸던 거야?\nNo.\nIs it rotten?\nNo, it's not.\nWas it dropped?","sourceUid":"merged-mqqq5ivm-5","sourceNo":463},{"id":151,"readerNo":152,"displayNo":467,"n":467,"type":"narration","text":"Em nhìn gì thế? Dạ? Sao em nhìn lộ liễu vậy?\n너 어딜 보냐?\n- 예? - 아...\n아니, 저...\n아주 노골적으로 본다\nWhat are you looking at?\nWhat?\nYou were just staring.","sourceUid":"merged-mqqq8czr-6","sourceNo":467},{"id":152,"readerNo":153,"displayNo":338,"n":338,"type":"narration","text":"Có ham muốn cũng đừng thế chứ.\nNhư vậy là quấy rối tình dục đấy.\nKhông, không phải vậy.\n아니... 야, 그래도 아무리 탐나도 그렇지 너... 너 이거 성희롱이야... 아니... 저... 그게 아니고...\nAlthough it must be very tempting, it can be sexual harassment. No, that's not it.","sourceUid":"merged-mqqqa5uq-7","sourceNo":338},{"id":153,"readerNo":154,"displayNo":478,"n":478,"type":"narration","text":"Hóa ra em khác với vẻ bề ngoài.\nXấu hổ quá.\nTại tiền bối đó mà em ghét đi học.\n\n[Thở dài] \n[Nhạc nền vui vẻ kết thúc]\n넌 참... 보기와는 다르구나... 응? 수치스러워... 그 선배 때문에... 학교 가기 싫어요 \n\n[한숨 쉰다]\n[즐거운 배경 음악 끝]\nYou are two-faced.\nSo embarrassing.\nI hate going to school because of him.\n\n[Sighs] \n[Happy background music ends]","sourceUid":"merged-mqqrw0x3-1","sourceNo":478},{"id":154,"readerNo":155,"displayNo":480,"n":480,"type":"narration","text":"Cũng phải, nhìn em là chỉ muốn ghẹo thôi.\n하긴...\n한 대 쥐어박고 싶은 얼굴이긴 해. 네가...\nWell, your face kind of asks for teasing.","sourceUid":"merged-mqqrxop7-2","sourceNo":480},{"id":155,"readerNo":156,"displayNo":485,"n":485,"type":"narration","text":"Cái quần lót vừa nãy không phải của bạn trai chị sao?\nChị xác nhận rồi.\nAnh ấy chỉ mặc quần bó co giãn thôi.\n아까 그 팬티...\n선배 남자친구 거 아니에요?\n벌써 확인했어\n우리 오빠는...\n스판만 입어\nIsn't that underwear your boyfriend's?\nI've already checked.\nHe only wears Spandex ones.","sourceUid":"merged-mqqrz62o-3","sourceNo":485},{"id":156,"readerNo":157,"displayNo":488,"n":488,"type":"narration","text":"Vậy là chị có lý do để đi xác nhận nhỉ?\nGì cơ?\nChị còn lôi nó ra từ túi mình nữa.\nÀ, chuyện đó là vì…\n확인할 만한 일이 있긴 있었단 거네 뭐가? 아까 핸드백 속에서 꺼낸 것도 그렇고 아니... 그거는... 내가 저...\nSo you did have a chance to find that out?\nWhat?\nAnd you had it in your purse as well.\nThat... that was because...","sourceUid":"merged-mqqs2ve1-5","sourceNo":488},{"id":157,"readerNo":158,"displayNo":492,"n":492,"type":"narration","text":"Song, cậu hỏi ma thử xem.\nXem ai dắt trai về nhà.\nTớ là bà đồng hay sao mà bảo nói chuyện với ma?\n송! 귀신한테 물어봐라 누가 남자 데려왔는지 내가 무당이냐? 귀신이랑 대화를 하게\nSong, ask a ghost.\nWho brought a man in?\nAm I a medium? Telling me to talk to a ghost.","sourceUid":"merged-mqqs4jbn-6","sourceNo":492},{"id":158,"readerNo":159,"displayNo":495,"n":495,"type":"narration","text":"Không được à? Vậy là sao?\nCậu nhìn thấy ma nhưng không nói chuyện được à?\n안 돼?\n그게 뭐야?\n그럼 귀신 봐봤자 아무짝에도 쓸모없는 거야?\nYou can't? What is it then?\nYou see a ghost but can't do anything about it?","sourceUid":"merged-mqqsil5y-7","sourceNo":495},{"id":159,"readerNo":160,"displayNo":497,"n":497,"type":"narration","text":"Nếu được thì tớ đã hỏi bao giờ mới có bạn trai rồi.\nLà ma thì phải linh chứ, cho biết cái này cái kia, xổ số chẳng hạn.\n그런 게 가능하면 나 언제 남자 생기는지 그것부터 물어보겠다\n귀신이면 귀신답게 이것저것 알려주고, 어?\nIf I could do such thing, I would ask when I can have a boyfriend.\nGhosts should do their job, like telling us about the future.","sourceUid":"merged-mqqsjkag-8","sourceNo":497},{"id":160,"readerNo":161,"displayNo":500,"n":500,"type":"narration","text":"Chắc chắn là xạo rồi.\nCậu thì thấy được gì, thấy con khỉ ấy.\n로또 번호도 알려주고 그래야지...\n으...\n저거 순 거짓말이야...\n보긴 뭘 봐? 개뿔을 봐\nThat's all a lie.\nYou don't see a jack!","sourceUid":"merged-mqqsnhzj-11","sourceNo":500},{"id":161,"readerNo":162,"displayNo":504,"n":504,"type":"narration","text":"Nhưng tớ biết người nói dối trong số chúng ta đấy.\n\n[Tiếng nước đổ]\n근데...\n우리 중에 거짓말하는 사람이 누군지는 알아\n\n[물 내리는 소리]\nHowever, I know who's lying.\n\n[Tiếng nước đổ]\n[Sound of water falling]","sourceUid":"merged-mqqsq6h6-12","sourceNo":504},{"id":162,"readerNo":163,"displayNo":510,"n":510,"type":"narration","text":"Ai vậy?\nChị Kang.\nSao cậu biết?\nTớ thấy thế.\n\n[Nhạc nền sôi động bắt đầu]\n누군데?\n\n강 언니\n어떻게 알아?\n보여\n예. 예... 아우...\n\n[경쾌한 배경 음악 시작]\nWho is it?\nKang.\nHow do you know?\nI can see it.\n\n[Upbeat background music starts]","sourceUid":"merged-mqqss05z-13","sourceNo":510},{"id":163,"readerNo":164,"displayNo":367,"n":367,"type":"narration","text":"Vâng, đúng rồi.\nCậu nhìn thấy ma, thấy cả người nói dối.\nCái gì cũng thấy được nhỉ?\nCó một thứ gọi là hào quang,\n거짓말도 보이고\n귀신도 보이고\n죄다 보여요?\n사람에게는...\n아우라라는 게 있어\nSurely, of course.\nYou can see lies and ghosts.\nSee everything.\nThere is something called aura,","sourceUid":"merged-mqqsugr4-14","sourceNo":367},{"id":164,"readerNo":165,"displayNo":519,"n":519,"type":"narration","text":"thứ màu sắc tỏa ra từ cơ thể con người.\nVậy thì thôi. Tớ không nói nữa.\nVậy hào quang đó thì sao ạ?\n\n[lè lưỡi và thở phì phò]\n몸 밖으로 뿜어져 나오는 색깔\n\n됐어. 말 안 해\n그래서요? 아우라가 뭐요?\n\n[혀를 내밀며 부엑한다]\ncolor that is coming out of our body.\nI won't tell you then.\nSo, what is aura?\n\n[sticks out tongue and puffs]","sourceUid":"merged-mqqsw2bd-15","sourceNo":519},{"id":165,"readerNo":166,"displayNo":372,"n":372,"type":"narration","text":"Người nói dối sẽ có hào quang tối bao quanh.\nChị Kang tỏa ra hào quang như vậy đấy.\n\n[Nhạc nền sôi động kết thúc]\n거짓말하는 사람의 아우라는...\n색깔이 칙칙해\n\n강 언니 아우라가 딱 그렇거든...\n\n[경쾌한 배경 음악 끝]\nLiar has a darker aura.\nAnd that's how her aura is.\n\n[Upbeat background music ends]","sourceUid":"merged-mqqsxlke-16","sourceNo":372},{"id":166,"readerNo":167,"displayNo":531,"n":531,"type":"narration","text":"Con bé ngây thơ này.\nEm tin lời cậu ấy nổ hả?\nVâng.\nTrời ạ.\nBởi vậy nên em mới dễ bị ghẹo.\n\n[Tiếng đóng cửa] [Tiếng giày]\n아이, 순진아!\n저 뻥을 믿니?\n예\n아이고...\n그러니까 놀림 받지\n에휴...\n[문 닫는 소리][신발소리]\nHey, fool.\nAre you really sold?\nYes.\nWell...\nthat's why you get teased.\n\n[Sound of door closing] [Sound of shoes]","sourceUid":"merged-mqqt0dy7-17","sourceNo":531},{"id":167,"readerNo":168,"displayNo":536,"n":536,"type":"narration","text":"Song! Eun Jae à!\nNhanh đến đây đi. Mau lên!\n- Ra đây! - Sao?\nĐằng kia.\n송! 은재야!\n이리와 봐. 아, 빨리빨리 나와 봐\n- 왜? - 저기 저기...\n[속닥속닥 거린 소리소리]\n[키스 소리 낸다]\nSong! Eun-Jae!\nCome over here! Hurry up!\n-Come out! -Why?\nLook.","sourceUid":"merged-mqqt30wo-18","sourceNo":536},{"id":168,"readerNo":169,"displayNo":541,"n":541,"type":"narration","text":"Thấy rồi à?\nXe xịn nhỉ.\n- Nghề gì? - Nhiêu tuổi?\nQuen được bao lâu rồi?\nTốt bụng làm mai cho chị em đi.\n봤어? 차 좋던데... 뭐 하는 남자야? - 몇 살이야? - 얼마나 됐어? [즐거운 배경 음악 시작]\n새끼 쳐야지. 사회 환원 부의 재분배\nDid you see?\nNice car.\n-What does he do? -How old?\nHow long have you seen him?\nYou should introduce his friends to us.","sourceUid":"merged-mqqtclz7-22","sourceNo":541},{"id":169,"readerNo":170,"displayNo":549,"n":549,"type":"narration","text":"Chị đừng đi như thế chứ.\n- Thắc mắc gì nào? - Tất tần tật.\nNghề nghiệp là gì?\nBác sĩ nha khoa.\nThật sao?\n[한숨 쉰다]\n에에이... 그냥은 못 가지\n뭐가 궁금한데?\n다 궁금해\n뭐 하는 사람이야?\n치과의사\n진짜?\nYou can't just walk away.\n-What do you want to know? -Everything.\nWhat does he do?\nDentist.\nReally?","sourceUid":"merged-mqqtfjyw-23","sourceNo":549},{"id":170,"readerNo":171,"displayNo":557,"n":557,"type":"narration","text":"Bao nhiêu tuổi?\n38 hay 39 gì đấy.\nThế là chú rồi còn gì.\nCon anh ấy đi du học.\n- Có vợ rồi? - Ừ.\nTất nhiên.\n젠장할!\n몇 살이야?\n서른여덟인가 아홉인가?\n우응... 완전 아저씨잖아\n기러기 아빠야\n- 유부남이야? - 그렇지\n[즐거운 배경 음악 끝]\n[신발소리]\nHow old?\nThirty-eight or thirty-nine?\nWell, that's too old.\nHis family is overseas.\n-Is he married? -Yes.\nIs it...","sourceUid":"merged-mqqtoe50-24","sourceNo":557},{"id":171,"readerNo":172,"displayNo":564,"n":564,"type":"narration","text":"Mọi người ơi.\nLà do tớ quê mùa à?\nTớ thấy sốc thì có lạ lắm không?\nEm cũng sốc mà.\n저기...\n[문 닫는 소리]\n내가 촌스러운 거야? 아니면...\n여기서 놀라운 내가 이상한 거야?\n나도 놀랐어요\n넌 촌스러운...\n아...\nAm I too old-fashioned? Or... is it weird that I am shocked? I am shocked too. You are tacky.","sourceUid":"merged-mqqtui6i-26","sourceNo":564},{"id":172,"readerNo":173,"displayNo":568,"n":568,"type":"narration","text":"Do em quê mùa đấy.\nHóa ra chị ấy sống trong một thế giới tốt đẹp như vậy.\nƯớc gì có sao nào rơi xuống, ai có bồ hay không cũng chết hết.\n세상 참...\n저 좋을 대로 사는구나\n어디서 소행성 하나 날아왔으면 좋겠다\n있는 년이나 없는 년이나 아주 한 방에 죽게\nShe lives in her own world. I hope an asteroid comes down, so everyone will die at once, with or without a boyfriend.","sourceUid":"merged-mqrikavc-1","sourceNo":568},{"id":173,"readerNo":174,"displayNo":572,"n":572,"type":"narration","text":"Sao vậy?\nChị ấy thẳng thắn như thế,\nchắc không phải là người nói dối đâu.\n흠...\n왜?\n저렇게 솔직한데...\n강 언니가 거짓말할 사람은 아닌 것 같아서요\nWhy?\nShe is so frank.\nI don't think she would lie.","sourceUid":"merged-mqriot4q-2","sourceNo":572},{"id":174,"readerNo":175,"displayNo":577,"n":577,"type":"narration","text":"Đúng không? Chị nói rồi mà. Mấy thứ cậu ấy nói đều là chém gió thôi.\n그치? 내가 그랬잖아 아유 저건 그냥 순 거짓말이야 뻥쟁이... 뻥쟁이... 어휴... [전화벨 소리] [문자 알람]\nRight?\nI told you.\nAll she says are lies and bluffs.","sourceUid":"merged-mqrirzf3-3","sourceNo":577},{"id":175,"readerNo":176,"displayNo":411,"n":411,"type":"narration","text":"TÔI CÓ CHUYỆN MUỐN NÓI. EM HÃY NGHE MÁY ĐI.\n[경쾌한 테마 음악 시작]\nI HAVE SOMETHING TO SAY, PLEASE ANSWER THE PHONE.","sourceUid":"merged-mqriz71c-4","sourceNo":411},{"id":176,"readerNo":177,"displayNo":583,"n":583,"type":"narration","text":"- Các bạn mang nguyên liệu về chỗ nhé. - Vâng.\nNhìn này.\nMón hôm nay là lẩu nấm.\n(강사) 자 각자 재료들 가지고 자리에 앉습니다\n네...\n거봐, 너 많이 먹었네...\n자... 오늘 함께할 요리는...\n버섯전골입니다\n-Please take a seat with your ingredients. -Yes. Look at this. Today's dish is mushroom hot pot.","sourceUid":"merged-mqrj4qw7-5","sourceNo":583},{"id":177,"readerNo":178,"displayNo":585,"n":585,"type":"narration","text":"Với dự án thứ tư về vấn đề xã hội, ta có nên đi sâu vào vấn đề bất bình đẳng xã hội?\n(송지원) 이 사회고 아이템 기획서 네 번째 금수저, 흙 수저 관문에 대해 우리가 본격적으로\nFor our fourth project,\nhow about we take a close look at social inequality?","sourceUid":"merged-mqrj7jo0-6","sourceNo":585},{"id":178,"readerNo":179,"displayNo":587,"n":587,"type":"narration","text":"Thử có một cái nhìn khác biệt từ góc độ sinh viên.\nNhàm quá. Loại.\n다루어보는 건 어떻습니까?\n우리가 대학생의 시각에서 차별화시켜 보는 겁니다\n음... 식상해요. 바로 킬할게요\nWe can differentiate it from a college student's point of view. That's lame.","sourceUid":"merged-mqrjf3xv-8","sourceNo":587},{"id":179,"readerNo":180,"displayNo":596,"n":596,"type":"narration","text":"Còn ai chuẩn bị gì không?\n다른 아이템 준비하신 분...\n[웃는다]\n(강사) 페이지 302호\n(강사) 작은 3번에\n[하품한다]\n[가위질 소리]\nAny other item?","sourceUid":"merged-mqrjg7f4-9","sourceNo":596},{"id":180,"readerNo":181,"displayNo":601,"n":601,"type":"narration","text":"Chị về rồi ạ?\nChết mất thôi.\nEm thật là sướng,\n오셨어요\n[경쾌한 테마 음악 끝]\n[하품한다]\n죽겠다\n넌 좋겠다\nHi.\nSo tired.\nIt must be nice,","sourceUid":"merged-mqrjjzf3-10","sourceNo":601},{"id":181,"readerNo":182,"displayNo":604,"n":604,"type":"narration","text":"vẫn chưa phải đi tìm việc làm.\nHãy chơi cho đã khi còn có thể đi.\n취업 전선에서 머나먼 후방이잖아\n어...\n놀 수 있을 때 실컷 놀아\nyou don't have to worry about a job yet.\nEnjoy while you can.","sourceUid":"merged-mqrjnksg-11","sourceNo":604},{"id":182,"readerNo":183,"displayNo":429,"n":429,"type":"narration","text":"Play hard when you play.\nHoa sớm nở chóng tàn mà.\nEvery day will be gone very soon.\nĐến năm tư chắc còn khốc liệt hơn.\nNăm tư cũng có nhiều kiểu mà.\nPlay hard when you play\n꽃 날은 금방 간단다\nHappy day will be gone very soon\n에이씨... 4학년 되면 더하겠지?\n4학년도 4학년 나름이지\nPlay hard when you play.\nFlowers fall soon.\nEvery day will be gone very soon.\nIt will get worse when I am a senior.\nIt depends.","sourceUid":"merged-mqrjq6p3-12","sourceNo":429},{"id":183,"readerNo":184,"displayNo":612,"n":612,"type":"narration","text":"Nhìn chị Kang xem. Không chứng chỉ, cũng không màng điểm số.\n강 언니 봐라\n자격증은 고사하고\n학점관리도 안 하잖아\nLook at Kang, she doesn't care about getting certificates, not even her GPA.","sourceUid":"merged-mqrjrt1j-13","sourceNo":612},{"id":184,"readerNo":185,"displayNo":431,"n":431,"type":"narration","text":"Cũng đúng.\nChị Kang sướng thật.\nTốt nghiệp rồi thì vào công ty bố làm.\n하긴...\n강 언니 좋겠다\n졸업하면 아빠 회사에 취직하고\nThat's true.\nI envy her.\nShe can work at her dad's company.","sourceUid":"merged-mqrjsy3k-14","sourceNo":431},{"id":185,"readerNo":186,"displayNo":434,"n":434,"type":"narration","text":"Bố chị ấy làm gì vậy ạ?\nNghe nói có nhà máy làm bát.\nSao tớ nghe nói làm khăn giấy ướt?\n강 언니 아빠가 뭐 하시는데요?\n그릇공장 한대\n에?\n난 물티슈 만든다고 들었는데\nWhat does her father do?\nRuns a pottery factory.\nI heard it was baby wipes.","sourceUid":"merged-mqrjuo82-15","sourceNo":434},{"id":186,"readerNo":187,"displayNo":437,"n":437,"type":"narration","text":"Tóm lại là vậy đó.\nGiàu nứt đố đổ vách.\nChắc phải sướng lắm\n아무튼 뭐 그런 거 한대\n완전 알짜 부자\n얼마나 좋을까?\nAnyway, something like that.\nReally rich.\nIt must be wonderful,","sourceUid":"merged-mqrjwfnj-16","sourceNo":437},{"id":187,"readerNo":188,"displayNo":626,"n":626,"type":"narration","text":"khi từ đầu đến chân toàn là hàng hiệu.\nMột mình một phòng luôn.\nĐừng nhìn lên cao mà nhìn xuống đi.\n머리끝에서 발끝까지\n명품에서 명품에다가\n방도 혼자 쓰고\n높은 데 말고 낮은 델 봐라\ncovered in luxurious goods from head to toe,\nand having her own room.\nLook down, not up.","sourceUid":"merged-mqrk01a8-17","sourceNo":626},{"id":188,"readerNo":189,"displayNo":636,"n":636,"type":"narration","text":"Cậu vẫn hơn tiền bối Yoon.\nThì đúng là vậy.\nHay nhờ chị Kang xin việc ở công ty bố chị ấy?\nMe too.\n윤 선배 아닌 게 어디냐?\n그건 그래...\n아유...\n우휴...\n강 언니 아빠 회사에다가 나 좀 꽂아달라 그럴까?\nMe too!\n[개가 짖는다]\n어이고...\n[노래 부른다]\n[문 닫는 소리]\nYou are still better than Yoon. That is true. Maybe I can ask Kang for a job. Me too. [sings] [Sound of door closing]","sourceUid":"merged-mqrkwnwi-18","sourceNo":636},{"id":189,"readerNo":190,"displayNo":647,"n":647,"type":"narration","text":"Sao càng ngày cậu trang điểm càng lâu thế? Gì chứ.\n어째 화장의 런닝타임이 갈수록 길어진다 뭐가...\nIt is taking longer and longer for your make-up.\nNo, it's not.","sourceUid":"merged-mqrmiwo0-1","sourceNo":647},{"id":190,"readerNo":191,"displayNo":648,"n":648,"type":"narration","text":"Phát video] [Cười] [Nhạc nền vui vẻ bắt đầu] [âm thanh gõ-tap] [Cười khúc khích] [Âm thanh từ video] [Âm thanh nước hoa được xịt]\n[동영상 재생] [웃는다] [즐거운 배경 음악 시작] [톡톡 소리] [킬킬 댄다] [동영상에서 나는 소리] [향수 뿌리는 소리]\n[Video Play]\n[Laughs]\n[Happy background music starts]\n[tap-tap sound]\n[Giggles]\n[Sound from video]\n[Sound of perfume being sprayed]","sourceUid":"merged-mqrmjf9y-2","sourceNo":648},{"id":191,"readerNo":192,"displayNo":651,"n":651,"type":"narration","text":"Giờ anh mới dậy. Làm sao đây?\nTóm lại anh sẽ tới trễ bao lâu?\n(고두영) 앗. 지금 일어났다 어떡하지\nI just woke up.\nSo how late will you be?","sourceUid":"merged-mqrn3bk7-4","sourceNo":651},{"id":192,"readerNo":193,"displayNo":659,"n":659,"type":"narration","text":"Em đang ở đâu?\nChắc anh đến trễ cỡ 30 phút.\nÀ, may quá.\nChắc em cũng sẽ muộn.\nChắc em cũng đến tầm đấy.\n\n(Jeong Ye Eun)\n[Báo động văn bản]\n(Go Doo Young)\n[Nhạc nền vui vẻ kết thúc]\n[Thở dài]\n[bực mình]\n[Tiếng chuông reo]\n(정예은)\n[문자 알람]\n(고두영)\n[즐거운 배경 음악 끝]\n[한숨 쉰다]\n[짜증 낸다]\n[종 울린 소리]\nWhere are you? Maybe about 30 minutes. Oh, it's a good thing. I was running late as well. I will be there at about the same time.\n\n(Jeong Ye-eun)\n[Text Alarm]\n(Go Doo-young)\n[Happy background music ends]\n[Sighs]\n[gets annoyed]\n[Bell ringing]","sourceUid":"merged-mqrnyd54-5","sourceNo":659},{"id":193,"readerNo":194,"displayNo":661,"n":661,"type":"narration","text":"Mình lại nói dối rồi. Đến sớm nhưng lại giả vờ đến muộn.\n또 거짓말을 해버렸다 일찍 왔는데도 늦은 척\nI lied again. I pretended like I was late.","sourceUid":"merged-mqrugjeb-1","sourceNo":661},{"id":194,"readerNo":195,"displayNo":664,"n":664,"type":"narration","text":"Nhớ đến phát điên nhưng lại giả vờ không có gì. Trang điểm tỉ mỉ rồi lại vờ như chả bận tâm.\n보고 싶어 죽겠으면서도 안 보고 싶은 척 공들여 화장하고도 막 나온 척\n\n[경쾌한 배경 음악 시작]\nPretended like I didn't miss him much.\nPretended like I didn't care much about getting dressed.","sourceUid":"merged-mqruhbni-2","sourceNo":664},{"id":195,"readerNo":196,"displayNo":666,"n":666,"type":"narration","text":"Giả vờ hết thứ này đến thứ kia.\nNhư đứa ngốc vậy.\n이런 척 저런 척 뭔가 바보 같아\nPretended all that.\nI feel foolish.","sourceUid":"merged-mqruhwzr-3","sourceNo":666},{"id":196,"readerNo":197,"displayNo":667,"n":667,"type":"narration","text":"Là chị Kang chắc sẽ không vậy.\n강 언니라면 안 그럴 텐데...\nKang would be different.","sourceUid":"merged-mqruwdsu-4","sourceNo":667},{"id":197,"readerNo":198,"displayNo":668,"n":668,"type":"narration","text":"Tên khốn điên khùng.\n아이. 미친...\nSon of a bitch.","sourceUid":"merged-mqruwlgo-5","sourceNo":668},{"id":198,"readerNo":199,"displayNo":472,"n":472,"type":"narration","text":"Nếu là tiền bối Yoon? Đợi đúng mười phút thôi đấy. Có thế mà cũng muộn là sao? Anh đi mà trả tiền cơm với rượu đi! Em sẽ ăn món đắt tiền. Không sao đâu, anh cứ thong thả.\n(정예은) 윤 선배라면...\n[문자 알람]\n앗. 지금 일어났다. 어떡하지\n(윤진명)\n아, 왜 늦고 지랄이야!\n밥 네가 사. 술도 네가 사!\n비싼 거 먹을 테다!\n(유은재)\nHow about Yoon? I will give you exactly ten minutes. What, late? You need to buy dinner, and drinks too! I will order expensive ones. It's okay, take your time.","sourceUid":"merged-mqruyvwp-6","sourceNo":472},{"id":199,"readerNo":200,"displayNo":680,"n":680,"type":"narration","text":"Mỗi mình kỳ lạ sao? Em đang làm gì đấy? Em bảo đến muộn mà. Sao lại ở đây?\n\n[Nhạc nền sôi động kết thúc]\n(정예은) 나만 이상한 건가?\n\n(고두영) 여기서 뭐 해? 늦는다며?\n왜 여깄어?\n\n[경쾌한 배경 음악 끝]\nAm I weird? What are you doing? Weren't you late? Why are you here?\n\n[Upbeat background music ends]","sourceUid":"merged-mqruzmdu-7","sourceNo":680},{"id":200,"readerNo":201,"displayNo":684,"n":684,"type":"narration","text":"Em vừa đến nhưng hơi khát nước chút. Trời hôm nay đẹp nhỉ?\n아... 방금 왔는데... 잠깐 목이 말라서 응... 아... 날씨 되게 좋다 하...\nI just got here and felt thirsty. What a nice weather.","sourceUid":"merged-mqrv07li-8","sourceNo":684},{"id":201,"readerNo":202,"displayNo":691,"n":691,"type":"narration","text":"Anh không biết hôm nay là ngày gì đúng không?\nBiết chứ.\n- Thật không? - Dĩ nhiên.\nAnh cũng chuẩn bị quà rồi.\n오늘이 무슨 날인지 모르지?\n알아\n알아? 진짜?\n그럼! 나도 선물 준비했어\n[웃는다]\n[배경 음악 시작]\n아...\nYou don't know what today is, do you?\nI do.\n-Do you, really? -Of course.\nI got a present too.","sourceUid":"merged-mqrw6x3d-9","sourceNo":691},{"id":202,"readerNo":203,"displayNo":701,"n":701,"type":"narration","text":"Đẹp nhỉ? Anh ưng không?\nỪ, rất ưng.\nCòn quà của em?\nQuà em đâu?\nÀ, quà sao?\nChờ anh lát.\nAnh để quên ở nhà rồi.\nĂn cơm rồi đi lấy nhé.\n오... 오!\n오...\n예쁘지? 마음에 들어?\n응, 완전!\n내 선물\n내 선물!\n아, 선물\n아 잠깐... 잠깐만...\n아...\n아. 집에 놓고 왔다\n밥 먹고 가지러 가자\nDo you like it?\nPerfect.\nMine now.\nPresent for me.\nOh, yours.\nHold on.\nI left it at home.\nLet's go get it later.","sourceUid":"merged-mqrwvt14-12","sourceNo":701},{"id":203,"readerNo":204,"displayNo":492,"n":492,"type":"narration","text":"[Nhạc nền kết thúc]\n[Tiếng mở ngăn kéo]\nĐây.\nKhông có thời gian nên anh không kịp gói quà.\nThứ bên trong mới quan trọng.\n[배경 음악 끝]\n[서랍 여는 소리]\n자!\n아이... 시간이 없어서 포장을 못 했다\n내용이 중요하지 뭐...\n[Background music ends]\n[Sound of drawer opening]\n\nHere.\nSorry, I didn't have the time to wrap.\nImportant thing is inside.","sourceUid":"merged-mqrwwv2v-13","sourceNo":492},{"id":204,"readerNo":205,"displayNo":718,"n":718,"type":"narration","text":"Em không mở ra à?\nÀ, ừ.\nLà nước hoa à?\nSao, em không thích hả?\nĐâu có.\nVì nó rẻ sao?\nKhông, đâu có.\nCảm ơn anh nhé.\n안 열어봐?\n어? 어...\n아이... 향수네...\n왜?\n마음에 안 들어?\n아니...\n싼 거라 그래?\n아니야. 안 그래\n고마워\n아...\n아이...\nWill you open it?\nYes.\nIt's perfume.\nWhy, you don't like it?\nI do.\nIs it too cheap?\nNo, it's not.\nThank you.","sourceUid":"merged-mqrx1rni-15","sourceNo":718},{"id":205,"readerNo":206,"displayNo":501,"n":501,"type":"narration","text":"Lần sau anh sẽ tặng em thứ tốt hơn. Quà đắt tiền luôn.\n다음엔 더 좋은 거 사줄게\n비싼 거...\n응?\nI will get you something better next time. Expensive one.","sourceUid":"merged-mqrx4nhb-16","sourceNo":501},{"id":206,"readerNo":207,"displayNo":727,"n":727,"type":"narration","text":"[tiếng hôn]\n[Nhạc nền vui vẻ bắt đầu]\n[Thở dài]\n[Tiếng mở cửa]\n[âm thanh xào xạc]\n[키스 소리] [즐거운 배경 음악 시작] [한숨 쉰다] [문 여는 소리] [부스럭 거리는 소리]\n[kissing sound]\n[Happy background music starts]\n[Sighs]\n[Sound of door opening]\n[rustling sound]","sourceUid":"merged-mqrx4w34-17","sourceNo":727},{"id":207,"readerNo":208,"displayNo":733,"n":733,"type":"narration","text":"Cậu dùng cái này không?\nGì thế?\nCửa hàng mỹ phẩm trước trường tặng quà khai trương.\nÀ, đây là mẫu tặng dùng thử nhỉ?\n(송지원) 이거 너 쓸래? (정예은) 뭔데? 학교 앞에 화장품가게 생겼더라... 오픈 사은품이래 으응... 사은품으로 이런 걸 줘? [한숨 쉰다]\nYou want to use this? What is it? New cosmetic store in front of the school was giving them out. I see. They give these out for free?","sourceUid":"merged-mqrxd03s-18","sourceNo":733},{"id":208,"readerNo":209,"displayNo":739,"n":739,"type":"narration","text":"Anh ta vẫn ở đó nhỉ. Nãy tớ đi cửa hàng tiện lợi đã thấy anh ta rồi. Chả biết bao lâu rồi.\n아직도 있네 아까 편의점 갈 때도 있더니 몇 시간째야? 어!\nStill there. He was there earlier when I was going to the store. How long has it been?","sourceUid":"merged-mqrxjgld-19","sourceNo":739},{"id":209,"readerNo":210,"displayNo":735,"n":735,"type":"narration","text":"[Tiếng ném] [Tiếng đóng ngăn kéo]\n[던지는 소리] [서랍 닫는 소리]\n[Throwing sound]\n[Sound of drawer closing]","sourceUid":"merged-mqrxjo0u-20","sourceNo":735},{"id":210,"readerNo":211,"displayNo":746,"n":746,"type":"narration","text":"Em nhận bó hoa này đi. Dự cảm xấu đúng là không sai chút nào. Sao tôi phải nhận? Biết ngay là của chị Kang mà.\nBao giờ tớ mới được như thế?\nCậu muốn được như thế hả?\nTớ chả thích tí nào.\n이나 씨, 이 꽃 좀 받아 주십시오 에효! 슬픈 예감은 빗나가질 않는구나 (강이나) 내가 왜 받아야 되죠? 강 언니일 거라고 짐작은 했다만\n난 언제 저런 꼴을 당해보나\n저게 좋아?\n난 딱 싫어. 완전 싫어\nPlease take these flowers. Sad feeling always becomes true. Why should I? I knew it was for Kang.\nWill I ever face that situation?\nDo you want to?\nI absolutely hate it.","sourceUid":"merged-mqrzhgq7-22","sourceNo":746},{"id":211,"readerNo":212,"displayNo":521,"n":521,"type":"narration","text":"Thế à?\nTớ lại thấy ghen tị.\nGhen tị?\nVì cậu cũng muốn có người cầm hoa đứng chờ?\nGiờ đâu còn là thập niên 90 nữa.\nQuá ư là lỗi thời rồi.\n그래?\n난 좀 부러운데...\n뭐야?\n꽃 들고 집 앞에서 기다리는 게 부러워?\n지금이 무슨 쌍팔년도 아니고...\n촌스러. 촌스러\n완전 촌스러워\nYeah?\nI envy her.\nEnvy?\nFor having someone waiting for you?\nWe are not living in the '90s.\nToo old-fashioned.","sourceUid":"merged-mqrznoh1-23","sourceNo":521},{"id":212,"readerNo":213,"displayNo":524,"n":524,"type":"narration","text":"Tớ mà bị ám kiểu đó thì cũng chả thích nổi.\nVậy hả?\nEm chưa biết gì về tôi mà.\n남자가 저러면 난 좋다가도 싫어질 것 같은데\n그런가?\n내가 어떤 사람인지 모르잖아요\nIf a man haunts me I could never like him.\nReally?\nYou don't know about me.","sourceUid":"merged-mqrzphb2-25","sourceNo":524},{"id":213,"readerNo":214,"displayNo":525,"n":525,"type":"narration","text":"Chưa biết thì sao lại ghét tôi chứ?\nAnh biết về tôi sao?\nChưa biết về tôi sao lại thích tôi?\n\n[Nhạc nền sôi động kết thúc]\n날 알지도 못하면서 왜 싫다고만 해요 그쪽은 나 알아요? 얼마나 안다고 날 좋다고 하는 거예요? [경쾌한 배경 음악 끝]\nHow can you reject me without even knowing me?\nDo you know me?\nHow can you like me without knowing me?\n\n[Upbeat background music ends]","sourceUid":"merged-mqrzs611-27","sourceNo":525},{"id":214,"readerNo":215,"displayNo":530,"n":530,"type":"narration","text":"Chúng ta cũng như nhau mà, chỉ đánh giá vẻ ngoài.\nTôi không có hứng thú với anh. Sau này cũng thế.\nNên sau này đừng làm vậy nữa.\n겉모습만 갖고 이러는 건 우리 둘 다 마찬가지고...\n난 댁한테 관심 없어요 앞으로도 없을 거고\nWe are in the same position judging others by its cover.\nAnd I have no interest in you, and I never will.\nSo please stop this.","sourceUid":"merged-mqrzuje4-28","sourceNo":530},{"id":215,"readerNo":216,"displayNo":766,"n":766,"type":"narration","text":"Anh cứ thử…\ngọi điện lần nữa xem.\n그러니까... 다신 이런 짓 하지 마요\n전화...\n한 번만 더 해봐\n[구두 소리]\nDon't ever...\ncall me again.","sourceUid":"merged-mqrzvmnk-29","sourceNo":766},{"id":216,"readerNo":217,"displayNo":533,"n":533,"type":"narration","text":"Tình yêu là gì…\nÀ, cậu nhận được quà gì rồi?\n[TV 소리]\n에효효효효...\n사랑이 뭔지...\n참!\n선물 뭐 받았어?\nWhat is love...\nRight, what did you get from him?","sourceUid":"merged-mqrzxe4y-30","sourceNo":533},{"id":217,"readerNo":218,"displayNo":775,"n":775,"type":"narration","text":"Nay là ngày gì ạ? Kỷ niệm một năm quen nhau đấy. Cậu ấy không uống cà phê một tháng để mua quà cho bạn trai đấy.\n어?\n정 선배. 무슨 날이에요?\n오빠야 만난 지 일 주년이란다\n지 남친 선물 사준다고 한 달 동안 커피를 끊었어 얘가...\nWas it a special day?\nToday is their one-year anniversary.\nShe stopped drinking coffee for a month to buy his present.","sourceUid":"merged-mqs004yh-31","sourceNo":775},{"id":218,"readerNo":219,"displayNo":541,"n":541,"type":"narration","text":"Quả là người phụ nữ đức hạnh.\nAnh ấy tặng gì cho cậu?\nTúi xách? Nhẫn?\nCậu tò mò làm gì?\n우리 집 앞에 열녀문 들어서는 줄 알았다\n오빠야가 뭐 해줬어?\n가방?\n반지?\n뭐가 그렇게 궁금해?\nWhat a devoted woman.\nWhat did he get you?\nPurse? Ring?\nWhy are you so curious?","sourceUid":"merged-mqs02fi4-32","sourceNo":541},{"id":219,"readerNo":220,"displayNo":785,"n":785,"type":"narration","text":"Là để vui lây đó. Cho xem tí đi.\nHiểu rồi.\nAnh ấy quên chứ gì.\nKhông phải!\n대리만족이라는 게 있잖아...\n구경 좀 하자...\n옳다구나\n까먹었구나!\n아니야...\nFor vicarious pleasure, show it to me.\nI get it.\nHe forgot!\nNo, he didn't!","sourceUid":"merged-mqs04gq5-33","sourceNo":785},{"id":220,"readerNo":221,"displayNo":792,"n":792,"type":"narration","text":"Hóa ra cuối tuần này, anh ấy lên kế hoạch du lịch hai ngày một đêm.\nSướng nhỉ.\nĐi đâu?\nChuncheon.\nVậy thì mặt mũi cậu sao thế?\nNhư bị cho leo cây vậy?\n주말에...\n1박 2일 여행 계획 짜왔더라고\n좋겠다\n어디로?\n춘천\n근데 얼굴이 왜 그러냐?\n바람맞은 년처럼\nHe planned a weekend trip. Nice. To where? Chuncheon. Then what's wrong with you? Like you've been stood up.","sourceUid":"merged-mqs06803-34","sourceNo":792},{"id":221,"readerNo":222,"displayNo":795,"n":795,"type":"narration","text":"Ai bảo không hỏi lịch của tớ trước.\nSướng quá sinh hư nhỉ.\nNgười ăn không hết kẻ lần chẳng ra.\n내 스케줄은 물어도 안 보니까 그렇지...\n이런 부러운 년\n호강에 겨워 요강에 똥을 싸는구먼\nHe didn't even ask about my schedule.\nSo spoiled.\nYou don't even realize what you have.","sourceUid":"merged-mqs08v6u-35","sourceNo":795},{"id":222,"readerNo":223,"displayNo":797,"n":797,"type":"narration","text":"Hai người định làm gì suốt hai ngày một đêm đấy?\nLàm hết thứ này đến thứ kia nhỉ?\n1박 2일씩이나 뭐할 거야?\n이것도 하고... 요것도 하고... 그럴 거지?\nWhat are you going to do for two days?\nAre you going to do this and that?","sourceUid":"merged-mqs09x3f-36","sourceNo":797},{"id":223,"readerNo":224,"displayNo":801,"n":801,"type":"narration","text":"Thôi giùm đi!\nCậu sao vậy?\nMở miệng ra là làm tình. Cậu là biến thái à?\n응? 응? 아... 쫌! 너 왜 그래? 입만 열면 섹스. 섹스. 너 변태야?\nKnock it off!\nWhat's wrong with you?\nEvery conversation is about sex. Are you a pervert?","sourceUid":"merged-mqs0b7l2-37","sourceNo":801},{"id":224,"readerNo":225,"displayNo":560,"n":560,"type":"narration","text":"Này,\ntớ chỉ đùa thôi mà.\nCó thể với cậu là đùa, nhưng tớ thấy bị quấy rối tình dục.\nCậu dạo này hơi quá rồi đấy.\nĂn nói tùy tiện quá rồi đấy.\n야아... 그냥 농담 좀 한 걸 가지고... 넌 농담인지 모르지만 난 성희롱 당하는 기분이야 너 요새 여러 가지로 좀 심해\nHey,\nI was just joking.\nIt might be joke for you, but I feel like I'm being harassed.\nYou've gone too far lately.\nYou are so insensitive.","sourceUid":"merged-mqs0gvgw-39","sourceNo":560},{"id":225,"readerNo":226,"displayNo":567,"n":567,"type":"narration","text":"Còn trước đó cậu nói gì?\nCậu nói chị Kang nói dối, cậu thấy hào quang tối từ chị ấy mà!\nÀ…\n말을 막 하잖아\n너 그리고 전에 뭐라고 그랬어? 강 언니가 거짓말하는 거라며?\n거짓말의 아우라가 보인다며?\n이씨...\n[신발소리]\nAnd what did you say before?\nYou said Kang is lying and you can see the aura!\nWell...","sourceUid":"merged-mqs0hmfj-40","sourceNo":567},{"id":226,"readerNo":227,"displayNo":568,"n":568,"type":"narration","text":"Ý em là… Em giỏi quá nhỉ. Sao biết chị nói dối vậy?\n[TV 소리]\n아...\n저기...\n내 말은...\n너 용하다. 나 거짓말하는 거 어떻게 알았을까?\nI meant...\nYou are good. How did you know I was lying?","sourceUid":"merged-mqs0jw60-41","sourceNo":568},{"id":227,"readerNo":228,"displayNo":818,"n":818,"type":"narration","text":"Tiếng đóng cửa]\n[tiếng chó sủa]\n[Báo động văn bản]\n[문 닫는 소리]\n[개가 짖는다]\n[문자 알람]\n[Sound of door closing] [dog barks] [Text Alarm]","sourceUid":"merged-mqs0mky6-42","sourceNo":818},{"id":228,"readerNo":229,"displayNo":822,"n":822,"type":"narration","text":"Khi nãy tớ hơi quá đáng.\nTớ cũng xin lỗi.\n(송지원) 아까는 내가 심했다 (정예은) 나도 미안\nI went too far.\nI am sorry too.","sourceUid":"merged-mqs0njxu-43","sourceNo":822},{"id":229,"readerNo":230,"displayNo":823,"n":823,"type":"narration","text":"Cười]\n[Nhạc nền sôi động bắt đầu]\n[Báo động haha\n[Cười]\n[Nhạc nền sôi động kết thúc]\n[Âm nhạc truyền thống bắt đầu]\n(송지원) ㅋㅋㅋ\n[웃는다]\n[경쾌한 배경 음악 끝]\n[전통적인 음악 시작]\n(Song Ji-won) Hahaha [Laughs] [Upbeat background music ends] [Traditional music begins]","sourceUid":"merged-mqs16f0q-50","sourceNo":843},{"id":236,"readerNo":237,"displayNo":860,"n":860,"type":"narration","text":"Lại nữa rồi! Thôi, biết rồi. Đi vui nhé. Ôi, hồi hộp quá. Em đi rồi về nhé. Đi chơi vui. Chờ đã.\nChỗ này không đáng bao nhiêu,\nnhưng hãy dùng nó mua rượu vang với nến nhé.\nCòn thừa thì mua thêm tinh dầu thơm.\n아, 너 또?\n그건 됐고...\n잘 가\n나 떨려... 갔다 올게\n갔다 와\n아, 잠깐, 잠깐\n이거 얼마 안 되는데...\n이걸로 와인이랑 향초사고...\nAgain? No, never mind. Bye. I'm so excited, I'll be back. Take care. Wait a minute. This isn't much. Buy some wine and candle with this, and aroma oil if you can.","sourceUid":"merged-mqs1d8wu-56","sourceNo":860},{"id":237,"readerNo":238,"displayNo":855,"n":855,"type":"narration","text":"[Âm nhạc truyền thống kết thúc]\n[전통적인 음악 끝]\n[Traditional music ends]","sourceUid":"ko-mql0e9i6-1690","sourceNo":855},{"id":238,"readerNo":239,"displayNo":870,"n":870,"type":"narration","text":"Em đi thật đây. - Chào. - Tạm biệt. Chơi cả phần của tớ luôn nhé. Cố lên! - Cố lên! - Cố lên! Đi đây.\n남으면 아로마 오일도 사서... 에이 진짜... 나 갈께 나 진짜 간다, 간다 잘 가... 내 몫까지 하고 와라! 파이팅! 파이팅! - 파이팅! - 다녀오세요... 간다...\nI'll get going, for real.\n-Bye. -Bye.\nEnjoy your time for me.\nCheer up!\n-Cheer up! -Cheer up!\nBye all.","sourceUid":"merged-mqs1g5qs-57","sourceNo":870},{"id":239,"readerNo":240,"displayNo":872,"n":872,"type":"narration","text":"[Cười] [Bíp bíp bíp tiếng cửa] [Tiếng đóng cửa]\n[웃는다]\n[삑삑삑 문소리]\n[문 닫는 소리]\n[Laughs] [Beep beep beep sound of door] [Sound of door closing]","sourceUid":"merged-mqs1gayt-58","sourceNo":872},{"id":240,"readerNo":241,"displayNo":603,"n":603,"type":"narration","text":"Một nghìn won.\nEm thỏa mãn chứ?\n천원... 천원... 불필요해?\nMy phone.\nPhone.\nWas it good?","sourceUid":"merged-mqs54kr7-59","sourceNo":603},{"id":241,"readerNo":242,"displayNo":
