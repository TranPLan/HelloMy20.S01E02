:"narration","text":"[문 닫는 소리]","sourceUid":"ko-mql0e9i7-1759","sourceNo":924},{"id":252,"readerNo":253,"displayNo":946,"n":946,"type":"narration","text":"- Đêm qua chị còn mộng tinh. - Trời ạ.\n- Trong mơ, chị đã… - Chị đừng nói nữa.\nKhông muốn nghe thì thôi.\nChuyện thú vị thế cơ mà.\n- Tiền bối. - Sao?\nEm muốn nghe chứ gì?\n어젯밤엔 몽정도 했어 - 아아... - 꿈속에서 내가... 그만 해요. 진짜... 진짜... 싫으면 말아라 되게 재밌는 얘긴데... 치... 선배! 왜? 듣고 싶지\n-I even had a wet dream last night. -Oh, no-- -In the dream, I was-- -Seriously, stop it. I will, then. It would've been really interesting. -Song. -What? You want to hear?","sourceUid":"merged-mqs5k0vf-73","sourceNo":946},{"id":253,"readerNo":254,"displayNo":950,"n":950,"type":"narration","text":"Trong giấc mơ đêm qua, trong mưa chị đã…\nKhông phải cái đó.\nViệc chị bảo có ma ở kia.\nNó trông thế nào vậy?\n어젯밤 꿈에 내가 빗속에서... 아뇨. 그거 말고 저기 있다는 그 귀신 말이에요 어떻게 생겼어요?\nLast night in the dream, I was in rain--\nNo, not that one.\nThat ghost over there...\nwhat does it look like?","sourceUid":"merged-mqs5l0ft-74","sourceNo":950},{"id":254,"readerNo":255,"displayNo":956,"n":956,"type":"narration","text":"Em cũng thắc mắc là nam hay nữ à? Sao ai cũng thắc mắc chuyện đó vậy? Chị Kang và tiền bối Yoon cũng thế. - Cả tiền bối Yoon ạ? - Ừ.\n너도 저게 여잔지 남잔지 궁금해?\n예?\n왜들 그게 궁금하지?\n강 언니도 그렇고...\n윤 선배도 그렇고...\n윤 선배님도요?\nDo you wonder whether it's a male or female too?\nWhy are you all wondering about that?\nKang is as well, and Yoon too.\n-Yoon? -Yeah.","sourceUid":"merged-mqs5t60z-78","sourceNo":956},{"id":255,"readerNo":256,"displayNo":944,"n":944,"type":"narration","text":"Thở dài]\n[Âm thanh lật trang]\n[Nhạc nền bắt đầu]\n[한숨 쉰다] [책장 넘기는 소리] [배경 음악 시작]\n[Sighs]\n[Sound of turning pages]\n[Background music starts]","sourceUid":"merged-mqs5mm0d-76","sourceNo":944},{"id":256,"readerNo":257,"displayNo":963,"n":963,"type":"narration","text":"Có vẻ ai cũng đều có một con ma của riêng mình.\nVậy thì chắc là người\nchị đã giết lúc đó.\nCó một người mà chị rất muốn họ chết.\nRồi sao ạ?\nSao là sao?\nLà nam hay nữ ạ?\n응. 다들 짐작 가는 귀신이 하나씩은 있나 봐... 아, 그러면... 그때 내가 죽인 게 맞나 보다... 난 죽었으면 하는 사람이 있는데... 그래서요? 그래서 뭐? 여자예요? 남자예요?\nEveryone seems to have someone in their mind.\nWell, then...\nI must have killed then.\nI have someone I am wishing to be dead.\nSo?\nSo what?\nIs it a female or male?","sourceUid":"merged-mqs5oikx-77","sourceNo":963},{"id":257,"readerNo":258,"displayNo":662,"n":662,"type":"narration","text":"Thế này nhé.\nNhắc đến ma là ai cũng liên tưởng đến mấy phim kinh dị.\nThực ra không phải đâu.\nMa ấy…\nchỉ là cảm giác các làn khói tụ lại với nhau.\nKhông có hình thù rõ ràng.\n그게 말입니다. 손님... 이... 귀신이라고 하면 다들 전설의 고향을 떠올리는데... 그런 게 아니거든요 귀신은요. 이... 이,그냥 연기 같은 게 뭉쳐있는 느낌이라서요... 이목구비가 없어요\nThat is...\nwhen talking about ghosts, people think of what they see on TV,\nbut that's not it.\nGhosts are...\njust spiritual mass.\nIt has no facial features.","sourceUid":"merged-mqs5ungk-79","sourceNo":662},{"id":258,"readerNo":259,"displayNo":974,"n":974,"type":"narration","text":"Không nghe giấc mơ của chị à?\nRất khiêu gợi và thú vị luôn.\nNhỏ này cũng lạnh lùng thật.\n내 꿈 얘긴 관심 없어? 진짜 야하고 재밌는데... 어? 얘가 매정한 데가 있네...\nNot interested in my dream?\nIt's really erotic and interesting.\nShe can be quite cold.","sourceUid":"merged-mqs5vlkj-80","sourceNo":974},{"id":259,"readerNo":260,"displayNo":976,"n":976,"type":"narration","text":"MẸ\n엄마\nMOM","sourceUid":"merged-mqs5vzow-81","sourceNo":976},{"id":260,"readerNo":261,"displayNo":979,"n":979,"type":"narration","text":"[Nhạc nền kết thúc]\n[Rung điện thoại di động]\n[Nhạc nền bắt đầu]\n[Người đàn ông say rượu hát bài hát]\n[Bíp]\n[배경 음악 끝] [핸드폰 진동] [배경 음악 시작] [술 취한 남자 노래 부른다] [삐]\n[Background music ends]\n[Cellphone vibration]\n[Background music starts]\n[Drunk man sings song]\n[Beep]","sourceUid":"merged-mqs5w8si-82","sourceNo":979},{"id":261,"readerNo":262,"displayNo":987,"n":987,"type":"narration","text":"Này, anh thấy thế này vui lắm à?\nKhông có gì để làm ư?\nTôi sẽ đăng số anh lên mạng, cứ liệu hồn đấy.\n야! 너 이게 재밌어? 그렇게 할 일이 없어? 너 이 번호 인터넷에 올릴 거야 너도 한번 당해봐. 이 새끼야!\nHey, is it fun? Are you that bored? I will spread this number on the Internet, you better be ready.","sourceUid":"merged-mqs5xjrx-83","sourceNo":987},{"id":262,"readerNo":263,"displayNo":982,"n":982,"type":"narration","text":"[Nhạc nền thô] [tiếng chuông điện thoại] [Nhạc nền kết thúc]\n[거친 배경 음악]\n[전화벨 소리]\n[배경 음악 끝]\n[Rough background music]\n[telephone ringing sound]\n[Background music ends]","sourceUid":"merged-mqs5xqlv-84","sourceNo":982},{"id":263,"readerNo":264,"displayNo":991,"n":991,"type":"narration","text":"- Chị về muộn nhỉ. - Ừ.\n늦었네?\n-You are late. -Yeah.","sourceUid":"merged-mqs5yg78-85","sourceNo":991},{"id":264,"readerNo":265,"displayNo":990,"n":990,"type":"narration","text":"[Thở dài]\n[Tiếng ném]\n[Tiếng đóng cửa]\n[Bíp bíp bíp tiếng cửa]\n[한숨 쉰다] [던지는 소리] [문 닫는 소리] [삑삑삑 문소리]\n[Sighs]\n[Throwing sound]\n[Sound of door closing]\n[Beep beep beep sound of door]","sourceUid":"merged-mqs5yqqj-86","sourceNo":990},{"id":265,"readerNo":266,"displayNo":677,"n":677,"type":"narration","text":"PHÒNG TẮM HƠI 24 GIỜ HÃY ĐẾN ĐẢO NAMI ĐIỂM ĐÁNG ĐI Ở CHUNCHEON [Tiếng hành lý được kéo] [Tiếng chim hót] [Thở dài] [Công nhân xây dựng nói to]ĐỊA\n응... [여행가방 끄는 소리] [새소리] [한숨 쉰다] [공사장 인부들 크게 얘기한다]\n24 HOURS JJIMJILBANG PLACES TO VISIT IN CHUNCHEON LET'S GO TO NAMI ISLAND Yeah... [Sound of luggage being pulled] [Birdsong] [Sighs] [Construction workers talk loudly]","sourceUid":"merged-mqs617da-88","sourceNo":677},{"id":266,"readerNo":267,"displayNo":1002,"n":1002,"type":"narration","text":"Có lẽ nói dối cũng như việc trang điểm vậy. Giống như trang điểm là để che đi mặt mộc, nói dối cũng là vì sợ sự thật bị phát hiện.\n(정예은) 거짓말은 화장 같은 건지도 모르겠다 진심을 들킬까 봐 거짓말을 한다\nMaybe lies are like make-up. Like we put make-up to cover up the bare face, we lie to hide the truth.","sourceUid":"merged-mqs62n8i-89","sourceNo":1002},{"id":267,"readerNo":268,"displayNo":999,"n":999,"type":"narration","text":"[Tiếng đóng cửa]\n[Tiếng vòi nước đổ]\n[Nhạc chủ đề sôi động bắt đầu]\n[문 닫는 소리]\n[수돗물 내리는 소리]\n[경쾌한 테마 음악 시작]\n[Sound of door closing]\n[Sound of tap water pouring]\n[Upbeat theme music starts]","sourceUid":"merged-mqs63sup-90","sourceNo":999},{"id":268,"readerNo":269,"displayNo":1006,"n":1006,"type":"narration","text":"Em đang làm gì vậy? Em đang đọc sách. Sách gì? Công Lý Là Gì?\n맨얼굴을 가리기 위해 화장을 하는 것처럼\n(남자) 뭐 하고 있어?\n(여자) 책 읽고 있었어\n(남자) 무슨 책?\n(여자) '정의란 무엇인가?'\nWhat are you doing?\nReading a book.\nWhat kind of book?\nJustice?","sourceUid":"merged-mqs653sh-91","sourceNo":1006},{"id":269,"readerNo":270,"displayNo":1012,"n":1012,"type":"narration","text":"Vẫn đang là ban ngày, sao tôi nhậu nhẹt được chứ? Phải học bù Anh văn nên chắc tớ sẽ tới trễ. Anh đang đi công tác. Mai gặp nhé.\n\"그레이의 50가지 그림자\"\n(아저씨) 아직 대낮인데...\n술을 먹을 리가 있겠소?\n(여학생) 오늘 영어 보강하느라 늦을 거야\n(회사원) 나 지금 출장 가고 있어...\n어, 내일 봐...\nHow can I already be drinking when it's still daylight?\nI'll be late for studying.\nI'm on my way to a business trip.\nSee you tomorrow.","sourceUid":"merged-mqs66r6k-92","sourceNo":1012},{"id":270,"readerNo":271,"displayNo":690,"n":690,"type":"narration","text":"Lớp trang điểm ngày càng đậm,\nvà ta lại càng nói dối nhiều hơn.\nTừ khi nào mà ta lại ngại để mặt mộc?\nTừ khi nào…\nta lại xấu hổ với sự thật?\nCũng đúng.\nSự thật thì phũ phàng,\nbuồn bã\nvà yếu đuối vậy mà.\n(정예은) 화장은 점점 진해지고\n거짓말은 점점 늘어간다\n언제부터 맨얼굴이 부끄러워진 걸까?\n언제부터...\n진심이 창피해진 걸까?\n그래...\n진심은 저렇게 찌질하고...\n슬프고...\n약하니까...\nMake-up gets thicker and thicker,\nwe lie more and more.\nSince when have we become shy without make-up?\nSince when...\nhave we become shy of the truth?\nRight.\nTruth is indigent,\nsad,\nand weak.","sourceUid":"merged-mqs6bng3-95","sourceNo":690},{"id":271,"readerNo":272,"displayNo":699,"n":699,"type":"narration","text":"Vì khi sự thật bị cự tuyệt\nthì thật sự rất đau.\nVậy nên chúng ta giả vờ ngầu,\ngiả vờ ít thích hơn,\ngiả vờ như đang đùa.\n진심이 거절당하면... 진짜 아프니까... 쿨한 척 덜 좋아하는 척 농담인 척\nWhen truth gets rejected,\nit really hurts.\nSo we pretend to be cool,\nnot loving as much,\nlike we're playing.","sourceUid":"merged-mqs6b9wk-94","sourceNo":699},{"id":272,"readerNo":273,"displayNo":1037,"n":1037,"type":"narration","text":"Tớ về rồi. Sao về sớm thế? Tớ tưởng khuya cậu mới về. Mai còn phải đi học, mà tớ cũng mệt nữa. Thảo nào nhìn mặt hốc hác quá. Cậu đi đâu ở Chuncheon? - Đảo Nami. - Vui không? Cũng bình thường, toàn người với người.\n나 왔어\n응? 왜 이렇게 일찍 왔어?\n한밤중에나 올 줄 알았는데...\n내일 학교도 가야 되고...\n피곤하기도 하고...\n아주 얼굴이 반쪽이 됐구먼\n춘천 어디 갔었어?\n남이섬\n남이섬 좋아?\n뭐. 그냥 그래... 사람만 많고\nI am back.\nHow come so early?\nI thought it would be late at night.\nI have to go to school tomorrow,\nand I was tired.\nI see that you've lost some weight.\nWhere in Chuncheon did you go?\n-Nami Island. -Was it nice?\nIt was okay, too many people.","sourceUid":"merged-mqs6dmoq-96","sourceNo":1037},{"id":273,"readerNo":274,"displayNo":720,"n":720,"type":"narration","text":"Em làm chị thức giấc à? Xin lỗi nhé. Không, cũng tới giờ dậy rồi. Chị chảy máu cam kìa. - Cái này sao lại ở đây? - Của chị sao? Ừ. Chị có đàn ông ư? Mỗi mình em không có sao? Bà chủ nhà cho đấy.\n어! 윤 선배, 나 땜에 깬 거야?\n미안...\n아니야. 일어날 때 됐어\n선배님. 코피!\n어...\n아...\n이게 왜 여깄어?\n그거 윤 선배 거야?\n으아아악!\n선배 남자 있어?\n설마 나만 없는 거야?\n이거. 주인집 할머니가 준 거야\nDid I wake you up? Sorry.\nNo, it was about time.\nYou are bleeding.\n-Why is it here? -Is it yours?\nYes.\nDo you have a man?\nIs it just me who's single then?\nIt was from our landlady.","sourceUid":"merged-mqs6g9z9-97","sourceNo":720},{"id":274,"readerNo":275,"displayNo":1031,"n":1031,"type":"narration","text":"[Nhạc chủ đề lạc quan kết thúc]\n[경쾌한 테마 음악 끝]\n[Upbeat theme music ends]","sourceUid":"ko-mql0e9i7-1866","sourceNo":1031},{"id":275,"readerNo":276,"displayNo":1054,"n":1054,"type":"narration","text":"Dạo này có đàn ông lạ lảng vảng ở đây. Nếu biết nhà toàn con gái thì họ có thể giở trò gì đó nên bà ấy bảo treo nó ở nơi dễ thấy.\n요새 이상한 남자 돌아다닌다고 여자들만 사는 거 알면 해코지할 수도 있으니까 잘 보이는 데다가 걸어놓으라고\nShe says there has been a stranger around.\nThey might try something bad thinking it's only girls in here,\nso she asked to put it somewhere open.","sourceUid":"merged-mqs6hz03-98","sourceNo":1054},{"id":276,"readerNo":277,"displayNo":724,"n":724,"type":"narration","text":"- Chị ăn được không? - Vâng. Người lạ đó chính là người theo đuổi chị Kang đấy. Vậy à? Vậy bỏ cái quần đi cũng được.\n나도 먹어도 돼?\n그 남자... 강 언니 따라다니는 남자예요\n그럼 이거 버려도 되겠다\n-Can I join you guys? -Yeah.\nThat stranger is there for Kang.\nReally?\nThen we shouldn't worry.","sourceUid":"merged-mqs6j5fo-99","sourceNo":724},{"id":277,"readerNo":278,"displayNo":1044,"n":1044,"type":"narration","text":"[Thở dài]\n[한숨 쉰다]\n[Sighs]","sourceUid":"ko-mql0e9i7-1879","sourceNo":1044},{"id":278,"readerNo":279,"displayNo":1068,"n":1068,"type":"narration","text":"Em trộn ngon nhỉ?\nỪ, ngon lắm.\nVậy cậu sai rồi!\nSai gì?\nCậu bảo quần đó của chị Kang mà.\nTớ nói khi nào?\nTớ chỉ bảo chị Kang nói dối chứ đâu nói cái quần đó của chị ấy.\nNhư nhau mà. Đồ bịp bợm.\n응\n그래?\n잘 비비지 않았어?\n맛있네...\n내가 비볐어\n틀렸잖아\n뭐가?\n그 팬티 강 언니 거라며?\n내가 언제?\n강 언니가 거짓말한다 그랬지...\n팬티가 강 언니 거라고는 안 했어\nIsn't this nice?\nYes, it is.\nYou are wrong!\nAt what?\nYou said that underwear belongs to Kang.\nWhen did I say that?\nI just said that she was lying, I said nothing about that trunks.\nTomato, tomato.","sourceUid":"merged-mqs6le69-100","sourceNo":1068},{"id":279,"readerNo":280,"displayNo":736,"n":736,"type":"narration","text":"Cậu ấy có nhìn thấy gì đâu cơ chứ?\nHở tí là nói dối.\nSao cậu lại ngủ ngày như thế?\nChắc do mệt quá.\nVì đã làm gì cơ?\nĐúng là đồ nhiều chuyện.\n어휴! 아... 뭔 낮잠을 그렇게 자냐? 아... 피곤했나 봐 뭐 하느라고? 아유. 진짜 저 주책 아저씨 그냥... 음... (정예은) 어휴...\nShe is not seeing anything. It makes no sense. You were sleeping like it was night. I must have been tired. From doing what? What a nosy parker.","sourceUid":"merged-mqs6plej-101","sourceNo":736},{"id":280,"readerNo":281,"displayNo":748,"n":748,"type":"narration","text":"Bỏ tay ra. Không bỏ à \n네가 뭔데?\n뭔데 날 구하고 말고야... 가서 너나 구해. 제발\nAnd who are you? What are you talking about saving me? Go save yourself, please.","sourceUid":"merged-mqt9p8o0-7","sourceNo":1104},{"id":286,"readerNo":287,"displayNo":762,"n":762,"type":"narration","text":"Về nhà đi.\nTôi cảnh cáo lần cuối đấy.\nAnh còn như vậy một lần nữa là tôi báo cảnh sát.\n집에 가\n마지막으로 얘기하는데...\n한 번만 더 이러면 진짜 경찰 부를 줄 알아\nGo home, and this is the last warning. If you come back again I will call the cops.","sourceUid":"merged-mqt9q260-10","sourceNo":762},{"id":287,"readerNo":288,"displayNo":763,"n":763,"type":"narration","text":"- Chị có sao không? - Ừ, không sao. Vào thôi.\n괜찮아?\n어 괜찮아. 들어가. 들어가\n-Are you all right? -Yeah, I'm fine. Let's go in.","sourceUid":"merged-mqt9qmfs-13","sourceNo":763},{"id":288,"readerNo":289,"displayNo":1114,"n":1114,"type":"narration","text":"Việc em đang làm là bán dâm đấy! Mấy người đàn ông đó… không yêu em thật lòng đâu.\n지금 이나 씨가 하고 있는 건 매춘입니다\n그 남자들...\n이나 씨를 진정으로 사랑하는 게 아니에요\nWhat you are doing is prostitution!\nThose guys...\nthey don't love you.","sourceUid":"merged-mqt9vqgv-24","sourceNo":1114},{"id":289,"readerNo":290,"displayNo":1119,"n":1119,"type":"narration","text":"- Thôi đi. - Họ chỉ đang dùng tiền để mua em thôi.\nNgười xinh đẹp như em sao lại làm chuyện như thế?\nEm đáng được trân trọng mà.\nTôi sẽ cứu lấy em.\n그만해 그 남자들은 이나 씨를 돈으로 사는 거예요 이나 씨 같이 아름다운 사람이 왜 그런 짓을 합니까? 이나 씨 소중한 사람입니다 내가 도와줄게요\n-Stop. -They are paying for your body.\nWhy does a beautiful person like you doing such a thing?\nYou are precious.\nI will help you.","sourceUid":"merged-mqt9yec9-28","sourceNo":1119},{"id":290,"readerNo":291,"displayNo":1123,"n":1123,"type":"narration","text":"Tuy không biết quá khứ em thế nào, nhưng tôi sẽ cứu em ra. - Em có thể sống cuộc đời em muốn mà. - Tên khốn này.\n이나 씨 과거가 어떤지는 모르지만\n내가 구해줄게요\n얼마든지 새로운 삶을 살 수 있어요\n야, 이 새끼야\nI don't know about your past,\nbut I will get you out.\n-You can start it all over again. -Bastard.","sourceUid":"merged-mqt9zj2w-32","sourc narration","text":"Bạn em sao?\nBạn bè gì. Bọn em thuê nhà chung.\nCó cách để sống nhàn hạ mà.\nChị kiếm bồ đi. Em giới thiệu cho chị nhé?\nThôi khỏi.\nMùi thối rữa từ lòng đố kỵ.\n친구? 친구는 무슨... 하우스 메이트예요 쉽게 사는 방법도 있어 애인 하나 만들어 소개해줄까? 됐어! 내 질투에서는 썩은 냄새가 나\nFriend?\nNot a friend, just a housemate.\nThere is an easier way.\nGet a boyfriend, shall I introduce one?\nNo.\nMy jealousy makes me sick.","sourceUid":"merged-mqtb8k8c-83","sourceNo":1200},{"id":308,"readerNo":309,"displayNo":1202,"n":1202,"type":"narration","text":"[Nhạc chủ đề vui vẻ bắt đầu] [Tiếng leng keng của ly] [la hét] [Khóc nức nở] [Nhạc chủ đề vui vẻ kết thúc] [Nhạc nền vui vẻ bắt đầu]\n[즐거운 테마 음악 시작]\n[잔 부딪치는 소리]\n[소리를 지른다]\n[흐느낀다]\n[즐거운 테마 음악 끝]\n[즐거운 배경 음악 시작]\n[Happy theme music starts] [Sound of clinking glasses] [screams] [Sobbing] [Happy theme music ends] [Happy background music starts]","sourceUid":"merged-mqtba6xg-84","sourceNo":1202},{"id":309,"readerNo":310,"displayNo":1206,"n":1206,"type":"narration","text":"CÂN NẶNG HIỆN TẠI?\nTôi 47kg.\nBẠN CHẮC CHỨ?\nChắc mà. Sáng nào dậy, tôi cũng cởi hết đồ ra cân thì được 47kg.\nBẠN GHEN TỊ VỚI KANG YI NA?\n음... 47 맞아요! 아침에 일어나자마자 옷 다 벗고 재면은 47 나오는데...\nCURRENT BODY WEIGHT? Forty-seven kilograms. ARE YOU SURE? It's correct, if I check in the morning without any clothes on. ARE YOU JEALOUS OF KANG?","sourceUid":"merged-mqtbcprc-91","sourceNo":1206},{"id":310,"readerNo":311,"displayNo":827,"n":827,"type":"narration","text":"Tôi ư? Tại sao? Vì chị ấy ngực to hơn tôi? Cao hơn tôi? Mấy cái đó đâu có quan trọng.\n내가요? 내가 질투할 게 뭐가 있어요? 가슴 좀 큰 거, 키 좀 큰 거 그까짓 게 별거라고 웃겨\nMe? Why would I be? Her boobs are a bit bigger?\nBit taller? Those are nothing anyway.","sourceUid":"merged-mqtbgt32-98","sourceNo":827},{"id":311,"readerNo":312,"displayNo":828,"n":828,"type":"narration","text":"HÃY KỂ VỀ BẠN TRAI CỦA BẠN\nTELL US ABOUT YOUR BOYFRIEND.","sourceUid":"merged-mqtbb7al-86","sourceNo":828},{"id":312,"readerNo":313,"displayNo":829,"n":829,"type":"narration","text":"Tôi quen anh ấy được hai năm rồi. CÓ VẺ BẠN BÈ BẠN KHÔNG THÍCH ANH ẤY. Vì họ không biết rõ anh ấy thôi. Anh ấy tốt lắm.\n오빠요?\n어...\n오빠랑 만난 지는 햇수로 2년 됐는데요\n걔네들이 오빠를 잘 몰라서 그래요...\n우리 오빠 얼마나 좋은 사람인데요...\nIt's been two years since I met him.\nYOUR FRIENDS DON'T SEEM TO LIKE HIM.\nThey don't know him well, he is such a nice guy.","sourceUid":"merged-mqtbetii-95","sourceNo":829},{"id":313,"readerNo":314,"displayNo":832,"n":832,"type":"narration","text":"ANH TA HAY TRỄ HẸN, CHỈ MUỐN QUAN HỆ, LẤY ĐỒ KHUYẾN MÃI LÀM QUÀ MÀ?\nBUT HE'S ALWAYS LATE, JUST WANTS TO HAVE SEX, AND GIVES SAMPLE FOR GIFT.","sourceUid":"merged-mqtbboed-88","sourceNo":832},{"id":314,"readerNo":315,"displayNo":834,"n":834,"type":"narration","text":"Thì đàn ông ai cũng vậy mà. Nhưng lúc tử tế thì cũng tốt với tôi lắm.\n그건...\n남자들은 다 그렇잖아요...\n그래도 잘해줄 때는 얼마나 잘해주는데요\nThat's just men. And he can be really sweet if he wants to.","sourceUid":"merged-mqtbg39r-97","sourceNo":834},{"id":315,"readerNo":316,"displayNo":835,"n":835,"type":"dialogue","text":"Biên dịch: Ngô Thu Hoài\nTranslated by: Yoon Walker","sourceUid":"merged-mqtbh2ja-100","sourceNo":835},{"id":316,"readerNo":317,"displayNo":1221,"n":1221,"type":"narration","text":"[Nhạc nền vui vẻ kết thúc]\n[Nhạc chủ đề chính bắt đầu]\n[Nhạc chủ đề chính kết thúc]\n[즐거운 배경 음악 끝]\n[메인 주제 음악 시작]\n[메인 주제 음악 끝]\n[Happy background music ends]\n[Main theme music starts]\n[Main theme music ends]","sourceUid":"merged-mqtbh039-99","sourceNo":1221}],"types":{"0":"narration","1":"dialogue","2":"narration","3":"narration","4":"narration","5":"narration","6":"narration","7":"narration","8":"narration","9":"narration","10":"narration","11":"narration","12":"narration","13":"narration","14":"narration","15":"narration","16":"narration","17":"narration","18":"narration","19":"narration","20":"narration","21":"narration","22":"narration","23":"narration","24":"narration","25":"narration","26":"narration","27":"narration","28":"narration","29":"narration","30":"narration","31" function esc(s){return String(s||'').replace(/[&<>]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[ch]))}

function fmt(t){t=Number(t||0);let h=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=Math.floor(t%60),ms=Math.round((t-Math.floor(t))*1000);return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')},${String(ms).padStart(3,'0')}`}
function setMsg(s){let el=$('stat'); if(el) el.textContent=s}
function isIOS(){return /iPad|iPhone|iPod/.test(navigator.userAgent)|| (navigator.platform==='MacIntel' && navigator.maxTouchPoints>1)}
function getRange(kind,i=cur){let b=blocks[i];return (kind==='vi'?vi:ko)[String(b&&b.id)]}

function getSource(kind){let a=getAudio(kind);return a.currentSrc||a.src||''}
function unique(arr){return Array.from(new Set(arr.filter(Boolean)))}
function encPath(p){return String(p||'').split('/').map(x=>encodeURIComponent(decodeURIComponent(x))).join('/')}
function baseAudioFolder(){return String(project.audioFolder||'audio').replace(/^\.\//,'').replace(/^\//,'').replace(/\/$/,'')||'audio'}

function candidateNames(kind){
  let main=kind==='vi'?project.viAudioFile:project.koAudioFile;
  let slug=slugBase();
  let fallback=kind==='vi'?[slug+'_VI_Dub.mp3',slug+'_vi_dub.mp3','vi_dub.mp3','VI_Dub.mp3','VI_DUB.mp3','agency_s01e02_VI_Dub.mp3']:[slug+'_KO_Live.mp3',slug+'_ko_live.mp3','ko_live.mp3','KO_Live.mp3','KO_LIVE.mp3','agency_s01e02_KO_Live.mp3'];

function candidateUrls(kind){

}
function showAudioPaths(){

async function tryLoadCandidate(kind){
  let a=getAudio(kind); let cur=a.currentSrc||a.src||'';
  if(cur && cur.startsWith('blob:')) return cur;
  for(const src of candidateUrls(kind)){
    try{
      engine.pause(); engine.src=src; engine.load();
      let ok=await waitMedia(engine,8000);
      if(ok){ a.src=src; try{a.load();}catch(e){} return src; }
    }catch(e){}
  }
  return '';
}

function waitMedia(a,timeout=5000){return new Promise(res=>{if(a.readyState>=1)return res(true);let done=false;let ok=()=>{if(done)return;done=true;clean();res(true)};let bad=()=>{if(done)return;done=true;clean();res(false)};let clean=()=>{a.removeEventListener('loadedmetadata',ok);a.removeEventListener('canplay',ok);a.removeEventListener('error',bad);clearTimeout(to)};a.addEventListener('loadedmetadata',ok,{once:true});a.addEventListener('canplay',ok,{once:true});a.addEventListener('error',bad,{once:true});let to=setTimeout(bad,timeout)})}
async function prepareEngine(kind,start=0){let src=await tryLoadCandidate(kind);if(!src)throw new Error('Không load được audio '+kind.toUpperCase()+'. Kiểm tra folder audio/tên file trên GitHub, hoặc chọn file thủ công. Bấm Audio paths để xem đường dẫn đang thử.');if(engine.src!==src){engine.pause();engine.src=src;engine.load();}let ok=await waitMedia(engine,8000);if(!ok)throw new Error('Không load được audio '+kind.toUpperCase()+'. File có thể chưa tải xong trên GitHub Pages, thử chờ vài giây rồi bấm lại.');try{engine.currentTime=Math.max(0,Number(start||0));}catch(e){}return engine}
async function unlockAudio(show=true){try{let src=await tryLoadCandidate('vi'); if(!src) src=await tryLoadCandidate('ko'); if(!src){if(show)alert('Chưa tìm thấy audio VI/KO. Kiểm tra thư mục audio hoặc chọn file MP3 thủ công.');return false}if(engine.src!==src){engine.src=src;engine.load();await waitMedia(engine,8000)}let oldVol=engine.volume;engine.volume=0.001;try{engine.currentTime=Math.min(0.05,Math.max(0,engine.currentTime||0));}catch(e){}await engine.play();engine.pause();engine.volume=oldVol||1;unlocked=true;setMsg('Đã unlock audio cho iPhone. Bây giờ bấm Smart Flow hoặc VI/KO.');return true}catch(e){unlocked=false;if(show)alert('iPhone chưa cho phát audio. Hãy bấm Unlock iPhone Audio một lần nữa.\n'+(e&&e.message?e.message:e));return false}}

function render(){let q=($('q').value||'').toLowerCase(),h='';blocks.forEach((b,i)=>{if(q&&!b.text.toLowerCase().includes(q))return;let L=split(b.text),vr=vi[String(b.id)],kr=ko[String(b.id)];let time=(vr?`VI ${fmt(vr.start)}→${fmt(vr.end)}`:'No VI')+' · '+(kr?`KO ${fmt(kr.start)}→${fmt(kr.end)}`:'No KO');h+=`<div class="seg ${i===cur?'active':''}" onclick="cur=${i};render();side()"><div class="meta"><span>Cue #${label(b,i)}</span><span>${time}</span></div><div class="txt">${esc(b.text)}</div><div class="row" style="margin-top:8px"><button class="good" onclick="event.stopPropagation();cur=${i};playCurrent('vi')">VI Dub</button><button class="violet" onclick="event.stopPropagation();cur=${i};playCurrent('ko')">KO Live</button><button class="warn" onclick="event.stopPropagation();cur=${i};smart()">Smart</button></div></div>`});$('list').innerHTML=h;$('stat').textContent=blocks.length+' blocks · current Cue #'+label(blocks[cur]||{},cur)+(isIOS()?' · iPhone mode: dùng 1 audio engine':'');side()}
function side(){let L=split(blocks[cur]?.text||'');$('vip').textContent=L.vi;$('kop').textContent=L.ko}

function play(kind,i=cur,token=++tok){return new Promise(async res=>{let r=getRange(kind,i);if(!r)return res();try{let a=await prepareEngine(kind,r.start);let end=Number(r.end||0);let done=false;let cleanup=()=>{a.removeEventListener('timeupdate',check);a.removeEventListener('ended',ended);a.removeEventListener('error',errored)};let finish=()=>{if(done)return;done=true;cleanup();a.pause();res()};let check=()=>{if(done)return;if(token!==tok||!flow&&token!==tok)return finish();if(a.currentTime>=end-0.03)finish()};let ended=()=>finish();let errored=()=>finish();a.addEventListener('timeupdate',check);a.addEventListener('ended',ended,{once:true});a.addEventListener('error',errored,{once:true});setMsg(`Đang phát ${kind.toUpperCase()} Cue #${label(blocks[i]||{},i)} ${fmt(r.start)} → ${fmt(r.end)}`);try{await a.play();}catch(e){cleanup();if(isIOS()&&!unlocked){alert('iPhone cần unlock audio trước. Bấm Unlock iPhone Audio rồi thử lại.')}else{alert('Không phát được audio: '+(e&&e.message?e.message:e));}return res()}setTimeout(check,80)}catch(e){alert(e.message||e);res()}})}
function playCurrent(k){stopAll(false);tok++;play(k,cur,tok)}
function sequenceFor(mode){if(mode==='vi')return['vi'];if(mode==='ko')return['ko'];if(mode==='vi-ko-vi')return['vi','ko','vi'];return['vi','ko']}
async function smart(){let token=++tok;flow=true;if(isIOS()&&!unlocked){let ok=await unlockAudio(false);if(!ok){alert('Trên iPhone, hãy bấm Unlock iPhone Audio trước, sau đó bấm Smart Flow.');flow=false;return}}let mode=$('mode').value, seq=sequenceFor(mode);for(let i=cur;i<blocks.length&&token===tok&&flow;i++){cur=i;render();document.querySelector('.seg.active')?.scrollIntoView({block:'center'});for(const k of seq){if(token!==tok||!flow)break;await play(k,i,token)}}if(token===tok)setMsg('Smart Flow đã dừng/kết thúc')}
function stopAll(inc=true){if(inc)tok++;flow=false;via.pause();koa.pause();engine.pause();setMsg('Đã stop')}
