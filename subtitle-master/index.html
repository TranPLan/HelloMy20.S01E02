 What is she doing? What was that sound?\n[Snoring] [Background music starts]","text":"Vừa có tiếng gì thế? Gì vậy? Ôi, thôi dừng đi. Ngủ đi.\nChỉ là nói xạo thôi. Ngủ thôi nào. Mình không sợ gì cả.\nNgủ nào. Buồn ngủ lắm rồi. Ngủ thôi. Buồn ngủ lắm rồi. Ngủ thôi.\nSao không thở nữa? Tỉnh rồi sao? Cậu ấy đang làm gì vậy?\n[Ngáy] [Nhạc nền bắt đầu]\n아... 그만하고... 자자 거짓말이야... 자자... 하나도 안 무섭다.\n자자... 잠이 쏟아진다... 자자... 나는 졸립다. 자자... 뭐야?\n왜 숨을 안 쉬어? 깼나? 뭐 하는 거야? 방금 무슨 소리 났지?\n[코를 골다] [배경 음악 시작]\nLet's sleep. I should get over this and get some sleep. It's a lie.\nI am not scared at all. Sleep. I am so sleepy.\nSleep. What now? Why isn't she breathing?\nIs she awake? What is she doing? What was that sound?\n[Snoring] [Background music starts]","sourceUid":"merged-mql377t1-3765","sourceNo":46,"viRanges":[{"start":146.199,"end":168.603169}],"koRanges":[{"start":163.792856,"end":185.061719}]},{"id":30,"readerNo":31,"displayNo":"60","n":"60","kind":"sub","type":"merged","vi":"Cậu ấy động đậy sao? Sao vậy? Đi đâu chứ? Có nên kiểm tra không? Mình không thể.\nLỡ chạm mắt thì sao? Phải giả vờ ngủ đi. Giả vờ ngủ. Chân mình.\nLòi ra ngoài rồi. Chúng đang bị nguy hiểm! Chúa ơi. Cậu thật là! Làm gì vậy hả?","ko":"움직인 거야? 왜? 어디로? 확인할까? 못 하겠어\n눈 마주치면 어떡해? 잠든 척하자 잠든 척... 잠든 척...\n으아아아! 발이... 발... 발이 나왔어. 발이 발이 위험해. 내 발! 어떡해 어떡해. 주여!\n으악! 아악 아악! 아... 아이, 너 진짜 너 뭐 하는 거야? 어우...","en":"What are you doing? Was she moving?Why? To where? Should I go check?\nI can't. What if we make eye contact? I should pretend like I'm sleeping.\nI am sleeping. My feet. They are uncovered. Please, Lord. You! It's you!","text":"Cậu ấy động đậy sao? Sao vậy? Đi đâu chứ? Có nên kiểm tra không? Mình không thể.\nLỡ chạm mắt thì sao? Phải giả vờ ngủ đi. Giả vờ ngủ. Chân mình.\nLòi ra ngoài rồi. Chúng đang bị nguy hiểm! Chúa ơi. Cậu thật là! Làm gì vậy hả?\n움직인 거야? 왜? 어디로? 확인할까? 못 하겠어\n눈 마주치면 어떡해? 잠든 척하자 잠든 척... 잠든 척...\n으아아아! 발이... 발... 발이 나왔어. 발이 발이 위험해. 내 발! 어떡해 어떡해. 주여!\n으악! 아악 아악! 아... 아이, 너 진짜 너 뭐 하는 거야? 어우...\n .","sourceUid":"nar-mquvxxhq-zaxwpw","sourceNo":"N63","viRanges":[],"koRanges":[]},{"id":96,"readerNo":97,"displayNo":"N64","n":"N64","kind":"narration","type":"narration","vi":"Từ những gì mọi người có thể thấy, đó là một căn hộ văn phòng một phòng trông giống như một nam sinh viên đại học sống ở đó.","ko":"누가 봐도 남자 대학생이 살고 있을 법한 원룸 오피스텔이다.","en":"Anyone can see that it is a one-room officetel that looks like a male college student living there.","text":"Từ những gì mọi người có thể thấy, đó là một căn hộ văn phòng một phòng trông giống như một nam sinh viên đại học sống ở đó.\n누가 봐도 남자 대학생이 살고 있을 법한 원룸 오피스텔이다.\nAnyone can see that it is a one-room officetel that looks like a male college student living there.","sourceUid":"nar-mquvxyw2-7e52qy","sourceNo":"N64","viRanges":[],"koRanges":[]},{"id":97,"readerNo":98,"displayNo":"N65","n":"N65","kind":"narration","type":"narration","vi":"Go Doo-young đang ngủ. Tôi mở mắt khi nghe thấy tiếng chuông cửa, rồi lại nhắm mắt lại.","ko":"고두영이 자고 있다. 초인종 소리에 눈을 떴다가 다시 감는다.","en":"Go Doo-young is sleeping. I open my eyes when I hear the doorbell, then close them again.","text":"Go Doo-young đang ngủ. Tôi mở mắt khi nghe thấy tiếng chuông cửa, rồi lại nhắm mắt lại.\n고두영이 자고 있다. 초인종 소리에 눈을 떴다가 다시 감는다.\nGo Doo-young is sleeping. I open my eyes when I hear the doorbell, then close them again.","sourceUid":"nar-mquvyeyu-0zx770","sourceNo":"N65","viRanges":[],"koRanges":[]},{"id":98,"readerNo":99,"displayNo":"N66","n":"N66","kind":"narration","type":"narration","vi":"Chuông cửa reo liên tục vài lần.","ko":"초인종 소리가 두어 번 계속된다.","en":"The doorbell rings continuously a couple of times.","text":"Chuông cửa reo liên tục vài lần.\n초인종 소리가 두어 번 계속된다.\nThe doorbell rings continuously a couple of times.","sourceUid":"nar-mquvyg9c-w50y4t","sourceNo":"N66","viRanges":[],"koRanges":[]},{"id":99,"readerNo":100,"displayNo":"N67","n":"N67","kind":"narration","type":"narration","vi":"nó đang làm phiền. Giả vờ không nghe thấy. Bíp bíp, tiếng nhập mật k  안 나? 아! 오빠 거 아냐? 확실해?\n그때 급하게 가느라고 빠트리고 간 게 내 빨랫감 속에 들어갔나 봐 내 거 아냐... 진짜?\n[초인종 소리] [경쾌한 배경 음악 시작]","en":"What is it? If they found out you've been in the house, I get kicked out. What do you mean? Don't you remember the other day? Ah... Because you were in hurry, it must have made into my laundry. It's not mine. Really? Not yours? Are you sure?\n[Doorbell sounds] [Upbeat background music starts]","text":"Gì thế? Ai mà phát hiện anh vào nhà là em bị đuổi đấy.\nEm nói gì thế? Anh không nhớ ngày có người mới vào ở sao? À, hôm đó sao?\nChắc anh đi vội nên bỏ quên rồi bị gom chung với đống đồ giặt của em.\nKhông phải của anh. Thật á? Không phải à? Anh chắc không?\n[Tiếng chuông cửa] [Nhạc nền sôi động bắt đầu]\n우리 집에 오빠 들어왔던 거 알면 나 쫓겨난단 말이야 아이, 왜? 이런 거 두고 가면 어떡해? 아이... 뭔데?\n아. 그날... 뭔 소리야? 저번 날에, 그 새 하메 들어오던 날\n기억 안 나? 아! 오빠 거 아냐? 확실해?\n그때 급하게 가느라고 빠트리고 간 게 내 빨랫감 속에 들어갔나 봐 내 거 아냐... 진짜?\n[초인종 소리] [경쾌한 배경 음악 시작]\nWhat is it? If they found out you've been in the house, I get kicked out. What do you mean? Don't you remember the other day? Ah... Because you were in hurry, it must have made into my laundry. It's not mine. Really? Not yours? Are you sure?\n[Doorbell sounds] [Upbeat background music starts]","sourceUid":"merged-mqmifujl-9","sourceNo":113,"viRanges":[{"start":363.140819,"end":388.340254},{"start":363.140819,"end":368.618321}],"koRanges":[{"start":328.96715,"end":354.469881},{"start":328.96715,"end":348.693824}]},{"id":110,"readerNo":111,"displayNo":"N73","n":"N73","kind":"narration","type":"dialogue","vi":"•Chèn - Jeong Ye-eun, phòng của Song Ji-won 〉〉","ko":"•인서트 - 정예은, 송지원의 방 〉〉","en":"•Insert - Jeong Ye-eun, Song Ji-won's room 〉〉","text":"•Chèn - Jeong Ye-eun, phòng của Song Ji-won 〉〉\n•인서트 - 정예은, 송지원의 방 〉〉\n•Insert - Jeong Ye-eun, Song Ji-won's room 〉〉","sourceUid":"nar-mqv0m1kr-abvbsx","sourceNo":"N73","viRanges":[],"koRanges":[]},{"id":111,"readerNo":112,"displayNo":"N74","n":"N74","kind":"narration","type":"dialogue","vi":"Go Doo-young và Jeong Ye-eun đ 옆 사람 소개는 듣는 둥 마는 둥 송지원과 눈을 마주친다.\nThe men make eye contact with Song Ji-won, ignoring the introduction of the person next to them.","sourceUid":"nar-mqv47n12-obaf8v","sourceNo":"N102","viRanges":[],"koRanges":[]},{"id":146,"readerNo":147,"displayNo":172,"n":172,"kind":"sub","type":"merged","vi":"Bạn sống ở đâu vậy ạ? Bằng tuổi không cần lễ phép vậy đâu.","ko":"- 어디 사세요? - 이상형이 어떻게 되세요?","en":"Where do you live? Let's speak in casual form.","text":"Bạn sống ở đâu vậy ạ? Bằng tuổi không cần lễ phép vậy đâu.\n- 어디 사세요? - 이상형이 어떻게 되세요?\nWhere do you live? Let's speak in casual form.","sourceUid":"merged-mqmjqyzd-18","sourceNo":172,"viRanges":[{"start":510,"end":517.177092}],"koRanges":[{"start":475.974825,"end":482.913117}]},{"id":147,"readerNo":148,"displayNo":"178","n":"178","kind":"sub","type":"merged","vi":"Mình ở phường Yeonnam, không học Tiểu học Bangyi. Gu mình là Song Joong Ki. Rất vui được gặp mọi người.","ko":"어...아이! 아야... 우리 동갑인데 말 놓자\n나 연남동 살고, 당의 초 안 나왔고.\n이상형은 송중기. 만나서 반가워\n[웃는다]","en":"I live in Yeonnam-dong, didn't graduate Bangyi Elementary. And my ideal type is Song Joong-ki. Nice meeting you all.","text":"Mình ở phường Yeonnam, không học Tiểu học Bangyi. Gu mình là Song Joong Ki. Rất vui được gặp mọi người.\n어...아이! 아야... 우리 동갑인데 말 놓자\n나 연남동 살고, 당의 초 안 나왔고.\n이상형은 송중기. 만나서 반가워\n[웃는다]\nI live in Yeonnam-dong, didn't graduate Bangyi Elementary. And my ideal type is Song Joong-ki. Nice meeting you all.","sourceUid":"merged-mqmjtcrb-20","sourceNo":178,"viRanges":[{"start":517.177092,"end":523.746724}],"koRanges":[{"start":482.913117,"end":490.425055}]},{"id":148,"readerNo":149,"displayNo":"N103","n":"N103","kind":"narration","type":"dialogue","vi":". Bếp, phòng khách (ban ngày)","ko":". 주방, 거실(낮)","en":". Kitchen, living room (daytime)","text":". Bếp, phòng khách (ban ngày)\n. 주방, 거실(낮)\n. Kitchen, living room (daytime)","sourceUid":"nar-mqv488cu-3v3isd","sourceNo":"N103","viRanges":[],"koRanges":[]},{"id":149,"readerNo":150,"displayNo":"181","n":"181","kind":"sub","type":"merged","vi":"Ngày nào cũng đi xem mắt thế này, chắc cậu ấy vã lắm rồi.","ko":"아주 발정 났어 하루걸러 소개팅, 미팅, 소개팅...","en":"Going out on a blind date every other day, she must be desperate.","text":"Ngày nào cũng đi xem mắt thế này, chắc cậu ấy vã lắm rồi.\n아주 발정 났어 하루걸러 소개팅, 미팅, 소개팅...\nGoing out on a blind date every other day, she must be desperate.","sourceUid":"merged-mqmjumrq-21","sourceNo":181,"viRanges":[{"start":523.746724,"end":528.097112}],"koRanges":[{"start":490.425055,"end":493.76093}]},{"id":150,"readerNo":151,"displayNo":184,"n":184,"kind":"sub","type":"merged","vi":"Chị ấy nói dù có phải bán linh hồn cũng không muốn làm gái còn trinh. Sao lại nói chuyện như thế chứ?","ko":"어으... 걔는 말을 해도 그냥... 영혼을 팔아서라도 꼭... 동정을 떼겠대요","en":"She says she would even sell her soul to lose her virginity. How could you say something like that?","text":"Chị ấy nói dù có phải bán linh hồn cũng không muốn làm gái còn trinh. Sao lại nói chuyện như thế chứ?\n어으... 걔는 말을 해도 그냥... 영혼을 팔아서라도 꼭... 동정을 떼겠대요\nShe says she would even sell her soul to lose her virginity. How could you say something like that?","sourceUid":"merged-mqmjvggn-22","sourceNo":184,"viRanges":[{"start":528.097112,"end":535.5}],"koRanges":[{"start":493.76093,"end":500.780213}]},{"id":151,"readerNo":152,"displayNo":"N104","n":"N104","kind":"narration","type":"dialogue","vi":"(Kéo áo lót dưới lớp quần áo ra)","ko":"(옷 속으로 브래지어를 끌러 빼내면서)","en":"(Pulling out the bra under the clothes)","text":"(Kéo áo lót dưới lớp quần áo ra)\n(옷 속으로 브래지어를 끌러 빼내면서)\n(Pulling out the bra under the clothes)","sourceUid":"nar-mqv49bfx-nqrlhf","sourceNo":"N104","viRanges":[],"koRanges":[]},{"id":152,"readerNo":153,"displayNo":133,"n":133,"kind":"sub","type":"merged","vi":"Cũng đúng thôi, 22 tuổi mà chưa có mảnh tình vắt vai thì thấp thỏm là phải. Dễ thành di sản tự nhiên lắm.","ko":"하긴... 스물둘에 모솔이면 초조하기도 할 거야\n까딱 잘못하면 천연 기념물이 잖아","en":"You could become a natural heritage. Well, if you are still a virgin at the age of 22, it could be a bother to you.","text":"Cũng đúng thôi, 22 tuổi mà chưa có mảnh tình vắt vai thì thấp thỏm là phải. Dễ thành di sản tự nhiên lắm.\n하긴... 스물둘에 모솔이면 초조하기도 할 거야\n까딱 잘못하면 천연 기념물이 잖아\nYou could become a natural heritage. Well, if you are still a virgin at the age of 22, it could be a bother to you.","sourceUid":"merged-mqmjwfld-23","sourceNo":133,"viRanges":[{"start":535.6,"end":543.795988}],"koRanges":[{"start":500.780213,"end":507.593164}]},{"id":153,"readerNo":154,"displayNo":138,"n":138,"kind":"sub","type":"merged","vi":"Coi kìa. Em định noi gương chị ấy hả? Chị ấy có bao giờ tận hưởng cuộc sống đâu mà biết về làm tình hay yêu đương.","ko":"얘 봐라 윤 선배를 모델 삼게? 삶의 윤기라고는 요만큼도 없이. 섹스고 연애고 나 몰라라","en":"Watch out. She can't be your role model. She never relaxes in her life without sex or boyfriend.","text":"Coi kìa. Em định noi gương chị ấy hả? Chị ấy có bao giờ tận hưởng cuộc sống đâu mà biết về làm tình hay yêu đương.\n얘 봐라 윤 선배를 모델 삼게? 삶의 윤기라고는 요만큼도 없이. 섹스고 연애고 나 몰라라\nWatch out. She can't be your role model. She never relaxes in her life without sex or boyfriend.","sourceUid":"merged-mqmjz983-26","sourceNo":138,"viRanges":[{"start":549.215818,"end":558.441508}],"koRanges":[{"start":514.954,"end":523.376346}]},{"id":154,"readerNo":155,"displayNo":"190","n":"190","kind":"sub","type":"merged","vi":"Em cũng nỗ lực lên đi.Cuối tuần mà sao lại ở nhà?\nCó sao đâu ạ.","ko":"너도 분발해 주말에 집에나 있으면 어쩌자는 거냐?\n괜찮아요","en":"You should work on it as well. Don't stay in the house during weekend.\nIt's okay.","text":"Em cũng nỗ lực lên đi.Cuối tuần mà sao lại ở nhà?\nCó sao đâu ạ.\n너도 분발해 주말에 집에나 있으면 어쩌자는 거냐?\n괜찮아요\nYou should work on it as well. Don't stay in the house during weekend.\nIt's okay.","sourceUid":"merged-mqmjx5rm-24","sourceNo":190,"viRanges":[{"start":543.795988,"end":546.058374}],"koRanges":[{"start":507.593164,"end":513.299468}]},{"id":155,"readerNo":156,"displayNo":192,"n":192,"kind":"sub","type":"merged","vi":"Tiền bối Yoon cũng độc thân mà.","ko":"윤 선배님도 아직 솔로고...","en":"Yoon's still single as well.","text":"Tiền bối Yoon cũng độc thân mà.\n윤 선배님도 아직 솔로고...\nYoon's still single as well.","sourceUid":"merged-mqmjxmsw-25","sourceNo":192,"viRanges":[{"start":546.058374,"end":549.215818}],"koRanges":[{"start":513.299468,"end":514.775336}]},{"id":156,"readerNo":157,"displayNo":"201","n":"201","kind":"sub","type":"merged","vi":"Sống hì hục, cực khổ như ngựa đua vậy.\nEm đừng có như vậy. Đó đâu phải là sống, là sinh tồn thì có.","ko":"[한숨 쉰다]\n경주마처럼 이러고 사는 그 고난의 삶을? 그러지 마라... 그게 삶이냐? 생존이지","en":"Like a racing horse, only running for the finishing line.\nDon't do that. That's not life, that's survival.","text":"Sống hì hục, cực khổ như ngựa đua vậy.\nEm đừng có như vậy. Đó đâu phải là sống, là sinh tồn thì có.\n[한숨 쉰다]\n경주마처럼 이러고 사는 그 고난의 삶을? 그러지 마라... 그게 삶이냐? 생존이지\nLike a racing horse, only running for the finishing line.\nDon't do that. That's not life, that's survival.","sourceUid":"merged-mqmk0fag-27","sourceNo":201,"viRanges":[{"start":558.441508,"end":568.158785}],"koRanges":[{"start":523.376346,"end":531.534043}]},{"id":157,"readerNo":158,"displayNo":202,"n":202,"kind":"sub","type":"merged","vi":"Mà giờ vụ đó không quan trọng.","ko":"아! 지금 그게 중요한 게 아니고...","en":"That's not important now.","text":"Mà giờ vụ đó không quan trọng.\n아! 지금 그게 중요한 게 아니고...\nThat's not important now.","sourceUid":"merged-mqmk0wzv-28","sourceNo":202,"viRanges":[{"start":568.158785,"end":571.19044}],"koRanges":[{"start":531.534043,"end":536.94404}]},{"id":158,"readerNo":159,"displayNo":"N105","n":"N105","kind":"narration","type":"dialogue","vi":"(Tháo quần lót khỏi túi xách bằng đầu ngón tay)","ko":"(핸드백에서 손가락 끝으로 팬티를 꺼낸다)","en":"(Removes panties from handbag with fingertips)","text":"(Tháo quần lót khỏi túi xách bằng đầu ngón tay)\n(핸드백에서 손가락 끝으로 팬티를 꺼낸다)\n(Removes panties from handbag with fingertips)","sourceUid":"nar-mqv4azhq-81jarg","sourceNo":"N105","viRanges":[],"koRanges":[]},{"id":159,"readerNo":160,"displayNo":"205","n":"205","kind":"sub","type":"merged","vi":"Chị tìm được nó ở ban công. Nghĩa là có đàn ông vào nhà.","ko":"베란다에 이게 걸려 있었어\n그 얘기는 즉\n이 집에 남자가 들어왔었다는 뜻이지.","en":"I found this on the balcony. That means there was a guy in the house.","text":"Chị tìm được nó ở ban công. Nghĩa là có đàn ông vào nhà.\n베란다에 이게 걸려 있었어\n그 얘기는 즉\n이 집에 남자가 들어왔었다는 뜻이지.\nI found this on the balcony. That means there was a guy in the house.","sourceUid":"merged-mqmk1a52-29","sourceNo":205,"viRanges":[{"start":575,"end":580.671388}],"koRanges":[{"start":536.94404,"end":550.48236}]},{"id":160,"readerNo":161,"displayNo":206,"n":206,"kind":"sub","type":"merged","vi":"Nhưng sao nó lại ở trong túi xách của chị?","ko":"근데 그게 왜 선배 가방에서 나와요?","en":"But why did you keep that in your bag?","text":"Nhưng sao nó lại ở trong túi xách của chị?\n근데 그게 왜 선배 가방에서 나와요?\nBut why did you keep that in your bag?","sourceUid":"merged-mqmk1hef-30","sourceNo":206,"viRanges":[{"start":583,"end":587.31145}],"koRanges":[{"start":550.48236,"end":553.645704}]},{"id":161,"readerNo":162,"displayNo":"209","n":"209","kind":"sub","type":"merged","vi":"À, tại chị… tính điều tra trước thôi.","ko":"어? 일단 그... 초동수사를 좀 하느라고","en":"Well, first... I had to do some investigation.","text":"À, tại chị… tính điều tra trước thôi.\n어? 일단 그... 초동수사를 좀 하느라고\nWell, first... I had to do some investigation.","sourceUid":"merged-mqmk1yx3-31","sourceNo":209,"viRanges":[{"start":587.31145,"end":592.449373}],"koRanges":[{"start":553.645704,"end":559.601938}]},{"id":162,"readerNo":163,"displayNo":"N106","n":"N106","kind":"narration","type":"dialogue","vi":"Eunjae Yoo: (Tôi không biết bạn đang nói về cái gì)...?","ko":"유은재: (뭔 말인지 모르겠다)···?","en":"Eunjae Yoo: (I don’t know what you’re talking about)...?","text":"Eunjae Yoo: (Tôi không biết bạn đang nói về cái gì)...?\n유은재: (뭔 말인지 모르겠다)···?\nEunjae Yoo: (I don’t know what you’re talking about)...?","sourceUid":"nar-mqv4bxhc-zwhh8o","sourceNo":"N106","viRanges":[],"koRanges":[]},{"id":163,"readerNo":164,"displayNo":211,"n":211,"kind":"sub","type":"merged","vi":"Quy tắc quan trọng nhất ở Belle Epoque là gì? Cấm đưa đàn ông vào nhà.","ko":"벨에포크의 가장 중요한 규칙이 뭐야?\n남자를 끌어들이지 않는다!","en":"What's the first rule in this house?\nDo not bring a guy into the house.","text":"Quy tắc quan trọng nhất ở Belle Epoque là gì? Cấm đưa đàn ông vào nhà.\n벨에포크의 가장 중요한 규칙이 뭐야?\n남자를 끌어들이지 않는다!\nWhat's the first rule in this house?\nDo not bring a guy into the house.","sourceUid":"merged-mqmk2fhj-32","sourceNo":211,"viRanges":[{"start":592.449373,"end":599.550619}],"koRanges":[{"start":559.601938,"end":565.937558}]},{"id":164,"readerNo":165,"displayNo":213,"n":213,"kind":"sub","type":"merged","vi":"Ai đó đã vi phạm quy tắc này. Nhưng sao lại để quên quần lót nhỉ?","ko":"누군가 그 원칙을 깨트렸다고\n근데 왜 팬티를 벗어놓고 갔지?","en":"Someone broke that rule.\nThen why leave trunks?","text":"Ai đó đã vi phạm quy tắc này. Nhưng sao lại để quên quần lót nhỉ?\n누군가 그 원칙을 깨트렸다고\n근데 왜 팬티를 벗어놓고 갔지?\nSomeone broke that rule.\nThen why leave trunks?","sourceUid":"merged-mqmk34ex-33","sourceNo":213,"viRanges":[{"start":599.550619,"end":606.128114}],"koRanges":[{"start":565.937558,"end":570.420053}]},{"id":165,"readerNo":166,"displayNo":217,"n":217,"kind":"sub","type":"merged","vi":"Em ngốc à? Lẽ nào đại tiện xong để quên? Thì cũng là xả cái gì đó ra, nhưng mà là xả cái khác.","ko":"딴 걸 싼 거지 너 바보냐? 똥 싸서 벗어놨겠어? 싸기는 쌌는데...","en":"Are you stupid?\nWould he have used a toilet?\nHe did let out something,\nbut it was something else.","text":"Em ngốc à? Lẽ nào đại tiện xong để quên? Thì cũng là xả cái gì đó ra, nhưng mà là xả cái khác.\n딴 걸 싼 거지 너 바보냐? 똥 싸서 벗어놨겠어? 싸기는 쌌는데...\nAre you stupid?\nWould he have used a toilet?\nHe did let out something,\nbut it was something else.","sourceUid":"merged-mqmk4hzj-34","sourceNo":217,"viRanges":[{"start":606.128114,"end":612.066658}],"koRanges":[{"start":570.420053,"end":575.140102}]},{"id":166,"readerNo":167,"displayNo":"N107","n":"N107","kind":"narration","type":"dialogue","vi":"Eunjae Yoo: (Tôi không biết nó là gì, nhưng không hiểu sao tôi cảm thấy xấu hổ)...","ko":"유은재: (뭔지 모르지만 왠지 부끄러워진다)···.","en":"Eunjae Yoo: (I don’t know what it is, but I feel embarrassed for some reason)...","text":"Eunjae Yoo: (Tôi không biết nó là gì, nhưng không hiểu sao tôi cảm thấy xấu hổ)...\n유은재: (뭔지 모르지만 왠지 부끄러워진다)···.\nEunjae Yoo: (I don’t know what it is, but I feel embarrassed for some reason)...","sourceUid":"nar-mqv4cfxe-dq11zl","sourceNo":"N107","viRanges":[],"koRanges":[]},{"id":167,"readerNo":168,"displayNo":164,"n":164,"kind":"sub","type":"merged","vi":"Còn ai vào đây? Chị Yi Na đấy. Chị ấy tự khai rồi mà. Đang bắt cá hai, ba tay luôn.","ko":"누구긴 누구야? 강 언니지... 자기 입으로 얘기했잖아 현재 양다리 삼다리 중이라고","en":"It's Kang. What do you mean \"Well\"? She said it herself. She is two-, three-timing.","text":"Còn ai vào đây? Chị Yi Na đấy. Chị ấy tự khai rồi mà. Đang bắt cá hai, ba tay luôn.\n누구긴 누구야? 강 언니지... 자기 입으로 얘기했잖아 현재 양다리 삼다리 중이라고\nIt's Kang. What do you mean \"Well\"? She said it herself. She is two-, three-timing.","sourceUid":"merged-mqmk9qxa-36","sourceNo":164,"viRanges":[{"start":617.546203,"end":623.027483}],"koRanges":[{"start":582.241252,"end":588.651177}]},{"id":168,"readerNo":169,"displayNo":"220","n":"220","kind":"sub","type":"merged","vi":"Em nghĩ là ai? Em cũng không biết.","ko":"누굴 거 같냐?  글쎄요...","en":"Who do you think? Well...","text":"Em nghĩ là ai? Em cũng không biết.\n누굴 거 같냐?  글쎄요...\nWho do you think? Well...","sourceUid":"merged-mqmk5g8m-35","sourceNo":220,"viRanges":[{"start":612.066658,"end":617.546203}],"koRanges":[{"start":575.140102,"end":582.241252}]},{"id":169,"readerNo":170,"displayNo":225,"n":225,"kind":"sub","type":"merged","vi":"Nhìn tình hình thì cũng có thể là \"419\". \"419\" là gì vậy chị?","ko":"분위기 보면... 원나잇도 하는 거 같고 원나잇이 뭔데요?","en":"And it seems like she even does one-night stands. What is a one-night stand?","text":"Nhìn tình hình thì cũng có thể là \"419\". \"419\" là gì vậy chị?\n분위기 보면... 원나잇도 하는 거 같고 원나잇이 뭔데요?\nAnd it seems like she even does one-night stands. What is a one-night stand?","sourceUid":"merged-mqmkali6-37","sourceNo":225,"viRanges":[{"start":623.027483,"end":629.121201}],"koRanges":[{"start":588.651177,"end":594.040842}]},{"id":170,"readerNo":171,"displayNo":228,"n":228,"kind":"sub","type":"merged","vi":"Quê em đâu phải ở Yeasan nhỉ? Mới ở trển xuống chứ gì? Là vừa gặp nhau đêm đầu tiên đã phát sinh quan hệ đấy.","ko":"너 고향 예산 아니지\n청학동이지?\n그날 만나서 그날 자는 거","en":"You are from Yeasan, are you?\nIt must be another planet.\nIt's sleeping with someone you just met.","text":"Quê em đâu phải ở Yeasan nhỉ? Mới ở trển xuống chứ gì? Là vừa gặp nhau đêm đầu tiên đã phát sinh quan hệ đấy.\n너 고향 예산 아니지\n청학동이지?\n그날 만나서 그날 자는 거\nYou are from Yeasan, are you?\nIt must be another planet.\nIt's sleeping with someone you just met.","sourceUid":"merged-mqnw3jk7-1","sourceNo":228,"viRanges":[{"start":629.121201,"end":635.593313}],"koRanges":[{"start":594.040842,"end":599.697287}]},{"id":171,"readerNo":172,"displayNo":"173","n":"173","kind":"sub","type":"merged","vi":"Tất nhiên, chị Kang ấy. Chị ấy như đang đi thi đấu Olympic không bằng, chạy đua từng giây.\n[Âm nhạc thú vị từ tai nghe]","ko":"그래! 강 언니\n(정예은) 무슨 올림픽 나갔대?\n.01초를 다투는 거야?\n[헤드폰에서 신나는 음악 소리]","en":"She dresses like she is preparing for the Olympics Of course, Kang.\n[Exciting music sounds from headphones]","text":"Tất nhiên, chị Kang ấy. Chị ấy như đang đi thi đấu Olympic không bằng, chạy đua từng giây.\n[Âm nhạc thú vị từ tai nghe]\n그래! 강 언니\n(정예은) 무슨 올림픽 나갔대?\n.01초를 다투는 거야?\n[헤드폰에서 신나는 음악 소리]\nShe dresses like she is preparing for the Olympics Of course, Kang.\n[Exciting music sounds from headphones]","sourceUid":"merged-mqnwahuu-8","sourceNo":173,"viRanges":[{"start":637.984025,"end":646.15}],"koRanges":[{"start":603.35,"end":610.402253}]},{"id":172,"readerNo":173,"displayNo":"230","n":"230","kind":"sub","type":"merged","vi":"Thật ấy ạ? Có những người như vậy thật ạ?","ko":"진짜요? 진짜 그런 사람들이 있어요?","en":"Really? Are there such people for real?","text":"Thật ấ g room (morning)","sourceUid":"nar-mqz6fs7k-14o6ee","sourceNo":"N146","viRanges":[],"koRanges":[]},{"id":248,"readerNo":249,"displayNo":"N147","n":"N147","kind":"narration","type":"dialogue","vi":"Jinmyeong Yoon chạy ra khỏi phòng. Mỗi khi Jeong Ye-eun nói, mũi tên và phụ đề sẽ xuất hiện.","ko":"윤진명이 방에서 뛰쳐나온다. 정예은이 말할 때마다 화살표와 자막이 뜬다.","en":"Jinmyeong Yoon runs out of the room. Every time Jeong Ye-eun speaks, arrows and subtitles appear.","text":"Jinmyeong Yoon chạy ra khỏi phòng. Mỗi khi Jeong Ye-eun nói, mũi tên và phụ đề sẽ xuất hiện.\n윤진명이 방에서 뛰쳐나온다. 정예은이 말할 때마다 화살표와 자막이 뜬다.\nJinmyeong Yoon runs out of the room. Every time Jeong Ye-eun speaks, arrows and subtitles appear.","sourceUid":"nar-mqz6fwl8-f18vnq","sourceNo":"N147","viRanges":[],"koRanges":[]},{"id":249,"readerNo":250,"displayNo":318,"n":318,"kind":"sub","type":"merged","vi":"Để ý tới đàn ông mà ăn mặc như vậy à?","ko":"관심 있는 사람이 그러고 다니냐?","en":"If she was, she would not dress like that.","text":"Để ý tới đàn ông mà ăn mặc như vậy à?\n관심 있는 사람이 그러고 다니냐?\nIf she was, she would not dress like that.","sourceUid":"merged-mqnyyeoe-100","sourceNo":318,"viRanges":[{"start":835.2,"end":839.210481}],"koRanges":[{"start":801.403419,"end":803.906154}]},{"id":250,"readerNo":251,"displayNo":"231","n":"231","kind":"sub","type":"merged","vi":"Trang điểm á?\nCó lúc chị ấy còn không rửa mặt luôn.\n[Nhạc nền bắt đầu]","ko":"(정예은) 화장?\n어떨 땐 세수도 안 하고 나갈걸\n[배경 음악 시작]","en":"Make-up? She doesn't even wash her face sometimes.\n[Background music starts]","text":"Trang điểm á?\nCó lúc chị ấy còn không rửa mặt luôn.\n[Nhạc nền bắt đầu]\n(정예은) 화장?\n어떨 땐 세수도 안 하고 나갈걸\n[배경 음악 시작]\nMake-up? She doesn't even wash her face sometimes.\n[Background music starts]","sourceUid":"merged-mqnz11cu-106","sourceNo":231,"viRanges":[{"start":839.210481,"end":848.292537}],"koRanges":[{"start":803.906154,"end":813.367507}]},{"id":251,"readerNo":252,"displayNo":323,"n":323,"kind":"sub","type":"merged","vi":"Em biết tại sao chị ấy để tóc dài không?\nĐể khỏi phải đi cắt tóc đó.","ko":"윤 선배가 왜 머리 기르는지 알아?\n미용실 안 가려고","en":"Do you know why she keeps her hair long?\nSo she doesn't have to go to the salon.","text":"Em biết tại sao chị ấy để tóc dài không?\nĐể khỏi phải đi cắt tóc đó.\n윤 선배가 왜 머리 기르는지 알아?\n미용실 안 가려고\nDo you know why she keeps her hair long?\nSo she doesn't have to go to the salon.","sourceUid":"merged-mqp2o6ll-1","sourceNo":323,"viRanges":[{"start":848.292537,"end":854.564}],"koRanges":[{"start":813.368,"end":820.29068}]},{"id":252,"readerNo":253,"displayNo":324,"n":324,"kind":"sub","type":"merged","vi":"Tóc đuôi ngựa đâu còn hợp với tuổi 28 như chị ấy nữa.\nEm có thấy quần áo của chị ấy đều tối màu không?","ko":"아무리 그래도 스물여덟에 포니테일은 좀 아니지 않냐? 윤 선배 옷 색깔 다 칙칙하지?","en":"Her hair is way too inappropriate for her age.\nAnd all her clothes are dark colored.","text":"Tóc đuôi ngựa đâu còn hợp với tuổi 28 như chị ấy nữa.\nEm có thấy quần áo của chị ấy đều tối màu không?\n아무리 그래도 스물여덟에 포니테일은 좀 아니지 않냐? 윤 선배 옷 색깔 다 칙칙하지?\nHer hair is way too inappropriate for her age.\nAnd all her clothes are dark colored.","sourceUid":"merged-mqp2uvyz-2","sourceNo":324,"viRanges":[{"start":854.564,"end":863.433846}],"koRanges":[{"start":820.29068,"end":828.970636}]},{"id":253,"readerNo":254,"displayNo":326,"n":326,"kind":"sub","type":"merged","vi":"Vì không giặt cũng không bị lộ đấy.\nCả năm trời, dù nắng hay mưa cũng chỉ có một đôi giày.","ko":"안 빨아도 표가 안 나거든\n비가 오나 눈이 오나...\n년 365일 단일 아이템","en":"So it doesn't show when it's not washed.\nRain or shine, wears the same shoes all-year around.","text":"Vì không giặt cũng không bị lộ đấy.\nCả năm trời, dù nắng hay mưa cũng chỉ có một đôi giày.\n안 빨아도 표가 안 나거든\n비가 오나 눈이 오나...\n년 365일 단일 아이템\nSo it doesn't show when it's not washed.\nRain or shine, wears the same shoes all-year around.","sourceUid":"merged-mqp2ylka-3","sourceNo":326,"viRanges":[{"start":863.433846,"end":871.442399}],"koRanges":[{"start":828.970636,"end":835.933}]},{"id":254,"readerNo":255,"displayNo":330,"n":330,"k eong xuất hiện từ xa. Yoon Jin-myeong quá cố chạy vào.","ko":"저 멀리 윤진명이 나타난다. 늦은 윤진명이 뛰어온다.","en":"Yoon Jin-myeong appears in the distance. The late Yoon Jin-myeong runs in.","text":"Yoon Jin-myeong xuất hiện từ xa. Yoon Jin-myeong quá cố chạy vào.\n저 멀리 윤진명이 나타난다. 늦은 윤진명이 뛰어온다.\nYoon Jin-myeong appears in the distance. The late Yoon Jin-myeong runs in.","sourceUid":"nar-mr04gxrv-i80le7","sourceNo":"N156","viRanges":[],"koRanges":[]},{"id":270,"readerNo":271,"displayNo":"N157","n":"N157","kind":"narration","type":"dialogue","vi":"Park Jae-wan nhìn kỹ Yoon Jin-myeong đang chạy về phía anh. Khóe miệng từ từ nhếch lên.","ko":"뛰어오는 윤진명을 박재완이 유심히 바라본다. 슬며시 입꼬리가 올라간다.","en":"Park Jae-wan looks closely at Yoon Jin-myeong running towards him. The corners of the mouth slowly rise.","text":"Park Jae-wan nhìn kỹ Yoon Jin-myeong đang chạy về phía anh. Khóe miệng từ từ nhếch lên.\n뛰어오는 윤진명을 박재완이 유심히 바라본다. 슬며시 입꼬리가 올라간다.\nPark Jae-wan looks closely at Yoon Jin-myeong running towards him. The corners of the mouth slowly rise.","sourceUid":"nar-mr04gz5p-98ns3w","sourceNo":"N157","viRanges":[],"koRanges":[]},{"id":271,"readerNo":272,"displayNo":"N158","n":"N158","kind":"narration","type":"dialogue","vi":"Jinmyeong Yoon nhìn thấy Công viên Jaewan và giảm tốc độ.","ko":"박재완을 발견한 윤진명이 속도를 줄인다.","en":"Jinmyeong Yoon spots Jaewan Park and slows down.","text":"Jinmyeong Yoon nhìn thấy Công viên Jaewan và giảm tốc độ.\n박재완을 발견한 윤진명이 속도를 줄인다.\nJinmyeong Yoon spots Jaewan Park and slows down.","sourceUid":"nar-mr04h20h-sctjmh","sourceNo":"N158","viRanges":[],"koRanges":[]},{"id":272,"readerNo":273,"displayNo":"N159","n":"N159","kind":"narration","type":"dialogue","vi":"Jaewan Park: (Khi anh ấy chạm mắt với Jinmyeong Yoon, anh ấy thậm chí còn ra hiệu như để xác nhận) An toàn.","ko":"박재완: (윤진명과 눈이 마주치자 확인해주듯 손짓까지 해 보이며) 세이프.","en":"Jaewan Park: (When he makes eye contact with Jinmyeong Yoon, he even gestures as if to confirm) Safe.","text":"Jaewan Park: (Khi anh ấy chạm mắt với Jinmyeong Yoon, ): Hey, no.","text":"(Jeong Ye-eun): Này, không.\n(정예은): 에에이, 아니야.\n(Jeong Ye-eun): Hey, no.","sourceUid":"nar-mr04jayz-rb82qv","sourceNo":"N173","viRanges":[],"koRanges":[]},{"id":292,"readerNo":293,"displayNo":"N174","n":"N174","kind":"narration","type":"dialogue","vi":". Phòng khách (buổi tối)","ko":". 거실(저녁)","en":". Living room (evening)","text":". Phòng khách (buổi tối)\n. 거실(저녁)\n. Living room (evening)","sourceUid":"nar-mr04jcwi-grn1s1","sourceNo":"N174","viRanges":[],"koRanges":[]},{"id":293,"readerNo":294,"displayNo":"N175","n":"N175","kind":"narration","type":"dialogue","vi":"Jeong Ye-eun và Yoo Eun-jae ngồi trên ghế sofa.","ko":"소파에 앉은 정예은과 유은재.","en":"Jeong Ye-eun and Yoo Eun-jae sitting on the sofa.","text":"Jeong Ye-eun và Yoo Eun-jae ngồi trên ghế sofa.\n소파에 앉은 정예은과 유은재.\nJeong Ye-eun and Yoo Eun-jae sitting on the sofa.","sourceUid":"nar-mr04jdwj-mqqmyl","sourceNo":"N175","viRanges":[],"koRanges":[]},{"id":294,"readerNo":295,"displayNo":258,"n":258,"kind":"sub","type":"merged","vi":"Dù sao cũng không phải tiền bối Yoon đâu.\nChị em mình đều biết chị ấy đâu có thời gian rảnh.\nKhông có luôn.","ko":"(정예은) 아무리 그래도 윤 선밴 아니야\n너도 알고 나도 알지만 윤 선배 스케줄에 틈이 있어?\n없어","en":"Still, it can't be Yoon.\nYou and I both know, does she ever have time?\nShe doesn't.","text":"Dù sao cũng không phải tiền bối Yoon đâu.\nChị em mình đều biết chị ấy đâu có thời gian rảnh.\nKhông có luôn.\n(정예은) 아무리 그래도 윤 선밴 아니야\n너도 알고 나도 알지만 윤 선배 스케줄에 틈이 있어?\n없어\nStill, it can't be Yoon.\nYou and I both know, does she ever have time?\nShe doesn't.","sourceUid":"merged-mqpdtata-36","sourceNo":258,"viRanges":[{"start":1022.956251,"end":1033.029653}],"koRanges":[{"start":990.105035,"end":999.537982}]},{"id":295,"readerNo":296,"displayNo":260,"n":260,"kind":"sub","type":"merged","vi":"Bản thân còn thiếu ngủ thì thời gian đâu mà ngủ với trai.","ko":"남자랑 잘 시간이 어딨니? 혼자 잘 시간도 없는데...","en":"How can she sleep with a man? She has no time to sleep for herself.","text":"Bản thân còn thiếu ngủ thì thời gian đâu mà ngủ với trai.\n남자랑 잘 시간이 어딨니? 혼자 잘 시간도 없는데...\nHow can she sleep with a man? She has no time to sleep for herself.","sourceUid":"merged-mqpdw5m7-40","sourceNo":260,"viRanges":[{"start":1033.029653,"end":1037.999552}],"koRanges":[{"start":999.537982,"end":1002.48022}]},{"id":296,"readerNo":297,"displayNo":262,"n":262,"kind":"sub","type":"merged","vi":"Dù vậy thì… Tính ra thì Ji Won đỡ hơn chị Jin Myung.","ko":"그렇긴 한데요... 그렇게 따지면... 윤 선배보다는 송지원이겠지","en":"Although that is true...\nIf you think, there is more chance with Song then.","text":"Dù vậy thì… Tính ra thì Ji Won đỡ hơn chị Jin Myung.\n그렇긴 한데요... 그렇게 따지면... 윤 선배보다는 송지원이겠지\nAlthough that is true...\nIf you think, there is more chance with Song then.","sourceUid":"merged-mqpe3csa-43","sourceNo":262,"viRanges":[{"start":1037.999552,"end":1042.841671}],"koRanges":[{"start":1002.48022,"end":1007.261277}]},{"id":297,"readerNo":298,"displayNo":376,"n":376,"kind":"sub","type":"merged","vi":"Cậu ấy đi xem mắt suốt, biết đâu sẽ kiếm được ai đó.\nCậu ấy coi vậy cũng dạn lắm.","ko":"하루걸러 한 번씩 소개팅인데...\n그 와중에 하나 걸렸을지도 몰라","en":"She goes to a blind date every other day, maybe she's got one finally. She can be quite bold.","text":"Cậu ấy đi xem mắt suốt, biết đâu sẽ kiếm được ai đó.\nCậu ấy coi vậy cũng dạn lắm.\n하루걸러 한 번씩 소개팅인데...\n그 와중에 하나 걸렸을지도 몰라\nShe goes to a blind date every other day, maybe she's got one finally. She can be quite bold.","sourceUid":"merged-mqq7jdby-1","sourceNo":376,"viRanges":[{"start":1042.841671,"end":1048.104229}],"koRanges":[{"start":1007.261277,"end":1011.025358}]},{"id":298,"readerNo":299,"displayNo":"N176","n":"N176","kind":"narration","type":"dialogue","vi":"Chị ấy cũng hơi táo bạo ở một khía cạnh nào đó.","ko":"걔가 또 은근히 과감한 데가 있잖아.","en":"She's also a bit bold in some ways.","text":"Chị ấy cũng hơi táo bạo ở một khía cạnh nào đó.\n걔가 또 은근히 과감한 데가 있잖아.\nShe's also a bit bold in some ways.","sourceUid":"nar-mr04lwu8-1tn5w8","sourceNo":"N176","viRanges":[],"koRanges":[]},{"id":299,"readerNo":300,"displayNo":"N177","n":"N177","kind":"narration","type":"dialogue","vi":". Bar (buổi tối)","ko":". 술집(저녁)","en":". Bar (evening)","text":". Bar (buổi tối)\n. 술집(저녁)\n. Bar (evening)","sourceUid":"nar-mr04mcyb-palqhd","sourceNo":"N177","viRanges":[],"koRanges":[]},{"id":300,"readerNo":301,"displayNo":"N178","n":"N178","kind":"narration","type":"dialogue","vi":"Lựa chọn thực đơn. Việc quyết định thực đơn không phải là điều dễ dàng vì có rất nhiều người và mọi người đều đang xem xét ý kiến ​​của nhau.","ko":"메뉴 선택 중이다. 여러 사람인 데다가 서로 눈치를 보고 있어서 메뉴를 정하는 게 쉽지 않다.","en":"Selecting menu. It's not easy to decide on a menu because there are many people and everyone is watching each other's opinions.","text":"Lựa chọn thực đơn. Việc quyết định thực đơn không phải là điều dễ dàng vì có rất nhiều người và mọi người đều đang xem xét ý kiến ​​của nhau.\n메뉴 선택 중이다. 여러 사람인 데다가 서로 눈치를 보고 있어서 메뉴를 정하는 게 쉽지 않다.\nSelecting menu. It's not easy to decide on a menu because there are many people and everyone is watching each other's opinions.","sourceUid":"nar-mr04mfpg-nlhq0p","sourceNo":"N178","viRanges":[],"koRanges":[]},{"id":301,"readerNo":302,"displayNo":"N179","n":"N179","kind":"narration","type":"dialogue","vi":"Anh ấy nói, ‘Cái gì cũng được’ và lật lại thực đơn…","ko":"‘아무거나 좋아요’라면서 메뉴판 돌리기를 하는데···.","en":"He said, ‘Anything is fine’ and turned the menu around...","text":"Anh ấy nói, ‘Cái gì cũng được’ và lật lại thực đơn…\n‘아무거나 좋아요’라면서 메뉴판 돌리기를 하는데···.\nHe said, ‘Anything is fine’ and turned the menu around...","sourceUid":"nar-mr04mi51-vfky1i","sourceNo":"N179","viRanges":[],"koRanges":[]},{"id":302,"readerNo":303,"displayNo":378,"n":378,"kind":"sub","type":"merged","vi":"Bạn thích gì vậy?\nGọi tôi khi quý khách chọn được món nhé!","ko":"뭐 좋아하세요?\n걔가 또 은근히 과감한 데가 있거든\n모르겠어요. 아무거나 좋아요\n결정하시면 말씀 주세요","en":"What do you like?\nPlease let me know once you decide.","text":"Bạn thích gì vậy?\nGọi tôi khi quý khách chọn được món nhé!\n뭐 좋아하세요?\n걔가 또 은근히 과감한 데가 있거든\n모르겠어요. 아무거나 좋아요\n결정하시면 말씀 주세요\nWhat do you like?\nPlease let me know once you decide.","sourceUid":"merged-mqq7omhw-4","sourceNo":378,"viRanges":[{"start":1048.104,"end":1053.577865}],"koRanges":[{"start":1011.025358,"end":1017.084},{"start":1017.084,"end":1024.3657}]},{"id":303,"readerNo":304,"displayNo":269,"n":269,"kind":"sub","type":"merged","vi":"Gọi món chưa?\nVẫn chưa sao?\nVậy để tôi chọn cho.","ko":"네...\n시켰어?\n뭐 아직도 안 시켰어. 줘봐","en":"I will make a decision then.\nDid you order?\nNot yet?","text":"Gọi món chưa?\nVẫn chưa sao?\nVậy để tôi chọn cho.\n네...\n시켰어?\n뭐 아직도 안 시켰어. 줘봐\nI will make a decision then.\nDid you order?\nNot yet?","sourceUid":"merged-mqq7qa2x-7","sourceNo":269,"viRanges":[{"start":1053.577865,"end":1063.312346}],"koRanges":[{"start":1017.084,"end":1028.431413}]},{"id":304,"readerNo":305,"displayNo":272,"n":272,"kind":"sub","type":"merged","vi":"Một canh chả cá. Một giá đỗ xào. Một tôm sốt cay.","ko":"내가 시켜줄게 일단 찌개 하나, 볶음 하나 시키고 소주 한 병, 맥주 세 병.","en":"Chili prawn. Fish cake soup. Fried bean sprout.","text":"Một canh chả cá. Một giá đỗ xào. Một tôm sốt cay.\n내가 시켜줄게 일단 찌개 하나, 볶음 하나 시키고 소주 한 병, 맥주 세 병.\nChili prawn. Fish cake soup. Fried bean sprout.","sourceUid":"merged-mqq7zcv7-10","sourceNo":272,"viRanges":[{"start":1063.312346,"end":1068.008158}],"koRanges":[{"start":1028.431413,"end":1034.596643}]},{"id":305,"readerNo":306,"displayNo":276,"n":276,"kind":"sub","type":"merged","vi":"Canh chả cá ở đây ngon lắm. Giá đỗ xào cũng nhiều. Tôm sốt cay rất cay luôn. Mọi người đều ăn cay chứ?\nMột chai soju, ba chai bia. Thiếu thì gọi thêm nhé? Được chứ?","ko":"여기 오뎅탕 죽음 칠리 새우는 열라 매워 매운 것 잘 먹지? 그리고 숙주 볶음은 양이 많아\n소주 한 병. 맥주 세 병\n모자라면 더 시키는 걸로? 오케이?","en":"You all like spicy stuff?\nFish cake soup here is excellent,\nand fried bean sprout dish is huge.\nChili prawn is very spicy.\nOne bottle of Soju, three bottles of beer. We can order more if we need to, okay?","text":"Canh chả cá ở đây ngon lắm. Giá đỗ xào cũng nhiều. Tôm sốt cay rất cay luôn. Mọi người đều ăn cay chứ?\nMột chai soju, ba chai bia. Thiếu thì gọi thêm nhé? Được chứ?\n여기 오뎅탕 죽음 칠리 새우는 열라 매워 매운 것 잘 먹지? 그리고 숙주 볶음은 양이 많아\n소주 한 병. 맥주 세 병\n모자라면 더 시키는 걸로? 오케이?\nYou all like spicy stuff?\nFish cake soup here is excellent,\nand fried bean sprout dish is huge.\nChili prawn is very spicy.\nOne bottle of Soju, three bottles of beer. We can order more if we need to, okay?","sourceUid":"merged-mqq95ub4-18","sourceNo":276,"viRanges":[{"start":1068.008158,"end":1080.368407},{"start":1068.008158,"end":1075.8}],"koRanges":[{"start":1034.596643,"end":1047.009507},{"start":1034.596643,"end":1041.826473}]},{"id":306,"readerNo":307,"displayNo":"N180","n":"N180","kind":"narration","type":"dialogue","vi":"Nếu không đủ thì tôi có thể đặt thêm được không?","ko":"모자라면 더 시키는 걸로?","en":"If it's not enough, can I order more?","text":"Nếu không đủ thì tôi có thể đặt thêm được không?\n모자라면 더 시키는 걸로?\nIf it's not enough, can I order more?","sourceUid":"nar-mr04nzbz-a9b9ks","sourceNo":"N180","viRanges":[],"koRanges":[]},{"id":307,"readerNo":308,"displayNo":"N181","n":"N181","kind":"narration","type":"dialogue","vi":"(Nhìn bạn như muốn bảo bạn hãy lên tiếng nếu phản đối) Được chứ?","ko":"(반대 있으면 말하라는 듯 쳐다보며) 오케이?","en":"(Looking at you as if telling you to speak up if you object) Okay?","text":"(Nhìn bạn như muốn bảo bạn hãy lên tiếng nếu phản đối) Được chứ?\n(반대 있으면 말하라는 듯 쳐다보며) 오케이?\n(Looking at you as if telling you to speak up if you object) Okay?","sourceUid":"nar-mr04o092-ib2yhf","sourceNo":"N181","viRanges":[],"koRanges":[]},{"id":308,"readerNo":309,"displayNo":"N182","n":"N182","kind":"narration","type":"dialogue","vi":"Những người bạn đồng hành gật đầu.","ko":"일행들 고개를 끄덕인다.","en":"The companions nod their heads.","text":"Những người bạn đồng hành gật đầu.\n일행들 고개를 끄덕인다.\nThe companions nod their heads.","sourceUid":"nar-mr04o0x2-1uz1s1","sourceNo":"N182","viRanges":[],"koRanges":[]},{"id":309,"readerNo":310,"displayNo":"N183","n":"N183","kind":"narration","type":"dialogue","vi":"Song Ji-won: (giơ tay lớn tiếng) Dì!!","ko":"송지원: (손 들며 큰 소리로) 이모님!!","en":"Song Ji-won: (raising hand loudly) Auntie!!","text":"Song Ji-won: (giơ tay lớn tiếng) Dì!!\n송지원: (손 들며 큰 소리로) 이모님!!\nSong Ji-won: (raising hand loudly) Auntie!!","sourceUid":"nar-mr04o4om-cxj5yd","sourceNo":"N183","viRanges":[],"koRanges":[]},{"id":310,"readerNo":311,"displayNo":"N184","n":"N184","kind":"narration","type":"dialogue","vi":". Trước quán bar (buổi tối)","ko":". 술집 앞(저녁)","en":". In front of the bar (evening)","text":". Trước quán bar (buổi tối)\n. 술집 앞(저녁)\n. In front of the bar (evening)","sourceUid":"nar-mr04o6z5-3zeeo8","sourceNo":"N184","viRanges":[],"koRanges":[]},{"id":311,"readerNo":312,"displayNo":"N185","n":"N185","kind":"narration","type":"dialogue","vi":"Ngoài cửa sổ, người phục vụ đang ghi đơn đặt hàng.","ko":"창문 너머, 종업원이 주문을 받아 적는다.","en":"Beyond the window, a waiter writes down orders.","text":"Ngoài cửa sổ, người phục vụ đang ghi đơn đặt hàng.\n창문 너머, 종업원이 주문을 받아 적는다.\nBeyond the window, a waiter writes down orders.","sourceUid":"nar-mr04o9uy-pw68i9","sourceNo":"N185","viRanges":[],"koRanges":[]},{"id":312,"readerNo":313,"displayNo":"N186","n":"N186","kind":"narration","type":"dialogue","vi":"Sau khi gọi món xong, Song Ji-won đích thân mang một cốc nước ra và phục vụ.","ko":"주문을 끝낸 송지원이 물컵을 직접 갖고 와 서빙하고,","en":"After finishing ordering, Song Ji-won personally brought a cup of water and served it.","text":"Sau khi gọi món xong, Song Ji-won đích thân mang một cốc nước ra và phục vụ.\n주문을 끝낸 송지원이 물컵을 직접 갖고 와 서빙하고,\nAfter finishing ordering, Song Ji-won personally brought a cup of water and served it.","sourceUid":"nar-mr04oaxd-i65woh","sourceNo":"N186","viRanges":[],"koRanges":[]},{"id":313,"readerNo":314,"displayNo":"N187","n":"N187","kind":"narration","type":"dialogue","vi":"Song Ji-won cũng tự mình mang bia và rượu soju ra và giơ chai lên để nói với người phụ nữ phía sau quầy rằng chị ta đã lấy nó ra.","ko":"맥주와 소주도 직접 꺼내며 카운터의 아줌마 사장에게 꺼냈다고 병을 들어 보인다.","en":"Song Ji-won also brought out beer and soju herself and held up the bottle to tell the lady behind the counter that she had taken it out.","text":"Song Ji-won cũng tự mình mang bia và rượu soju ra và giơ chai lên để nói với người phụ nữ phía sau quầy rằng chị ta đã lấy nó ra.\n맥주와 소주도 직접 꺼내며 카운터의 아줌마 사장에게 꺼냈다고 병을 들어 보인다.\nSong Ji-won also brought out beer and soju herself and held up the bottle to tell the lady behind the counter that she had taken it out.","sourceUid":"nar-mr04oe1z-jmhtwq","sourceNo":"N187","viRanges":[],"koRanges":[]},{"id":314,"readerNo":315,"displayNo":279,"n":279,"kind":"sub","type":"merged","vi":"Cô ơi!\nTôi lấy thêm một chai rượu. Ghi thêm vào hóa đơn nhé.","ko":"(모두) 응 응...\n이모님!\n(송지원) 이모! 술 가지고 가요 술 추가!","en":"I am grabbing the bottles myself. Add them to the bill!\nAuntie!","text":"Cô ơi!\nTôi lấy thêm một chai rượu. Ghi thêm vào hóa đơn nhé.\n(모두) 응 응...\n이모님!\n(송지원) 이모! 술 가지고 가요 술 추가!\nI am grabbing the bottles myself. Add them to the bill!\nAuntie!","sourceUid":"merged-mqq97yau-21","sourceNo":279,"viRanges":[{"start":1080.368407,"end":1085.833237}],"koRanges":[{"start":1047.009507,"end":1056.175668}]},{"id":315,"readerNo":316,"displayNo":"N188","n":"N188","kind":"narration","type":"dialogue","vi":"Khi người phục vụ mang món ăn kèm lên, anh ấy sẽ tự mình dọn lên.","ko":"종업원이 밑반찬을 가져오면 세팅도 자기가 한다.","en":"When the waiter brings the side dishes, he sets them up himself.","text":"Khi người phục vụ mang món ăn kèm lên, anh ấy sẽ tự mình dọn lên.\n종업원이 밑반찬을 가져오면 세팅도 자기가 한다.\nWhen the waiter brings the side dishes, he sets them up himself.","sourceUid":"nar-mr04q2to-fx2uhb","sourceNo":"N188","viRanges":[],"koRanges":[]},{"id":316,"readerNo":317,"displayNo":"N189","n":"N189","kind":"narration","type":"dialogue","vi":". Phòng khách (ban đêm)","ko":". 거실(밤)","en":". Living room (night)","text":". Phòng khách (ban đêm)\n. 거실(밤)\n. Living room (night)","sourceUid":"nar-mr04q7jy-osiw36","sourceNo":"N189","viRanges":[],"koRanges":[]},{"id":317,"readerNo":31 6,"n":306,"kind":"sub","type":"merged","vi":"Này.\nCái này của cậu nhỉ?\nKhai thật đi.\nCậu đưa trai về nhà chứ gì?\nHai người làm đủ mọi thứ rồi để quên à?","ko":"야!\n이거 너지?\n이실직고하지...\n당신 남자 끌어들였지?\n이것저것 으흥 하다가 깜박하고 두고 간 거지?\n[신발 소리]","en":"Hey. Is it yours? You better spill it out. You brought a guy, right? You guys were playing around and left this behind.","text":"Này.\nCái này của cậu nhỉ?\nKhai thật đi.\nCậu đưa trai về nhà chứ gì?\nHai người làm đủ mọi thứ rồi để quên à?\n야!\n이거 너지?\n이실직고하지...\n당신 남자 끌어들였지?\n이것저것 으흥 하다가 깜박하고 두고 간 거지?\n[신발 소리]\nHey. Is it yours? You better spill it out. You brought a guy, right? You guys were playing around and left this behind.","sourceUid":"merged-mqqgg3ih-5","sourceNo":306,"viRanges":[{"start":1184.3582,"end":1199.731696}],"koRanges":[{"start":1151.3717,"end":1164.872018}]},{"id":345,"readerNo":346,"displayNo":"N205","n":"N205","kind":"narration","type":"dialogue","vi":"Song Ji-won: (vò lại và ném nó vào Jeong Ye-eun)","ko":"송지원: (다시 뭉쳐 정예은에게 집어 던지며)","en":"Song Ji-won: (grouping again and throwing it at Jeong Ye-eun)","text":"Song Ji-won: (vò lại và ném nó vào Jeong Ye-eun)\n송지원: (다시 뭉쳐 정예은에게 집어 던지며)\nSong Ji-won: (grouping again and throwing it at Jeong Ye-eun)","sourceUid":"nar-mr059b5p-0o3zfy","sourceNo":"N205","viRanges":[],"koRanges":[]},{"id":346,"readerNo":347,"displayNo":435,"n":435,"kind":"sub","type":"merged","vi":"Đừng có xát muối vào tim tớ.\nCó được cũng mừng đấy.","ko":"아주 염장을 후벼라\n그럴 남자라도 있었으면 좋겠다","en":"Stop rubbing it in!\nI wish I had one to bring in.","text":"Đừng có xát muối vào tim tớ.\nCó được cũng mừng đấy.\n아주 염장을 후벼라\n그럴 남자라도 있었으면 좋겠다\nStop rubbing it in!\nI wish I had one to bring in.","sourceUid":"merged-mqqggzdk-6","sourceNo":435,"viRanges":[{"start":1199.731696,"end":1212.029258}],"koRanges":[{"start":1170,"end":1177.111837}]},{"id":347,"readerNo":348,"displayNo":"N206","n":"N206","kind":"narration","type":"dialogue","vi":"(Tôi đang cố vào phòng thì nó hiện lên!)","ko":"(방으로 들어가려다가 우뚝!)","en": e an asteroid comes down, so everyone will die at once, with or without a boyfriend.","sourceUid":"merged-mqrikavc-1","sourceNo":568,"viRanges":[{"start":1530.7,"end":1544.762721}],"koRanges":[{"start":1497.851927,"end":1512.172835}]},{"id":430,"readerNo":431,"displayNo":572,"n":572,"kind":"sub","type":"merged","vi":"Sao vậy?\nChị ấy thẳng thắn như thế,\nchắc không phải là người nói dối đâu.","ko":"흠...\n왜?\n저렇게 솔직한데...\n강 언니가 거짓말할 사람은 아닌 것 같아서요","en":"Why?\nShe is so frank.\nI don't think she would lie.","text":"Sao vậy?\nChị ấy thẳng thắn như thế,\nchắc không phải là người nói dối đâu.\n흠...\n왜?\n저렇게 솔직한데...\n강 언니가 거짓말할 사람은 아닌 것 같아서요\nWhy?\nShe is so frank.\nI don't think she would lie.","sourceUid":"merged-mqriot4q-2","sourceNo":572,"viRanges":[{"start":1544.762721,"end":1552.361451}],"koRanges":[{"start":1512.172835,"end":1519.7}]},{"id":431,"readerNo":432,"displayNo":577,"n":577,"kind":"sub","type":"merged","vi":"Đúng không? Chị nói rồi mà. Mấy thứ cậu ấy nói đều là chém gió thôi.","ko":"그치? 내가 그랬잖아 아유 저건 그냥 순 거짓말이야 뻥쟁이... 뻥쟁이... 어휴... [전화벨 소리] [문자 알람]","en":"Right?\nI told you.\nAll she says are lies and bluffs.","text":"Đúng không? Chị nói rồi mà. Mấy thứ cậu ấy nói đều là chém gió thôi.\n그치? 내가 그랬잖아 아유 저건 그냥 순 거짓말이야 뻥쟁이... 뻥쟁이... 어휴... [전화벨 소리] [문자 알람]\nRight?\nI told you.\nAll she says are lies and bluffs.","sourceUid":"merged-mqrirzf3-3","sourceNo":577,"viRanges":[{"start":1552.361451,"end":1559.873106}],"koRanges":[{"start":1519.7,"end":1526.777687}]},{"id":432,"readerNo":433,"displayNo":"N258","n":"N258","kind":"narration","type":"dialogue","vi":"Eunjae Yoo: (Nhìn vào phòng Kang Ina và nghiêng đầu)...","ko":"유은재: (강이나의 방을 보며 고개를 갸웃한다)···.","en":"Eunjae Yoo: (Looking at Kang Ina’s room and tilting his head)...","text":"Eunjae Yoo: (Nhìn vào phòng Kang Ina và nghiêng đầu)...\n유은재: (강이나의 방을 보며 고개를 갸웃한다)···.\nEunjae Yoo: (Looking at Kang Ina’s room and tilting his head)...","sourceUid":"nar-mr06axe1-6ocljb","sourceNo":"N258","viRanges":[],"koRanges":[]},{"id : Tôi sắp chết rồi. (Nhìn Eunjae Yoo đang đọc một cuốn tiểu thuyết cổ điển) Anh thích em.\n정예은: 죽겠다. (고전 소설 읽는 유은재 보며) 넌 좋겠다.\nJeong Ye-eun: I’m dying. (Looking at Eunjae Yoo reading a classic novel) I like you.","sourceUid":"nar-mr06fjnw-bv9azb","sourceNo":"N285","viRanges":[],"koRanges":[]},{"id":467,"readerNo":468,"displayNo":"N286","n":"N286","kind":"narration","type":"dialogue","vi":"Eunjae Yoo: (Nhìn)...?","ko":"유은재: (쳐다본다)···?","en":"Eunjae Yoo: (Looking)...?","text":"Eunjae Yoo: (Nhìn)...?\n유은재: (쳐다본다)···?\nEunjae Yoo: (Looking)...?","sourceUid":"nar-mr06fl08-nspo9h","sourceNo":"N286","viRanges":[],"koRanges":[]},{"id":468,"readerNo":469,"displayNo":"N287","n":"N287","kind":"narration","type":"dialogue","vi":"Jeong Ye-eun: Còn một chặng đường dài phía sau về mặt việc làm.","ko":"정예은: 취업 전선에서 머나먼 후방이잖아.","en":"Jeong Ye-eun: It's a long way behind on the employment front.","text":"Jeong Ye-eun: Còn một chặng đường dài phía sau về mặt việc làm.\n정예은: 취업 전선에서 머나먼 후방이잖아.\nJeong Ye-eun: It's a long way behind on the employment front.","sourceUid":"nar-mr06ftyd-cpegin","sourceNo":"N287","viRanges":[],"koRanges":[]},{"id":469,"readerNo":470,"displayNo":"N288","n":"N288","kind":"narration","type":"dialogue","vi":"Song Ji-won: (Rời khỏi phòng. Cầm cuốn sách Toeic và đi đến tủ lạnh trong khi lẩm bẩm bằng tiếng Anh)...","ko":"송지원: (방에서 나온다. 토익 책을 들고 영어로 중얼대면서 냉장고로 향한다)···.","en":"Song Ji-won: (Leaves the room. Holds a TOEIC book and heads to the refrigerator while muttering in English)...","text":"Song Ji-won: (Rời khỏi phòng. Cầm cuốn sách Toeic và đi đến tủ lạnh trong khi lẩm bẩm bằng tiếng Anh)...\n송지원: (방에서 나온다. 토익 책을 들고 영어로 중얼대면서 냉장고로 향한다)···.\nSong Ji-won: (Leaves the room. Holds a TOEIC book and heads to the refrigerator while muttering in English)...","sourceUid":"nar-mr06fup4-w610oa","sourceNo":"N288","viRanges":[],"koRanges":[]},{"id":470,"readerNo":471,"displayNo":429,"n":429,"kind":"sub","type":"merged","vi":"Play hard when you play.\nHoa sớm nở chóng tàn mà "sourceNo":"N290","viRanges":[],"koRanges":[]},{"id":479,"readerNo":480,"displayNo":"N291","n":"N291","kind":"narration","type":"dialogue","vi":"Ở một bên con hẻm, một người đàn ông đang nhìn lên tầng ba. Đây là người đàn ông mà Jeong Ye-eun đã nhìn thấy trước đây.","ko":"골목 한쪽, 남자가 3층을 보고 있다. 전에 정예은이 봤던 그 남자다.","en":"On one side of the alley, a man is looking at the third floor. This is the man that Jeong Ye-eun saw before.","text":"Ở một bên con hẻm, một người đàn ông đang nhìn lên tầng ba. Đây là người đàn ông mà Jeong Ye-eun đã nhìn thấy trước đây.\n골목 한쪽, 남자가 3층을 보고 있다. 전에 정예은이 봤던 그 남자다.\nOn one side of the alley, a man is looking at the third floor. This is the man that Jeong Ye-eun saw before.","sourceUid":"nar-mr06y7pm-ofwqa0","sourceNo":"N291","viRanges":[],"koRanges":[]},{"id":480,"readerNo":481,"displayNo":"N292","n":"N292","kind":"narration","type":"dialogue","vi":"Khi Yoon Jin-myeong nhìn anh ta, người đàn ông bỏ đi.","ko":"윤진명이 쳐다보자 남자가 자리를 피한다.","en":"When Yoon Jin-myeong looks at him, the man walks away.","text":"Khi Yoon Jin-myeong nhìn anh ta, người đàn ông bỏ đi.\n윤진명이 쳐다보자 남자가 자리를 피한다.\nWhen Yoon Jin-myeong looks at him, the man walks away.","sourceUid":"nar-mr06y9f3-mxlcz0","sourceNo":"N292","viRanges":[],"koRanges":[]},{"id":481,"readerNo":482,"displayNo":"N293","n":"N293","kind":"narration","type":"dialogue","vi":". Jeong Ye-eun, phòng của Song Ji-won (ngày)","ko":". 정예은, 송지원의 방(낮)","en":". Jeong Ye-eun, Song Ji-won’s room (day)","text":". Jeong Ye-eun, phòng của Song Ji-won (ngày)\n. 정예은, 송지원의 방(낮)\n. Jeong Ye-eun, Song Ji-won’s room (day)","sourceUid":"nar-mr06ycul-vciedi","sourceNo":"N293","viRanges":[],"koRanges":[]},{"id":482,"readerNo":483,"displayNo":"N294","n":"N294","kind":"narration","type":"dialogue","vi":"Song Ji-won đang nằm nửa người trên giường tầng và xem Infinite Challenge trên điện thoại di động.","ko":"송지원이 2층 침대에 반쯤 누워 핸드폰으로 \u003c무한도전>을 본다.","en":"Song Ji-won is half-lying on the bunk bed and watching Infinite Challenge on her cell phone.","text":"Song Ji-won đang nằm nửa người trên giường tầng và xem Infinite Challenge trên điện thoại di động.\n송지원이 2층 침대에 반쯤 누워 핸드폰으로 \u003c무한도전>을 본다.\nSong Ji-won is half-lying on the bunk bed and watching Infinite Challenge on her cell phone.","sourceUid":"nar-mr06ye7m-312n8x","sourceNo":"N294","viRanges":[],"koRanges":[]},{"id":483,"readerNo":484,"displayNo":"N295","n":"N295","kind":"narration","type":"dialogue","vi":"\u003cThử thách vô hạn> chỉ mới bắt đầu.","ko":"\u003c무한도전>이 막 시작한다.","en":"\u003cInfinite Challenge> is just starting.","text":"\u003cThử thách vô hạn> chỉ mới bắt đầu.\n\u003c무한도전>이 막 시작한다.\n\u003cInfinite Challenge> is just starting.","sourceUid":"nar-mr06yfnc-jdwwwp","sourceNo":"N295","viRanges":[],"koRanges":[]},{"id":484,"readerNo":485,"displayNo":"N296","n":"N296","kind":"narration","type":"dialogue","vi":"Sau khi rửa mặt xong, Jeong Ye-eun ngồi trước bàn trang điểm.","ko":"세수를 끝낸 정예은이 화장대 앞에 앉는다.","en":"After finishing washing her face, Jeong Ye-eun sits in front of the dressing table.","text":"Sau khi rửa mặt xong, Jeong Ye-eun ngồi trước bàn trang điểm.\n세수를 끝낸 정예은이 화장대 앞에 앉는다.\nAfter finishing washing her face, Jeong Ye-eun sits in front of the dressing table.","sourceUid":"nar-mr06yiev-jvg9cd","sourceNo":"N296","viRanges":[],"koRanges":[]},{"id":485,"readerNo":486,"displayNo":"N297","n":"N297","kind":"narration","type":"dialogue","vi":"Ngay khi \u003cThử thách vô hạn> bắt đầu, Jeong Ye-eun bắt đầu trang điểm.","ko":"\u003c무한도전>이 시작하는 것과 동시에 정예은이 화장을 시작한다.","en":"As soon as \u003cInfinite Challenge> starts, Jeong Ye-eun starts putting on her makeup.","text":"Ngay khi \u003cThử thách vô hạn> bắt đầu, Jeong Ye-eun bắt đầu trang điểm.\n\u003c무한도전>이 시작하는 것과 동시에 정예은이 화장을 시작한다.\nAs soon as \u003cInfinite Challenge> starts, Jeong Ye-eun starts putting on her makeup.","sourceUid":"nar-mr06ykae-fpqe8s","sourceNo":"N297","viRanges":[],"koRanges":[]},{"id":486,"readerNo":487,"displayNo":"N298","n":"N298","kind":"narration","type":"dialogue","vi":"Da, kem dưỡng da, cái này cái kia, (Song Ji-won cười) Kem chống nắng, kem che khuyết điểm, cái này cái kia.","ko":"스킨, 로션, 이것저것, (송지원의 웃음소리) 선블록, 컨실러, 이것저것.","en":"Skin, lotion, this and that, (Song Ji-won’s laughter) Sunblock, concealer, this and that.","text":"Da, kem dưỡng da, cái này cái kia, (Song Ji-won cười) Kem chống nắng, kem che khuyết điểm, cái này cái kia.\n스킨, 로션, 이것저것, (송지원의 웃음소리) 선블록, 컨실러, 이것저것.\nSkin, lotion, this and that, (Song Ji-won’s laughter) Sunblock, concealer, this and that.","sourceUid":"nar-mr06ylv9-umclep","sourceNo":"N298","viRanges":[],"koRanges":[]},{"id":487,"readerNo":488,"displayNo":"N299","n":"N299","kind":"narration","type":"dialogue","vi":"(Cười) Đánh kem nền, phấn má hồng, phấn highlight, cái này cái kia...","ko":"(웃음소리) 파운데이션을 바르고, 블러셔, 하이라이터, 이것저것···.","en":"(Laughing) Apply foundation, blusher, highlighter, this and that...","text":"(Cười) Đánh kem nền, phấn má hồng, phấn highlight, cái này cái kia...\n(웃음소리) 파운데이션을 바르고, 블러셔, 하이라이터, 이것저것···.\n(Laughing) Apply foundation, blusher, highlighter, this and that...","sourceUid":"nar-mr06ynov-28ej4h","sourceNo":"N299","viRanges":[],"koRanges":[]},{"id":488,"readerNo":489,"displayNo":"N300","n":"N300","kind":"narration","type":"dialogue","vi":"Nâng cao lông mày của bạn bằng dụng cụ uốn lông mi.","ko":"뷰러로 눈썹을 올린다.","en":"Raise your eyebrows with an eyelash curler.","text":"Nâng cao lông mày của bạn bằng dụng cụ uốn lông mi.\n뷰러로 눈썹을 올린다.\nRaise your eyebrows with an eyelash curler.","sourceUid":"nar-mr06yovc-p5rlwk","sourceNo":"N300","viRanges":[],"koRanges":[]},{"id":489,"readerNo":490,"displayNo":"N301","n":"N301","kind":"narration","type":"dialogue","vi":"Trang điểm mắt và vẽ eyeliner.","ko":"눈 화장을 하고 아이라인을 그린다.","en":"Put on eye makeup and draw eyeliner.","text":"Trang điểm mắt và vẽ eyeliner.\n눈 화장을 하고 아이라인을 그린다.\nPut on eye makeup and draw eyeliner.","sourceUid":"nar-mr06yqpd-imaqnr","sourceNo":"N301","viRanges":[],"koRanges":[]},{"id":490,"readerNo":491,"displayNo":"N302","n":"N302","kind":"narration","type":"dialogue","vi":"Trong khi tôi đang kẻ lông mày và chuốt mascara, \u003cThử thách vô hạn> đã kết thúc.","ko":"눈썹을 보강하고, 마스카라를 바르는데 \u003c무한도전>이 끝났다.","en":"While I was strengthening my eyebrows and applying mascara, \u003cInfinite Challenge> was over.","text":"Trong khi tôi đang kẻ lông mày và chuốt mascara, \u003cThử thách vô hạn> đã kết thúc.\n눈썹을 보강하고, 마스카라를 바르는데 \u003c무한도전>이 끝났다.\nWhile I was strengthening my eyebrows and applying mascara, \u003cInfinite Challenge> was over.","sourceUid":"nar-mr06ys2h-b3cpdk","sourceNo":"N302","viRanges":[],"koRanges":[]},{"id":491,"readerNo":492,"displayNo":"N303","n":"N303","kind":"narration","type":"dialogue","vi":"Khi Song Ji-won cố gắng đi xuống từ tầng hai, cô ấy chỉ ngồi xuống và nhìn Jeong Ye-eun.","ko":"송지원이 2층에서 내려오려다가 그냥 걸터앉아 정예은을본다.","en":"As Song Ji-won tries to come down from the second floor, she just sits down and looks at Jeong Ye-eun.","text":"Khi Song Ji-won cố gắng đi xuống từ tầng hai, cô ấy chỉ ngồi xuống và nhìn Jeong Ye-eun.\n송지원이 2층에서 내려오려다가 그냥 걸터앉아 정예은을본다.\nAs Song Ji-won tries to come down from the second floor, she just sits down and looks at Jeong Ye-eun.","sourceUid":"nar-mr06ythi-ls4qsu","sourceNo":"N303","viRanges":[],"koRanges":[]},{"id":492,"readerNo":493,"displayNo":"N304","n":"N304","kind":"narration","type":"dialogue","vi":"Jeong Ye-eun mặc áo sơ mi và dùng khăn giấy che mặt để ngăn lớp trang điểm bám vào.","ko":"정예은이 윗도리를 입는데 화장이 묻는 걸 막기 위해 티슈로 얼굴을 가린다.","en":"Jeong Ye-eun is wearing a top and covers her face with a tissue to prevent makeup from getting on.","text":"Jeong Ye-eun mặc áo sơ mi và dùng khăn giấy che mặt để ngăn lớp trang điểm bám vào.\n정예은이 윗도리를 입는데 화장이 묻는 걸 막기 위해 티슈로 얼굴을 가린다.\nJeong Ye-eun is wearing a top and covers her face with a tissue to prevent makeup from getting on.","sourceUid":"nar-mr06yuv8-l0by8h","sourceNo":"N304","viRanges":[],"koRanges":[]},{"id":493,"readerNo":494,"displayNo":"N305","n":"N305","kind":"narration","ty terest in you, and I never will.\nSo please stop this.","sourceUid":"merged-mqrzuje4-28","sourceNo":530,"viRanges":[{"start":2258.365032,"end":2267.006205}],"koRanges":[{"start":2224.058534,"end":2229.608103}]},{"id":614,"readerNo":615,"displayNo":766,"n":766,"kind":"sub","type":"merged","vi":"Anh cứ thử…\ngọi điện lần nữa xem.","ko":"그러니까... 다신 이런 짓 하지 마요\n전화...\n한 번만 더 해봐\n[구두 소리]","en":"Don't ever...\ncall me again.","text":"Anh cứ thử…\ngọi điện lần nữa xem.\n그러니까... 다신 이런 짓 하지 마요\n전화...\n한 번만 더 해봐\n[구두 소리]\nDon't ever...\ncall me again.","sourceUid":"merged-mqrzvmnk-29","sourceNo":766,"viRanges":[{"start":2267.006205,"end":2271.435431}],"koRanges":[{"start":2229.608103,"end":2237.247468}]},{"id":615,"readerNo":616,"displayNo":"N400","n":"N400","kind":"narration","type":"dialogue","vi":"Người đàn ông: (Bàn tay cầm bó hoa rũ xuống. Anh cô đơn quay đi)...","ko":"그남자: (꽃다발을 든 손이 축 늘어진다. 쓸쓸히 돌아선다)···.","en":"The man: (The hand holding the bouquet goes limp. He turns away lonely)...","text":"Người đàn ông: (Bàn tay cầm bó hoa rũ xuống. Anh cô đơn quay đi)...\n그남자: (꽃다발을 든 손이 축 늘어진다. 쓸쓸히 돌아선다)···.\nThe man: (The hand holding the bouquet goes limp. He turns away lonely)...","sourceUid":"nar-mr07dvhx-wb5vrc","sourceNo":"N400","viRanges":[],"koRanges":[]},{"id":616,"readerNo":617,"displayNo":"N401","n":"N401","kind":"narration","type":"dialogue","vi":". Phòng khách (ban đêm)","ko":". 거실(밤)","en":". Living room (night)","text":". Phòng khách (ban đêm)\n. 거실(밤)\n. Living room (night)","sourceUid":"nar-mr07dx1m-690kzn","sourceNo":"N401","viRanges":[],"koRanges":[]},{"id":617,"readerNo":618,"displayNo":"N402","n":"N402","kind":"narration","type":"dialogue","vi":"Eunjae Yoo: (đi ra khỏi phòng)...","ko":"유은재: (방에서 나온다)···.","en":"Eunjae Yoo: (coming out of the room)...","text":"Eunjae Yoo: (đi ra khỏi phòng)...\n유은재: (방에서 나온다)···.\nEunjae Yoo: (coming out of the room)...","sourceUid":"nar-mr07dy82-3cm0q2","sourceNo":"N402","viRanges":[],"koRanges":[]},{"id":618,"readerNo":619, nCậu tò mò làm gì?","ko":"우리 집 앞에 열녀문 들어서는 줄 알았다\n오빠야가 뭐 해줬어?\n가방?\n반지?\n뭐가 그렇게 궁금해?","en":"What a devoted woman.\nWhat did he get you?\nPurse? Ring?\nWhy are you so curious?","text":"Quả là người phụ nữ đức hạnh.\nAnh ấy tặng gì cho cậu?\nTúi xách? Nhẫn?\nCậu tò mò làm gì?\n우리 집 앞에 열녀문 들어서는 줄 알았다\n오빠야가 뭐 해줬어?\n가방?\n반지?\n뭐가 그렇게 궁금해?\nWhat a devoted woman.\nWhat did he get you?\nPurse? Ring?\nWhy are you so curious?","sourceUid":"merged-mqs02fi4-32","sourceNo":541,"viRanges":[{"start":2302.555827,"end":2311.996733}],"koRanges":[{"start":2268.638146,"end":2277.816145}]},{"id":622,"readerNo":623,"displayNo":785,"n":785,"kind":"sub","type":"merged","vi":"Là để vui lây đó. Cho xem tí đi.\nHiểu rồi.\nAnh ấy quên chứ gì.\nKhông phải!","ko":"대리만족이라는 게 있잖아...\n구경 좀 하자...\n옳다구나\n까먹었구나!\n아니야...","en":"For vicarious pleasure, show it to me.\nI get it.\nHe forgot!\nNo, he didn't!","text":"Là để vui lây đó. Cho xem tí đi.\nHiểu rồi.\nAnh ấy quên chứ gì.\nKhông phải!\n대리만족이라는 게 있잖아...\n구경 좀 하자...\n옳다구나\n까먹었구나!\n아니야...\nFor vicarious pleasure, show it to me.\nI get it.\nHe forgot!\nNo, he didn't!","sourceUid":"merged-mqs04gq5-33","sourceNo":785,"viRanges":[{"start":2311.996733,"end":2321.368887}],"koRanges":[{"start":2277.816145,"end":2287.400181}]},{"id":623,"readerNo":624,"displayNo":"N404","n":"N404","kind":"narration","type":"dialogue","vi":"(Bỏ dép vào tủ giày vì sợ bị nhìn thấy)","ko":"(표정 들킬까 봐 샌들을 신발장에 넣으며)","en":"(Putting sandals in the shoe rack for fear of being seen)","text":"(Bỏ dép vào tủ giày vì sợ bị nhìn thấy)\n(표정 들킬까 봐 샌들을 신발장에 넣으며)\n(Putting sandals in the shoe rack for fear of being seen)","sourceUid":"nar-mr07g52h-se9mvh","sourceNo":"N404","viRanges":[],"koRanges":[]},{"id":624,"readerNo":625,"displayNo":792,"n":792,"kind":"sub","type":"merged","vi":"Hóa ra cuối tuần này, anh ấy lên kế hoạch du lịch hai ngày một đêm.\nSướng nhỉ.\nĐi đâu?\nChuncheon.\nVậy thì mặt mũi cậu sao thế?\nNhư bị cho leo cây vậy?","ko":"주말에...\n박 2일 여행 계획 짜왔더라고\n좋겠다\n어디로?\n춘천\n근데 얼굴이 왜 nd.","sourceUid":"merged-mqs0zbbx-45","sourceNo":572,"viRanges":[{"start":2428.926188,"end":2449.799547}],"koRanges":[{"start":2394.281142,"end":2415.787879}]},{"id":655,"readerNo":656,"displayNo":831,"n":831,"kind":"sub","type":"merged","vi":"[Báo động văn bản]\n[Cười]\n[Thở dài]","ko":"[문자 알람]\n[웃는다]\n[한숨 쉰다]","en":"[Text Alarm]\n[Laughs]\n[Sighs]","text":"[Báo động văn bản]\n[Cười]\n[Thở dài]\n[문자 알람]\n[웃는다]\n[한숨 쉰다]\n[Text Alarm]\n[Laughs]\n[Sighs]","sourceUid":"merged-mqs0zmwc-46","sourceNo":831,"viRanges":[],"koRanges":[]},{"id":656,"readerNo":657,"displayNo":835,"n":835,"kind":"sub","type":"merged","vi":"Mấy giờ cậu sẽ đi?\nĐịnh nhắn tới bao giờ?","ko":"(송지원) 몇 시 출발이야?\n아이...\n언제까지 할 거야!","en":"What time are you leaving?\nHow much more now?","text":"Mấy giờ cậu sẽ đi?\nĐịnh nhắn tới bao giờ?\n(송지원) 몇 시 출발이야?\n아이...\n언제까지 할 거야!\nWhat time are you leaving?\nHow much more now?","sourceUid":"merged-mqs12ni3-47","sourceNo":835,"viRanges":[{"start":2449.799547,"end":2466.857506}],"koRanges":[{"start":2415.787879,"end":2432.819008}]},{"id":657,"readerNo":658,"displayNo":836,"n":836,"kind":"sub","type":"merged","vi":"[Báo động văn bản]","ko":"[문자 알람]","en":"[Text Alarm]","text":"[Báo động văn bản]\n[문자 알람]\n[Text Alarm]","sourceUid":"merged-mqs13sjq-48","sourceNo":836,"viRanges":[],"koRanges":[]},{"id":658,"readerNo":659,"displayNo":843,"n":843,"kind":"sub","type":"merged","vi":"(Song Ji Won) Hahaha\n[Cười]\n[Nhạc nền sôi động kết thúc]\n[Âm nhạc truyền thống bắt đầu]","ko":"(송지원) ㅋㅋㅋ\n[웃는다]\n[경쾌한 배경 음악 끝]\n[전통적인 음악 시작]","en":"(Song Ji-won) Hahaha [Laughs] [Upbeat background music ends] [Traditional music begins]","text":"(Song Ji Won) Hahaha\n[Cười]\n[Nhạc nền sôi động kết thúc]\n[Âm nhạc truyền thống bắt đầu]\n(송지원) ㅋㅋㅋ\n[웃는다]\n[경쾌한 배경 음악 끝]\n[전통적인 음악 시작]\n(Song Ji-won) Hahaha [Laughs] [Upbeat background music ends] [Traditional music begins]","sourceUid":"merged-mqs16f0q-50","sourceNo":843,"viRanges":[],"koRanges":[]},{"id":659,"readerNo":660,"displayNo":851,"n":851,"kind":"sub","type":"merged","vi":"Hihi. Dừng lại đi. Quý cô Jung tới đây. Tất cả hãy ra diện kiến! Quý cô Jung giá đáo!\nCậu ấy sẽ đi Chuncheon. Chắc sẽ vui lắm. Đâu chỉ vậy.\nCòn chuyện bất ngờ hơn nữa.\nHọ sẽ đi hai ngày một đêm.\nCó nghĩa là họ có thể thức cả đêm.","ko":"에?\n그만하라고...\n야...\n정 여사가 나갑니다 다들 나와 보세요\n정 여사가 나갑니다\n하지 마...\n어디 가는데요?\n춘천에 놀러 간대요. 좋겠지요?\n그것도 사랑하는 그이랑 좋다 뿐이야. 더 놀라운 걸 알려줘?\n밤새 할 수 있단 얘기지\n박 2일","en":"Lol.\nEnough now.\nHere comes Miss Jung. Everyone come out!\nMiss Jung is coming!\nStop it.\nShe's going to Chuncheon with her boyfriend.\nThe more amazing thing is that\nthey're staying over night!\nThey can spend the night together.","text":"Hihi. Dừng lại đi. Quý cô Jung tới đây. Tất cả hãy ra diện kiến! Quý cô Jung giá đáo!\nCậu ấy sẽ đi Chuncheon. Chắc sẽ vui lắm. Đâu chỉ vậy.\nCòn chuyện bất ngờ hơn nữa.\nHọ sẽ đi hai ngày một đêm.\nCó nghĩa là họ có thể thức cả đêm.\n에?\n그만하라고...\n야...\n정 여사가 나갑니다 다들 나와 보세요\n정 여사가 나갑니다\n하지 마...\n어디 가는데요?\n춘천에 놀러 간대요. 좋겠지요?\n그것도 사랑하는 그이랑 좋다 뿐이야. 더 놀라운 걸 알려줘?\n밤새 할 수 있단 얘기지\n박 2일\nLol.\nEnough now.\nHere comes Miss Jung. Everyone come out!\nMiss Jung is coming!\nStop it.\nShe's going to Chuncheon with her boyfriend.\nThe more amazing thing is that\nthey're staying over night!\nThey can spend the night together.","sourceUid":"merged-mqs1bol8-55","sourceNo":851,"viRanges":[{"start":2466.857506,"end":2499.214949}],"koRanges":[{"start":2432.819008,"end":2464.557869}]},{"id":660,"readerNo":661,"displayNo":855,"n":855,"kind":"sub","type":"ko","vi":"[Âm nhạc truyền thống kết thúc]","ko":"[전통적인 음악 끝]","en":"[Traditional music ends]","text":"[Âm nhạc truyền thống kết thúc]\n[전통적인 음악 끝]\n[Traditional music ends]","sourceUid":"ko-mql0e9i6-1690","sourceNo":855,"viRanges":[],"koRanges":[]},{"id":661,"readerNo":662,"displayNo":"N447","n":"N447","kind":"narration","type":"dialogue","vi":". Phòng khách (sáng)","ko":". 거실(아침)","en":". Living room (morning)","text":". Phòng khách (sáng)\n. 거실(아침)\n. Living room (morning) n":"Jeong Ye-eun: (If you open your hand, it’s 1,000 won)","text":"Jeong Ye-eun: (Nếu bạn mở tay ra, đó là 1.000 won)\n정예은: (손 펴보면 천 원이다)\nJeong Ye-eun: (If you open your hand, it’s 1,000 won)","sourceUid":"nar-mr088zmh-uzibbe","sourceNo":"N451","viRanges":[],"koRanges":[]},{"id":666,"readerNo":667,"displayNo":"N452","n":"N452","kind":"narration","type":"dialogue","vi":"Song Ji-won: Tôi dùng cái này để mua rượu và nến thơm, nếu còn thừa tôi cũng mua dầu thơm...","ko":"송지원: 이걸로 와인이랑 향초 사고, 남으면 아로마 오일도 사서···.","en":"Song Ji-won: I use this to buy wine and scented candles, and if I have any leftover, I also buy aroma oil...","text":"Song Ji-won: Tôi dùng cái này để mua rượu và nến thơm, nếu còn thừa tôi cũng mua dầu thơm...\n송지원: 이걸로 와인이랑 향초 사고, 남으면 아로마 오일도 사서···.\nSong Ji-won: I use this to buy wine and scented candles, and if I have any leftover, I also buy aroma oil...","sourceUid":"nar-mr08912s-nv8yle","sourceNo":"N452","viRanges":[],"koRanges":[]},{"id":667,"readerNo":668,"displayNo":"N453","n":"N453","kind":"narration","type":"dialogue","vi":"Jeong Ye-eun: (Ném tờ 1.000 won vào mặt Song Ji-won)...","ko":"정예은: (천 원짜리를 송지원 얼굴에 던져버린다)···.","en":"Jeong Ye-eun: (Throws a 1,000 won bill at Song Ji-won’s face)...","text":"Jeong Ye-eun: (Ném tờ 1.000 won vào mặt Song Ji-won)...\n정예은: (천 원짜리를 송지원 얼굴에 던져버린다)···.\nJeong Ye-eun: (Throws a 1,000 won bill at Song Ji-won’s face)...","sourceUid":"nar-mr0892fw-67wt9q","sourceNo":"N453","viRanges":[],"koRanges":[]},{"id":668,"readerNo":669,"displayNo":860,"n":860,"kind":"sub","type":"merged","vi":"Lại nữa rồi! Thôi, biết rồi. Đi vui nhé. Ôi, hồi hộp quá. Em đi rồi về nhé. Đi chơi vui. Chờ đã.\nChỗ này không đáng bao nhiêu,\nnhưng hãy dùng nó mua rượu vang với nến nhé.\nCòn thừa thì mua thêm tinh dầu thơm.","ko":"아, 너 또?\n그건 됐고...\n잘 가\n나 떨려... 갔다 올게\n갔다 와\n아, 잠깐, 잠깐\n이거 얼마 안 되는데...\n이걸로 와인이랑 향초사고...","en":"Again? No, never mind. Bye. I'm so excited, I'll be back. Take care. Wait a minute. This isn't much. Buy some wine and candle with this, and aroma oil if you can.","text":"Lại nữa rồi! Thôi, biết rồi. Đi vui nhé. Ôi, hồi hộp quá. Em đi rồi về nhé. Đi chơi vui. Chờ đã.\nChỗ này không đáng bao nhiêu,\nnhưng hãy dùng nó mua rượu vang với nến nhé.\nCòn thừa thì mua thêm tinh dầu thơm.\n아, 너 또?\n그건 됐고...\n잘 가\n나 떨려... 갔다 올게\n갔다 와\n아, 잠깐, 잠깐\n이거 얼마 안 되는데...\n이걸로 와인이랑 향초사고...\nAgain? No, never mind. Bye. I'm so excited, I'll be back. Take care. Wait a minute. This isn't much. Buy some wine and candle with this, and aroma oil if you can.","sourceUid":"merged-mqs1d8wu-56","sourceNo":860,"viRanges":[{"start":2499.214949,"end":2518.668125},{"start":2499.214949,"end":2514.840113}],"koRanges":[{"start":2464.557869,"end":2484.216827},{"start":2464.557869,"end":2482.025444}]},{"id":669,"readerNo":670,"displayNo":870,"n":870,"kind":"sub","type":"merged","vi":"Em đi thật đây. - Chào. - Tạm biệt. Chơi cả phần của tớ luôn nhé. Cố lên! - Cố lên! - Cố lên! Đi đây.","ko":"남으면 아로마 오일도 사서... 에이 진짜... 나 갈께 나 진짜 간다, 간다 잘 가... 내 몫까지 하고 와라! 파이팅! 파이팅! - 파이팅! - 다녀오세요... 간다...","en":"I'll get going, for real.\n-Bye. -Bye.\nEnjoy your time for me.\nCheer up!\n-Cheer up! -Cheer up!\nBye all.","text":"Em đi thật đây. - Chào. - Tạm biệt. Chơi cả phần của tớ luôn nhé. Cố lên! - Cố lên! - Cố lên! Đi đây.\n남으면 아로마 오일도 사서... 에이 진짜... 나 갈께 나 진짜 간다, 간다 잘 가... 내 몫까지 하고 와라! 파이팅! 파이팅! - 파이팅! - 다녀오세요... 간다...\nI'll get going, for real.\n-Bye. -Bye.\nEnjoy your time for me.\nCheer up!\n-Cheer up! -Cheer up!\nBye all.","sourceUid":"merged-mqs1g5qs-57","sourceNo":870,"viRanges":[{"start":2518.668125,"end":2530.3681}],"koRanges":[{"start":2484.216827,"end":2496.944265}]},{"id":670,"readerNo":671,"displayNo":"N454","n":"N454","kind":"narration","type":"dialogue","vi":"Jeong Ye-eun: (Quay lại với khuôn mặt như muốn nói, 'Tôi thực sự không thể ngăn cản bạn được.' Đó là khuôn mặt khiến tôi chết vì hạnh phúc)···.","ko":"정예은: (‘못 말려, 진짜’ 하는 얼굴로 돌아선다. 행복해 죽는 얼굴이다)···.","en":"Jeong Ye-eun: (Turns around with a face that says, ‘I can’t stop you, really.’ It’s a face that makes me die of happiness)···.","text":"Jeong Ye-eun: (Quay lại với khuôn mặt như muốn nói, 'Tôi thực sự không thể ngăn cản bạn được.' Đó là khuôn mặt khiến tôi chết vì hạnh phúc)···.\n정예은: (‘못 말려, 진짜’ 하는 얼굴로 돌아선다. 행복해 죽는 얼굴이다)···.\nJeong Ye-eun: (Turns around with a face that says, ‘I can’t stop you, really.’ It’s a face that makes me die of happiness)···.","sourceUid":"nar-mr089seh-96j10i","sourceNo":"N454","viRanges":[],"koRanges":[]},{"id":671,"readerNo":672,"displayNo":872,"n":872,"kind":"sub","type":"merged","vi":"[Cười] [Bíp bíp bíp tiếng cửa] [Tiếng đóng cửa]","ko":"[웃는다]\n[삑삑삑 문소리]\n[문 닫는 소리]","en":"[Laughs] [Beep beep beep sound of door] [Sound of door closing]","text":"[Cười] [Bíp bíp bíp tiếng cửa] [Tiếng đóng cửa]\n[웃는다]\n[삑삑삑 문소리]\n[문 닫는 소리]\n[Laughs] [Beep beep beep sound of door] [Sound of door closing]","sourceUid":"merged-mqs1gayt-58","sourceNo":872,"viRanges":[],"koRanges":[]},{"id":672,"readerNo":673,"displayNo":879,"n":879,"kind":"sub","type":"merged","vi":"Thở dài]\n[Nhạc chủ đề sôi động bắt đầu]\n[Meo]\n[Tiếng hành lý được kéo]","ko":"[한숨 쉰다] [경쾌한 테마 음악 시작] [야옹] [짐 가방 끄는 소리]","en":"[Sighs]\n[Upbeat theme music starts]\n[Meow]\n[Sound of luggage being pulled]","text":"Thở dài]\n[Nhạc chủ đề sôi động bắt đầu]\n[Meo]\n[Tiếng hành lý được kéo]\n[한숨 쉰다] [경쾌한 테마 음악 시작] [야옹] [짐 가방 끄는 소리]\n[Sighs]\n[Upbeat theme music starts]\n[Meow]\n[Sound of luggage being pulled]","sourceUid":"merged-mqs54x2p-60","sourceNo":879,"viRanges":[],"koRanges":[]},{"id":673,"readerNo":674,"displayNo":"N455","n":"N455","kind":"narration","type":"dialogue","vi":". Trước Belle Epoque (sáng)","ko":". 벨 에포크 앞(아침)","en":". In front of Belle Epoque (morning)","text":". Trước Belle Epoque (sáng)\n. 벨 에포크 앞(아침)\n. In front of Belle Epoque (morning)","sourceUid":"nar-mr08a4en-z633t6","sourceNo":"N455","viRanges":[],"koRanges":[]},{"id":674,"readerNo":675,"displayNo":"N456","n":"N456","kind":"narration","type":"dialogue","vi":"Khuôn mặt hạnh phúc gần như sắp ie more and more.\nSince when have we become shy without make-up?\nSince when...\nhave we become shy of the truth?\nRight.\nTruth is indigent,\nsad,\nand weak.","text":"Lớp trang điểm ngày càng đậm,\nvà ta lại càng nói dối nhiều hơn.\nTừ khi nào mà ta lại ngại để mặt mộc?\nTừ khi nào…\nta lại xấu hổ với sự thật?\nCũng đúng.\nSự thật thì phũ phàng,\nbuồn bã\nvà yếu đuối vậy mà.\n(정예은) 화장은 점점 진해지고\n거짓말은 점점 늘어간다\n언제부터 맨얼굴이 부끄러워진 걸까?\n언제부터...\n진심이 창피해진 걸까?\n그래...\n진심은 저렇게 찌질하고...\n슬프고...\n약하니까...\nMake-up gets thicker and thicker,\nwe lie more and more.\nSince when have we become shy without make-up?\nSince when...\nhave we become shy of the truth?\nRight.\nTruth is indigent,\nsad,\nand weak.","sourceUid":"merged-mqs6bng3-95","sourceNo":690,"viRanges":[{"start":3173.649499,"end":3199.197254}],"koRanges":[{"start":3104.339356,"end":3130.487927}]},{"id":811,"readerNo":812,"displayNo":"N542","n":"N542","kind":"narration","type":"dialogue","vi":"(Jeong Ye-eun): (Nhìn xung quanh những người trên xe buýt và thấy mình phản chiếu trên cửa sổ)","ko":"(정예은): (버스 안의 사람들을 둘러보다가 차창에 비친 자신을 본다)","en":"(Jeong Ye-eun): (Looks around at the people on the bus and sees herself reflected in the window)","text":"(Jeong Ye-eun): (Nhìn xung quanh những người trên xe buýt và thấy mình phản chiếu trên cửa sổ)\n(정예은): (버스 안의 사람들을 둘러보다가 차창에 비친 자신을 본다)\n(Jeong Ye-eun): (Looks around at the people on the bus and sees herself reflected in the window)","sourceUid":"nar-mr0g0zrm-imn2rn","sourceNo":"N542","viRanges":[],"koRanges":[]},{"id":812,"readerNo":813,"displayNo":699,"n":699,"kind":"sub","type":"merged","vi":"Vì khi sự thật bị cự tuyệt\nthì thật sự rất đau.\nVậy nên chúng ta giả vờ ngầu,\ngiả vờ ít thích hơn,\ngiả vờ như đang đùa.","ko":"진심이 거절당하면... 진짜 아프니까... 쿨한 척 덜 좋아하는 척 농담인 척","en":"When truth gets rejected,\nit really hurts.\nSo we pretend to be cool,\nnot loving as much,\nlike we're playing.","text":"Vì khi sự thật bị cự tuyệt\nthì thật sự rất đau.\nVậy nên chúng ta giả vờ ngầu,\ngiả vờ í
