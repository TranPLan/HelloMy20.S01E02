ld be late at night.\nI have to go to school tomorrow,\nand I was tired.\nI see that you've lost some weight.\nWhere in Chuncheon did you go?\n-Nami Island. -Was it nice?\nIt was okay, too many people.","text":"Tớ về rồi. Sao về sớm thế? Tớ tưởng khuya cậu mới về. Mai còn phải đi học, mà tớ cũng mệt nữa. Thảo nào nhìn mặt hốc hác quá. Cậu đi đâu ở Chuncheon? - Đảo Nami. - Vui không? Cũng bình thường, toàn người với người.\n나 왔어\n응? 왜 이렇게 일찍 왔어?\n한밤중에나 올 줄 알았는데...\n내일 학교도 가야 되고...\n피곤하기도 하고...\n아주 얼굴이 반쪽이 됐구먼\n춘천 어디 갔었어?\n남이섬\n남이섬 좋아?\n뭐. 그냥 그래... 사람만 많고\nI am back.\nHow come so early?\nI thought it would be late at night.\nI have to go to school tomorrow,\nand I was tired.\nI see that you've lost some weight.\nWhere in Chuncheon did you go?\n-Nami Island. -Was it nice?\nIt was okay, too many people.","sourceUid":"merged-mqs6dmoq-96","sourceNo":1037,"viRanges":[{"start":3211.740142,"end":3237.099252}],"koRanges":[{"start":3142.916408,"end":3169.351964}]},{"id":820,"readerNo":821,"displayNo":"N547","n":"N547","kind":"narration","type":"dialogue","vi":"Jinmyeong Yoon: ( bước ra. Trông như vừa mới tỉnh dậy)...","ko":"윤진명: (나온다. 금방 일어난 얼굴이다)···.","en":"Jinmyeong Yoon: ( comes out. She looks like she just woke up)...","text":"Jinmyeong Yoon: ( bước ra. Trông như vừa mới tỉnh dậy)...\n윤진명: (나온다. 금방 일어난 얼굴이다)···.\nJinmyeong Yoon: ( comes out. She looks like she just woke up)...","sourceUid":"nar-mr0gryhd-cph5p1","sourceNo":"N547","viRanges":[],"koRanges":[]},{"id":821,"readerNo":822,"displayNo":720,"n":720,"kind":"sub","type":"merged","vi":"Em làm chị thức giấc à? Xin lỗi nhé. Không, cũng tới giờ dậy rồi. Chị chảy máu cam kìa. - Cái này sao lại ở đây? - Của chị sao? Ừ. Chị có đàn ông ư? Mỗi mình em không có sao? Bà chủ nhà cho đấy.","ko":"어! 윤 선배, 나 땜에 깬 거야?\n미안...\n아니야. 일어날 때 됐어\n선배님. 코피!\n어...\n아...\n이게 왜 여깄어?\n그거 윤 선배 거야?\n으아아악!\n선배 남자 있어?\n설마 나만 없는 거야?\n이거. 주인집 할머니가 준 거야","en":"Did I wake you up? Sorry.\nNo, it was about time.\nYou are bleeding.\n-Why is it here? -Is it yours?\nYes.\nDo you have a man?\nIs it just me who's single then?\nIt was from our landlady.","text":"Em làm chị thức giấc à? Xin lỗi nhé. Không, cũng tới giờ dậy rồi. Chị chảy máu cam kìa. - Cái này sao lại ở đây? - Của chị sao? Ừ. Chị có đàn ông ư? Mỗi mình em không có sao? Bà chủ nhà cho đấy.\n어! 윤 선배, 나 땜에 깬 거야?\n미안...\n아니야. 일어날 때 됐어\n선배님. 코피!\n어...\n아...\n이게 왜 여깄어?\n그거 윤 선배 거야?\n으아아악!\n선배 남자 있어?\n설마 나만 없는 거야?\n이거. 주인집 할머니가 준 거야\nDid I wake you up? Sorry.\nNo, it was about time.\nYou are bleeding.\n-Why is it here? -Is it yours?\nYes.\nDo you have a man?\nIs it just me who's single then?\nIt was from our landlady.","sourceUid":"merged-mqs6g9z9-97","sourceNo":720,"viRanges":[{"start":3237.099252,"end":3276.198572}],"koRanges":[{"start":3169.351964,"end":3207.981261}]},{"id":822,"readerNo":823,"displayNo":"N549","n":"N549","kind":"narration","type":"dialogue","vi":"Eunjae Yoo: Tiền bối, chảy máu mũi!!","ko":"유은재: 선배님, 코피!!","en":"Eunjae Yoo: Senior, nosebleed!!","text":"Eunjae Yoo: Tiền bối, chảy máu mũi!!\n유은재: 선배님, 코피!!\nEunjae Yoo: Senior, nosebleed!!","sourceUid":"nar-mr0gt1c0-f8lk2h","sourceNo":"N549","viRanges":[],"koRanges":[]},{"id":823,"readerNo":824,"displayNo":"N548","n":"N548","kind":"narration","type":"dialogue","vi":"Jinmyeong Yoon: (Dùng tay kiểm tra dưới mũi)...","ko":"윤진명: (손으로 코밑을 확인한다)···.","en":"Jinmyeong Yoon: (Checks under the nose with his hand)...","text":"Jinmyeong Yoon: (Dùng tay kiểm tra dưới mũi)...\n윤진명: (손으로 코밑을 확인한다)···.\nJinmyeong Yoon: (Checks under the nose with his hand)...","sourceUid":"nar-mr0gsye1-olsfat","sourceNo":"N548","viRanges":[],"koRanges":[]},{"id":824,"readerNo":825,"displayNo":"N550","n":"N550","kind":"narration","type":"dialogue","vi":"Eunjae Yoo: (Nhanh chóng đưa khăn giấy)...","ko":"유은재: (얼른 휴지를 건넨다)···.","en":"Eunjae Yoo: (Quickly hands over a tissue)...","text":"Eunjae Yoo: (Nhanh chóng đưa khăn giấy)...\n유은재: (얼른 휴지를 건넨다)···.\nEunjae Yoo: (Quickly hands over a tissue)...","sourceUid":"nar-mr0gt527-ukgw9j","sourceNo":"N550","viRanges":[],"koRanges":[]},{"id":825,"readerNo":826,"displayNo":"N551","n":"N551","kind":"narration","type":"dialogue","vi":"Jeong Ye-eun: (có vẻ hơi đáng thương)...","ko":"정예은: (조금은 안쓰럽게 쳐다본다)···.","en":"Jeong Ye-eun: (Looks a little pitifully)...","text":"Jeong Ye-eun: (có vẻ hơi đáng thương)...\n정예은: (조금은 안쓰럽게 쳐다본다)···.\nJeong Ye-eun: (Looks a little pitifully)...","sourceUid":"nar-mr0gt6yh-549nj6","sourceNo":"N551","viRanges":[],"koRanges":[]},{"id":826,"readerNo":827,"displayNo":"N552","n":"N552","kind":"narration","type":"dialogue","vi":"Jinmyeong Yoon: (Vứt khăn giấy lau máu mũi vào thùng rác và lấy chiếc quần lót nam đã vứt đi)","ko":"윤진명: (코피를 닦은 휴지를 휴지통에 버리다가 버려진 남자 팬티를 꺼낸다)","en":"Jinmyeong Yoon: (Throwing away the tissue he used to wipe his nosebleed in the trash can, he takes out the discarded men's underwear)","text":"Jinmyeong Yoon: (Vứt khăn giấy lau máu mũi vào thùng rác và lấy chiếc quần lót nam đã vứt đi)\n윤진명: (코피를 닦은 휴지를 휴지통에 버리다가 버려진 남자 팬티를 꺼낸다)\nJinmyeong Yoon: (Throwing away the tissue he used to wipe his nosebleed in the trash can, he takes out the discarded men's underwear)","sourceUid":"nar-mr0gt8xm-xoim34","sourceNo":"N552","viRanges":[],"koRanges":[]},{"id":827,"readerNo":828,"displayNo":724,"n":724,"kind":"sub","type":"merged","vi":"- Chị ăn được không? - Vâng. Người lạ đó chính là người theo đuổi chị Kang đấy. Vậy à? Vậy bỏ cái quần đi cũng được.","ko":"나도 먹어도 돼?\n그 남자... 강 언니 따라다니는 남자예요\n그럼 이거 버려도 되겠다","en":"-Can I join you guys? -Yeah.\nThat stranger is there for Kang.\nReally?\nThen we shouldn't worry.","text":"- Chị ăn được không? - Vâng. Người lạ đó chính là người theo đuổi chị Kang đấy. Vậy à? Vậy bỏ cái quần đi cũng được.\n나도 먹어도 돼?\n그 남자... 강 언니 따라다니는 남자예요\n그럼 이거 버려도 되겠다\n-Can I join you guys? -Yeah.\nThat stranger is there for Kang.\nReally?\nThen we shouldn't worry.","sourceUid":"merged-mqs6j5fo-99","sourceNo":724,"viRanges":[{"start":3283.948054,"end":3294.828734}],"koRanges":[{"start":3213.532385,"end":3225.973111}]},{"id":828,"readerNo":829,"displayNo":1044,"n":1044,"kind":"sub","type":"ko","vi":"[Thở dài]","ko":"[한숨 쉰다]","en":"[Sighs]","text":"[Thở dài]\n[한숨 쉰다]\n[Sighs]","sourceUid":"ko-mql0e9i7-1879","sourceNo":1044,"viRanges":[],"koRanges":[]},{"id":829,"readerNo":830,"displayNo":1054,"n":1054,"kind":"sub","type":"merged","vi":"Dạo này có đàn ông lạ lảng vảng ở đây. Nếu biết nhà toàn con gái thì họ có thể giở trò gì đó nên bà ấy bảo treo nó ở nơi dễ thấy.","ko":"요새 이상한 남자 돌아다닌다고 여자들만 사는 거 알면 해코지할 수도 있으니까 잘 보이는 데다가 걸어놓으라고","en":"She says there has been a stranger around.\nThey might try something bad thinking it's only girls in here,\nso she asked to put it somewhere open.","text":"Dạo này có đàn ông lạ lảng vảng ở đây. Nếu biết nhà toàn con gái thì họ có thể giở trò gì đó nên bà ấy bảo treo nó ở nơi dễ thấy.\n요새 이상한 남자 돌아다닌다고 여자들만 사는 거 알면 해코지할 수도 있으니까 잘 보이는 데다가 걸어놓으라고\nShe says there has been a stranger around.\nThey might try something bad thinking it's only girls in here,\nso she asked to put it somewhere open.","sourceUid":"merged-mqs6hz03-98","sourceNo":1054,"viRanges":[{"start":3276.198572,"end":3283.948054}],"koRanges":[{"start":3207.981261,"end":3213.532385}]},{"id":830,"readerNo":831,"displayNo":1068,"n":1068,"kind":"sub","type":"merged","vi":"Em trộn ngon nhỉ?\nỪ, ngon lắm.\nVậy cậu sai rồi!\nSai gì?\nCậu bảo quần đó của chị Kang mà.\nTớ nói khi nào?\nTớ chỉ bảo chị Kang nói dối chứ đâu nói cái quần đó của chị ấy.\nNhư nhau mà. Đồ bịp bợm.","ko":"응\n그래?\n잘 비비지 않았어?\n맛있네...\n내가 비볐어\n틀렸잖아\n뭐가?\n그 팬티 강 언니 거라며?\n내가 언제?\n강 언니가 거짓말한다 그랬지...\n팬티가 강 언니 거라고는 안 했어","en":"Isn't this nice?\nYes, it is.\nYou are wrong!\nAt what?\nYou said that underwear belongs to Kang.\nWhen did I say that?\nI just said that she was lying, I said nothing about that trunks.\nTomato, tomato.","text":"Em trộn ngon nhỉ?\nỪ, ngon lắm.\nVậy cậu sai rồi!\nSai gì?\nCậu bảo quần đó của chị Kang mà.\nTớ nói khi nào?\nTớ chỉ bảo chị Kang nói dối chứ đâu nói cái quần đó của chị ấy.\nNhư nhau mà. Đồ bịp bợm.\n응\n그래?\n잘 비비지 않았어?\n맛있네...\n내가 비볐어\n틀렸잖아\n뭐가?\n그 팬티 강 언니 거라며?\n내가 언제?\n강 언니가 거짓말한다 그랬지...\n팬티가 강 언니 거라고는 안 했어\nIsn't this nice?\nYes, it is.\nYou are wrong!\nAt what?\nYou said that underwear belongs to Kang.\nWhen did I say that?\nI just said that she was lying, I said nothing about that trunks.\nTomato, tomato.","sourceUid":"merged-mqs6le69-100","sourceNo":1068,"viRanges":[{"start":3294.828734,"end":3315.062793}],"koRanges":[{"start":3225.973111,"end":3244.000503}]},{"id":831,"readerNo":832,"displayNo":"N553","n":"N553","kind":"narration","type":"dialogue","vi":". Jeong Ye-eun, phòng của Song Ji-won (ngày)","ko":". 정예은, 송지원의 방(낮)","en":". Jeong Ye-eun, Song Ji-won’s room (day)","text":". Jeong Ye-eun, phòng của Song Ji-won (ngày)\n. 정예은, 송지원의 방(낮)\n. Jeong Ye-eun, Song Ji-won’s room (day)","sourceUid":"nar-mr0h01lo-e51c89","sourceNo":"N553","viRanges":[],"koRanges":[]},{"id":832,"readerNo":833,"displayNo":"N554","n":"N554","kind":"narration","type":"dialogue","vi":"Jeong Ye-eun: (chuẩn bị sẵn sàng) Trông tệ quá.","ko":"정예은: (잘 준비를 한다) 보이긴 개뿔이 보여.","en":"Jeong Ye-eun: (getting ready) It looks like shit.","text":"Jeong Ye-eun: (chuẩn bị sẵn sàng) Trông tệ quá.\n정예은: (잘 준비를 한다) 보이긴 개뿔이 보여.\nJeong Ye-eun: (getting ready) It looks like shit.","sourceUid":"nar-mr0h0to4-logtsd","sourceNo":"N554","viRanges":[],"koRanges":[]},{"id":833,"readerNo":834,"displayNo":"N555","n":"N555","kind":"narration","type":"dialogue","vi":"(Nằm xuống và đeo miếng che mắt vào)...","ko":"(안대를 끼고 눕는다)···.","en":"(Lay down with an eye patch on)...","text":"(Nằm xuống và đeo miếng che mắt vào)...\n(안대를 끼고 눕는다)···.\n(Lay down with an eye patch on)...","sourceUid":"nar-mr0h0v7y-lo5vwz","sourceNo":"N555","viRanges":[],"koRanges":[]},{"id":834,"readerNo":835,"displayNo":"N556","n":"N556","kind":"narration","type":"dialogue","vi":". Trước Belle Epoque (ngày-tối)","ko":". 벨 에포크 앞(낮-저녁)","en":". In front of Belle Epoque (day-evening)","text":". Trước Belle Epoque (ngày-tối)\n. 벨 에포크 앞(낮-저녁)\n. In front of Belle Epoque (day-evening)","sourceUid":"nar-mr0h11a8-w54p2e","sourceNo":"N556","viRanges":[],"koRanges":[]},{"id":835,"readerNo":836,"displayNo":"N557","n":"N557","kind":"narration","type":"dialogue","vi":"Một người đàn ông đang đợi Kang Ina. Mọi người đến và đi.","ko":"남자가 강이나를 기다린다. 사람들이 오간다.","en":"A man waits for Kang Ina. People come and go.","text":"Một người đàn ông đang đợi Kang Ina. Mọi người đến và đi.\n남자가 강이나를 기다린다. 사람들이 오간다.\nA man waits for Kang Ina. People come and go.","sourceUid":"nar-mr0h13f7-6v77li","sourceNo":"N557","viRanges":[],"koRanges":[]},{"id":836,"readerNo":837,"displayNo":"N558","n":"N558","kind":"narration","type":"dialogue","vi":"Đèn đường bật sáng.","ko":"가로등에 불이 들어온다.","en":"The street lights come on.","text":"Đèn đường bật sáng.\n가로등에 불이 들어온다.\nThe street lights come on.","sourceUid":"nar-mr0h14v0-45apwa","sourceNo":"N558","viRanges":[],"koRanges":[]},{"id":837,"readerNo":838,"displayNo":"N559","n":"N559","kind":"narration","type":"dialogue","vi":". Jeong Ye-eun, phòng của Song Ji-won (đêm)","ko":". 정예은, 송지원의 방(밤)","en":". Jeong Ye-eun, Song Ji-won’s room (night)","text":". Jeong Ye-eun, phòng của Song Ji-won (đêm)\n. 정예은, 송지원의 방(밤)\n. Jeong Ye-eun, Song Ji-won’s room (night)","sourceUid":"nar-mr0h17pv-2zvf9k","sourceNo":"N559","viRanges":[],"koRanges":[]},{"id":838,"readerNo":839,"displayNo":736,"n":736,"kind":"sub","type":"merged","vi":"Cậu ấy có nhìn thấy gì đâu cơ chứ?\nHở tí là nói dối.\nSao cậu lại ngủ ngày như thế?\nChắc do mệt quá.\nVì đã làm gì cơ?\nĐúng là đồ nhiều chuyện.","ko":"어휴! 아... 뭔 낮잠을 그렇게 자냐? 아... 피곤했나 봐 뭐 하느라고? 아유. 진짜 저 주책 아저씨 그냥... 음... (정예은) 어휴...","en":"She is not seeing anything. It makes no sense. You were sleeping like it was night. I must have been tired. From doing what? What a nosy parker.","text":"Cậu ấy có nhìn thấy gì đâu cơ chứ?\nHở tí là nói dối.\nSao cậu lại ngủ ngày như thế?\nChắc do mệt quá.\nVì đã làm gì cơ?\nĐúng là đồ nhiều chuyện.\n어휴! 아... 뭔 낮잠을 그렇게 자냐? 아... 피곤했나 봐 뭐 하느라고? 아유. 진짜 저 주책 아저씨 그냥... 음... (정예은) 어휴...\nShe is not seeing anything. It makes no sense. You were sleeping like it was night. I must have been tired. From doing what? What a nosy parker.","sourceUid":"merged-mqs6plej-101","sourceNo":736,"viRanges":[{"start":3315.062793,"end":3354.412089}],"koRanges":[{"start":3244.000503,"end":3292.305065}]},{"id":839,"readerNo":840,"displayNo":1073,"n":1073,"kind":"sub","type":"ko","vi":"[tiếng chó sủa]","ko":"[개가 짖는다]","en":"[dog barks]","text":"[tiếng chó sủa]\n[개가 짖는다]\n[dog barks]","sourceUid":"ko-mql0e9i7-1908","sourceNo":1073,"viRanges":[],"koRanges":[]},{"id":840,"readerNo":841,"displayNo":"N560","n":"N560","kind":"narration","type":"dialogue","vi":". Phòng khách (ban đêm)","ko":". 거실(밤)","en":". Living room (night)","text":". Phòng khách (ban đêm)\n. 거실(밤)\n. Living room (night)","sourceUid":"nar-mr0h2gua-quqnvo","sourceNo":"N560","viRanges":[],"koRanges":[]},{"id":841,"readerNo":842,"displayNo":"N561","n":"N561","kind":"narration","type":"dialogue","vi":"Jeong Ye-eun mở tủ lạnh.","ko":"정예은이 냉장고를 연다.","en":"Jeong Ye-eun opens the refrigerator.","text":"Jeong Ye-eun mở tủ lạnh.\n정예은이 냉장고를 연다.\nJeong Ye-eun opens the refrigerator.","sourceUid":"nar-mr0h2l4u-ixrvje","sourceNo":"N561","viRanges":[],"koRanges":[]},{"id":842,"readerNo":843,"displayNo":"N562","n":"N562","kind":"narration","type":"dialogue","vi":"Trong khi tôi đang nghĩ xem nên ăn gì thì tôi nghe thấy giọng nói của Kang Ina ở bên ngoài.","ko":"뭘 먹을까 고민하는데, 밖에서 강이나의 목소리가 들린다.","en":"While I was thinking about what to eat, I heard Kang Ina’s voice outside.","text":"Trong khi tôi đang nghĩ xem nên ăn gì thì tôi nghe thấy giọng nói của Kang Ina ở bên ngoài.\n뭘 먹을까 고민하는데, 밖에서 강이나의 목소리가 들린다.\nWhile I was thinking about what to eat, I heard Kang Ina’s voice outside.","sourceUid":"nar-mr0h2no0-8tethi","sourceNo":"N562","viRanges":[],"koRanges":[]},{"id":843,"readerNo":844,"displayNo":"N563","n":"N563","kind":"narration","type":"dialogue","vi":". Hiên nhà (đêm)","ko":". 베란다(밤)","en":". Veranda (night)","text":". Hiên nhà (đêm)\n. 베란다(밤)\n. Veranda (night)","sourceUid":"nar-mr0h2pep-9lqfzt","sourceNo":"N563","viRanges":[],"koRanges":[]},{"id":844,"readerNo":845,"displayNo":"N564","n":"N564","kind":"narration","type":"dialogue","vi":"Jeong Ye-eun nhìn ra ngoài cửa sổ.","ko":"정예은이 창밖을 내다본다.","en":"Jeong Ye-eun looks out the window.","text":"Jeong Ye-eun nhìn ra ngoài cửa sổ.\n정예은이 창밖을 내다본다.\nJeong Ye-eun looks out the window.","sourceUid":"nar-mr0h2qdg-4l0mbj","sourceNo":"N564","viRanges":[],"koRanges":[]},{"id":845,"readerNo":846,"displayNo":"N565","n":"N565","kind":"narration","type":"dialogue","vi":"Kang Ina hất tay người đàn ông ra.","ko":"강이나가 남자의 손을 뿌리치는 중이다.","en":"Kang Ina is shaking off the man’s hand.","text":"Kang Ina hất tay người đàn ông ra.\n강이나가 남자의 손을 뿌리치는 중이다.\nKang Ina is shaking off the man’s hand.","sourceUid":"nar-mr0h2rdm-5oq48a","sourceNo":"N565","viRanges":[],"koRanges":[]},{"id":846,"readerNo":847,"displayNo":"N566","n":"N566","kind":"narration","type":"dialogue","vi":"Một người đàn ông chặn một dòng sông hoặc một cái gì đó trước mặt anh ta. Một cuộc chiến nổ ra.","ko":"남자는 강이나 앞을 막아선다. 몸싸움이 벌어진다.","en":"A man blocks a river or something in front of him. A fight breaks out.","text":"Một người đàn ông chặn một dòng sông hoặc một cái gì đó trước mặt anh ta. Một cuộc chiến nổ ra.\n남자는 강이나 앞을 막아선다. 몸싸움이 벌어진다.\nA man blocks a river or something in front of him. A fight breaks out.","sourceUid":"nar-mr0h2v6e-61kp28","sourceNo":"N566","viRanges":[],"koRanges":[]},{"id":847,"readerNo":848,"displayNo":"N567","n":"N567","kind":"narration","type":"dialogue","vi":"Jeong Ye-eun: (lao vào trong và khẩn trương) Song!! Eunjae!!","ko":"정예은: (안으로 뛰어 들어가며 다급하게) 송!! 은재야!!","en":"Jeong Ye-eun: (rushing inside and urgently) Song!! Eunjae!!","text":"Jeong Ye-eun: (lao vào trong và khẩn trương) Song!! Eunjae!!\n정예은: (안으로 뛰어 들어가며 다급하게) 송!! 은재야!!\nJeong Ye-eun: (rushing inside and urgently) Song!! Eunjae!!","sourceUid":"nar-mr0h3921-ihhmln","sourceNo":"N567","viRanges":[],"koRanges":[]},{"id":848,"readerNo":849,"displayNo":"N568","n":"N568","kind":"narration","type":"dialogue","vi":". Phòng khách (ban đêm)","ko":". 거실(밤)","en":". Living room (night)","text":". Phòng khách (ban đêm)\n. 거실(밤)\n. Living room (night)","sourceUid":"nar-mr0h39wq-p5ye1r","sourceNo":"N568","viRanges":[],"koRanges":[]},{"id":849,"readerNo":850,"displayNo":"N569","n":"N569","kind":"narration","type":"dialogue","vi":"Jeong Ye-eun: (Mở đầu chuyến thăm của Song Ji-won) Bạn đã trưởng thành, nhanh chóng, nhanh chóng!!","ko":"정예은: (송지원 방문을 열며) 클났어, 빨리 빨리!!","en":"Jeong Ye-eun: (Opening Song Ji-won’s visit) You’ve grown, quickly, quickly!!","text":"Jeong Ye-eun: (Mở đầu chuyến thăm của Song Ji-won) Bạn đã trưởng thành, nhanh chóng, nhanh chóng!!\n정예은: (송지원 방문을 열며) 클났어, 빨리 빨리!!\nJeong Ye-eun: (Opening Song Ji-won’s visit) You’ve grown, quickly, quickly!!","sourceUid":"nar-mr0h3ceb-tgessg","sourceNo":"N569","viRanges":[],"koRanges":[]},{"id":850,"readerNo":851,"displayNo":"N570","n":"N570","kind":"narration","type":"dialogue","vi":". Trước Belle Epoque (đêm)","ko":". 벨 에포크 앞(밤)","en":". In front of Belle Epoque (night)","text":". Trước Belle Epoque (đêm)\n. 벨 에포크 앞(밤)\n. In front of Belle Epoque (night)","sourceUid":"nar-mr0h3piw-52uavt","sourceNo":"N570","viRanges":[],"koRanges":[]},{"id":851,"readerNo":852,"displayNo":748,"n":748,"kind":"sub","type":"merged","vi":"Bỏ tay ra. Không bỏ à? - Tôi bảo không thích anh mà! - Yi Na, làm ơn đi! Nghe lời tôi một lần đi. Song! Eun Jae! - Sao? - Nhanh lên! Có chuyện với chị Kang rồi. Sao vậy?","ko":"","en":"Let go of this!\n-I hate you! -Please!\nPlease listen to me!\nSong! Eun-Jae!\n-Why? -Hurry up!\nSomething is happening to Kang!\nWhat is it?","text":"Bỏ tay ra. Không bỏ à? - Tôi bảo không thích anh mà! - Yi Na, làm ơn đi! Nghe lời tôi một lần đi. Song! Eun Jae! - Sao? - Nhanh lên! Có chuyện với chị Kang rồi. Sao vậy?\nLet go of this!\n-I hate you! -Please!\nPlease listen to me!\nSong! Eun-Jae!\n-Why? -Hurry up!\nSomething is happening to Kang!\nWhat is it?","sourceUid":"merged-mqt3z9xc-2","sourceNo":748,"viRanges":[{"start":3360,"end":3378.581864}],"koRanges":[]},{"id":852,"readerNo":853,"displayNo":1098,"n":1098,"kind":"sub","type":"merged","vi":"- Tránh ra. - Em biết tấm lòng của tôi mà. Anh học trường tốt, đầu óc thông minh lắm mà. Sao nghe mà không hiểu vậy? Tôi ghét anh. Vậy tôi sẽ yêu em nhiều hơn. Điên mất thôi. Việc anh thích tôi liên quan gì đến việc tôi ghét anh?","ko":"(강이나) 이거 놔. 안 놔?\n나 너 싫다고...\n아, 이나 씨 제발... 아, 내 말 좀 들어봐요\n송! 은재야!\n(송지원) 왜?\n빨리빨리, 큰일 났어\n- 빨리빨리 - 왜 왜 왜?\n아이! 비켜!\n내 마음 알잖아요\n너 좋은 대학 나왔다며?\n머리 좋잖아. 근데 왜 말귀를 못 알아먹어?\n난 너 싫어\n그만큼 내가 더 좋아할게요\n하, 미치게 하네 진짜...\n네가 날 더 좋아하는 거랑 내가 널 싫어하는 거랑\n무슨 상관인데?","en":"-Get out. -You know how I feel.\nYou went to a good school, you should be smart.\nWhy can't you understand? I hate you.\nI will like you even more.\nWhat a nut.\nYou liking me has nothing to do with me hating you.","text":"- Tránh ra. - Em biết tấm lòng của tôi mà. Anh học trường tốt, đầu óc thông minh lắm mà. Sao nghe mà không hiểu vậy? Tôi ghét anh. Vậy tôi sẽ yêu em nhiều hơn. Điên mất thôi. Việc anh thích tôi liên quan gì đến việc tôi ghét anh?\n(강이나) 이거 놔. 안 놔?\n나 너 싫다고...\n아, 이나 씨 제발... 아, 내 말 좀 들어봐요\n송! 은재야!\n(송지원) 왜?\n빨리빨리, 큰일 났어\n- 빨리빨리 - 왜 왜 왜?\n아이! 비켜!\n내 마음 알잖아요\n너 좋은 대학 나왔다며?\n머리 좋잖아. 근데 왜 말귀를 못 알아먹어?\n난 너 싫어\n그만큼 내가 더 좋아할게요\n하, 미치게 하네 진짜...\n네가 날 더 좋아하는 거랑 내가 널 싫어하는 거랑\n무슨 상관인데?\n-Get out. -You know how I feel.\nYou went to a good school, you should be smart.\nWhy can't you understand? I hate you.\nI will like you even more.\nWhat a nut.\nYou liking me has nothing to do with me hating you.","sourceUid":"merged-mqt4ae3g-26","sourceNo":1098,"viRanges":[{"start":3360,"end":3392.449719}],"koRanges":[{"start":3292.305065,"end":3325.142056}]},{"id":853,"readerNo":854,"displayNo":1083,"n":1083,"kind":"sub","type":"merged","vi":"[Cười] [tiếng giày]","ko":"[웃는다]\n[신발소리]","en":"[Laughs]\n[shoes sound]","text":"[Cười] [tiếng giày]\n[웃는다]\n[신발소리]\n[Laughs]\n[shoes sound]","sourceUid":"merged-mqt9mq4l-1","sourceNo":1083,"viRanges":[],"koRanges":[]},{"id":854,"readerNo":855,"displayNo":762,"n":762,"kind":"sub","type":"merged","vi":"Về nhà đi.\nTôi cảnh cáo lần cuối đấy.\nAnh còn như vậy một lần nữa là tôi báo cảnh sát.","ko":"집에 가\n마지막으로 얘기하는데...\n한 번만 더 이러면 진짜 경찰 부를 줄 알아","en":"Go home, and this is the last warning. If you come back again I will call the cops.","text":"Về nhà đi.\nTôi cảnh cáo lần cuối đấy.\nAnh còn như vậy một lần nữa là tôi báo cảnh sát.\n집에 가\n마지막으로 얘기하는데...\n한 번만 더 이러면 진짜 경찰 부를 줄 알아\nGo home, and this is the last warning. If you come back again I will call the cops.","sourceUid":"merged-mqt9q260-10","sourceNo":762,"viRanges":[{"start":3404.254134,"end":3411.292703}],"koRanges":[{"start":3335.54454,"end":3342.674302}]},{"id":855,"readerNo":856,"displayNo":763,"n":763,"kind":"sub","type":"merged","vi":"- Chị có sao không? - Ừ, không sao. Vào thôi.","ko":"괜찮아?\n어 괜찮아. 들어가. 들어가","en":"-Are you all right? -Yeah, I'm fine. Let's go in.","text":"- Chị có sao không? - Ừ, không sao. Vào thôi.\n괜찮아?\n어 괜찮아. 들어가. 들어가\n-Are you all right? -Yeah, I'm fine. Let's go in.","sourceUid":"merged-mqt9qmfs-13","sourceNo":763,"viRanges":[{"start":3411.292703,"end":3413.910753}],"koRanges":[{"start":3342.674302,"end":3345.463361}]},{"id":856,"readerNo":857,"displayNo":1101,"n":1101,"kind":"sub","type":"merged","vi":"Em đang đi sai đường rồi. Em đang tự hủy hoại bản thân mình đấy. Hãy để tôi cứu em.","ko":"지금 이나 씨 잘못하고 있는 거예요 이나 씨 스스로를 망치고 있다고요 내가 구해줄게요","en":"What you are doing is wrong. You are destroying yourself. Let me save you.","text":"Em đang đi sai đường rồi. Em đang tự hủy hoại bản thân mình đấy. Hãy để tôi cứu em.\n지금 이나 씨 잘못하고 있는 거예요 이나 씨 스스로를 망치고 있다고요 내가 구해줄게요\nWhat you are doing is wrong. You are destroying yourself. Let me save you.","sourceUid":"merged-mqt9nt5d-3","sourceNo":1101,"viRanges":[{"start":3392.449719,"end":3398.80898}],"koRanges":[{"start":3325.142056,"end":3330.531932}]},{"id":857,"readerNo":858,"displayNo":1103,"n":1103,"kind":"sub","type":"ko","vi":"[Nhạc nền bắt đầu]","ko":"[배경 음악 시작]","en":"[Background music starts]","text":"[Nhạc nền bắt đầu]\n[배경 음악 시작]\n[Background music starts]","sourceUid":"ko-mql0e9i7-1938","sourceNo":1103,"viRanges":[],"koRanges":[]},{"id":858,"readerNo":859,"displayNo":1104,"n":1104,"kind":"sub","type":"merged","vi":"Anh là cái thá gì?\nAnh là gì mà đòi cứu tôi? Đi mà cứu lấy mình đi.","ko":"네가 뭔데?\n뭔데 날 구하고 말고야... 가서 너나 구해. 제발","en":"And who are you? What are you talking about saving me? Go save yourself, please.","text":"Anh là cái thá gì?\nAnh là gì mà đòi cứu tôi? Đi mà cứu lấy mình đi.\n네가 뭔데?\n뭔데 날 구하고 말고야... 가서 너나 구해. 제발\nAnd who are you? What are you talking about saving me? Go save yourself, please.","sourceUid":"merged-mqt9p8o0-7","sourceNo":1104,"viRanges":[{"start":3398.80898,"end":3404.254134}],"koRanges":[{"start":3330.531932,"end":3335.54454}]},{"id":859,"readerNo":860,"displayNo":775,"n":775,"kind":"sub","type":"merged","vi":"Anh là ai mà bảo tôi phải làm gì?\nTôi bán thân để sống, đó là việc của tôi.","ko":"네가 뭔데 이래라 저래라야 내가 내 몸 팔아 내가 사는데","en":"Who are you to tell me what to do?\nIt's my body and my life!","text":"Anh là ai mà bảo tôi phải làm gì?\nTôi bán thân để sống, đó là việc của tôi.\n네가 뭔데 이래라 저래라야 내가 내 몸 팔아 내가 사는데\nWho are you to tell me what to do?\nIt's my body and my life!","sourceUid":"merged-mqta01rk-34","sourceNo":775,"viRanges":[{"start":3446.967261,"end":3452.548758}],"koRanges":[{"start":3378.702172,"end":3384.550715}]},{"id":860,"readerNo":861,"displayNo":1112,"n":1112,"kind":"sub","type":"merged","vi":"[Nhạc nền kết thúc]\n[Nhạc chủ đề sôi động bắt đầu]","ko":"[배경 음악 끝] [경쾌한 테마 음악 시작]","en":"[Background music ends]\n[Upbeat theme music starts]","text":"[Nhạc nền kết thúc]\n[Nhạc chủ đề sôi động bắt đầu]\n[배경 음악 끝] [경쾌한 테마 음악 시작]\n[Background music ends]\n[Upbeat theme music starts]","sourceUid":"merged-mqt9sncg-20","sourceNo":1112,"viRanges":[],"koRanges":[]},{"id":861,"readerNo":862,"displayNo":1114,"n":1114,"kind":"sub","type":"merged","vi":"Việc em đang làm là bán dâm đấy! Mấy người đàn ông đó… không yêu em thật lòng đâu.","ko":"지금 이나 씨가 하고 있는 건 매춘입니다\n그 남자들...\n이나 씨를 진정으로 사랑하는 게 아니에요","en":"What you are doing is prostitution!\nThose guys...\nthey don't love you.","text":"Việc em đang làm là bán dâm đấy! Mấy người đàn ông đó… không yêu em thật lòng đâu.\n지금 이나 씨가 하고 있는 건 매춘입니다\n그 남자들...\n이나 씨를 진정으로 사랑하는 게 아니에요\nWhat you are doing is prostitution!\nThose guys...\nthey don't love you.","sourceUid":"merged-mqt9vqgv-24","sourceNo":1114,"viRanges":[{"start":3413.910753,"end":3428.040095}],"koRanges":[{"start":3345.463361,"end":3361.181381}]},{"id":862,"readerNo":863,"displayNo":1119,"n":1119,"kind":"sub","type":"merged","vi":"- Thôi đi. - Họ chỉ đang dùng tiền để mua em thôi.\nNgười xinh đẹp như em sao lại làm chuyện như thế?\nEm đáng được trân trọng mà.\nTôi sẽ cứu lấy em.","ko":"그만해 그 남자들은 이나 씨를 돈으로 사는 거예요 이나 씨 같이 아름다운 사람이 왜 그런 짓을 합니까? 이나 씨 소중한 사람입니다 내가 도와줄게요","en":"-Stop. -They are paying for your body.\nWhy does a beautiful person like you doing such a thing?\nYou are precious.\nI will help you.","text":"- Thôi đi. - Họ chỉ đang dùng tiền để mua em thôi.\nNgười xinh đẹp như em sao lại làm chuyện như thế?\nEm đáng được trân trọng mà.\nTôi sẽ cứu lấy em.\n그만해 그 남자들은 이나 씨를 돈으로 사는 거예요 이나 씨 같이 아름다운 사람이 왜 그런 짓을 합니까? 이나 씨 소중한 사람입니다 내가 도와줄게요\n-Stop. -They are paying for your body.\nWhy does a beautiful person like you doing such a thing?\nYou are precious.\nI will help you.","sourceUid":"merged-mqt9yec9-28","sourceNo":1119,"viRanges":[{"start":3428.040095,"end":3438.338145}],"koRanges":[{"start":3361.181381,"end":3370.672553}]},{"id":863,"readerNo":864,"displayNo":1123,"n":1123,"kind":"sub","type":"merged","vi":"Tuy không biết quá khứ em thế nào, nhưng tôi sẽ cứu em ra. - Em có thể sống cuộc đời em muốn mà. - Tên khốn này.","ko":"이나 씨 과거가 어떤지는 모르지만\n내가 구해줄게요\n얼마든지 새로운 삶을 살 수 있어요\n야, 이 새끼야","en":"I don't know about your past,\nbut I will get you out.\n-You can start it all over again. -Bastard.","text":"Tuy không biết quá khứ em thế nào, nhưng tôi sẽ cứu em ra. - Em có thể sống cuộc đời em muốn mà. - Tên khốn này.\n이나 씨 과거가 어떤지는 모르지만\n내가 구해줄게요\n얼마든지 새로운 삶을 살 수 있어요\n야, 이 새끼야\nI don't know about your past,\nbut I will get you out.\n-You can start it all over again. -Bastard.","sourceUid":"merged-mqt9zj2w-32","sourceNo":1123,"viRanges":[{"start":3438.338145,"end":3446.967261}],"koRanges":[{"start":3370.672553,"end":3378.702172}]},{"id":864,"readerNo":865,"displayNo":1132,"n":1132,"kind":"sub","type":"merged","vi":"Mắc gì anh lại làm loạn lên?\nĐồ dở hơi!\nAnh làm loạn lên làm gì?\n- Em bình tĩnh đi. - Đồ khốn!\n- Chị ơi! - Yi Na!\nDừng lại đi, chị ơi!\nYi Na này!","ko":"네가 왜 지랄이야? 병신 같은 게 진짜... 야! 네가 왜 지랄이냐고! - 진정 좀 해요 - 야! 개새끼야! - 언니... - 이나 씨 아 이나 씨!","en":"Why do you freaking care? Son of a bitch, hey! What do you care? -Calm down. -Son of a bitch! -Kang! -Shitheel! Please stop, Kang. Kang!","text":"Mắc gì anh lại làm loạn lên?\nĐồ dở hơi!\nAnh làm loạn lên làm gì?\n- Em bình tĩnh đi. - Đồ khốn!\n- Chị ơi! - Yi Na!\nDừng lại đi, chị ơi!\nYi Na này!\n네가 왜 지랄이야? 병신 같은 게 진짜... 야! 네가 왜 지랄이냐고! - 진정 좀 해요 - 야! 개새끼야! - 언니... - 이나 씨 아 이나 씨!\nWhy do you freaking care? Son of a bitch, hey! What do you care? -Calm down. -Son of a bitch! -Kang! -Shitheel! Please stop, Kang. Kang!","sourceUid":"merged-mqtaowz0-37","sourceNo":1132,"viRanges":[{"start":3452.548758,"end":3472.297329}],"koRanges":[{"start":3384.550715,"end":3399.411486}]},{"id":865,"readerNo":866,"displayNo":1133,"n":1133,"kind":"sub","type":"merged","vi":"[Khóc nức nở]\n[Thở dài khó thở]","ko":"[흐느낀다]\n[숨을 씩씩 내쉰다]","en":"[Sobbing] [Exhales breathlessly]","text":"[Khóc nức nở]\n[Thở dài khó thở]\n[흐느낀다]\n[숨을 씩씩 내쉰다]\n[Sobbing] [Exhales breathlessly]","sourceUid":"merged-mqtap8iw-39","sourceNo":1133,"viRanges":[],"koRanges":[]},{"id":866,"readerNo":867,"displayNo":1135,"n":1135,"kind":"sub","type":"merged","vi":"[Tiếng còi báo động]\n Vậy chuyện bố chị ấy có xưởng sản xuất bát thì sao?\nLà khăn giấy ướt mà.\nĐằng nào thì,\nchắc việc chị ấy nhà giàu cũng là nói dối.\nNhà giàu thì sao phải làm như thế?\n그럼 강 언니네 아빠가 그릇공장 한다는 건? 물티슈라니까... 아무튼... 집이 부자라는 것도 거짓말인가 봐 집이 부잔데 뭐하러 그런 짓을 해?\nThen the story about her father running a pottery factory?\nIt was wet wipes.\nAnyway,\nher family being rich must be a lie.\nWhy would she do that if they were?","sourceUid":"merged-mqtawnon-51","sourceNo":1152,"viRanges":[{"start":3552.604839,"end":3565.465791}],"koRanges":[{"start":3486.195427,"end":3496.465463}]},{"id":887,"readerNo":888,"displayNo":"N588","n":"N588","kind":"narration","type":"dialogue","vi":"Kang Ina: (bước vào)···.","ko":"강이나: (들어온다)···.","en":"Kang Ina: (entering)···.","text":"Kang Ina: (bước vào)···.\n강이나: (들어온다)···.\nKang Ina: (entering)···.","sourceUid":"nar-mr0hagyu-5aerps","sourceNo":"N588","viRanges":[],"koRanges":[]},{"id":888,"readerNo":889,"displayNo":1154,"n":1154,"kind":"sub","type":"merged","vi":"Cũng có nhiều cô gái nhận tiền tiêu vặt từ đàn ông mà. Đàn ông đâu có điên mà cho không túi xách, rồi tiền tiêu vặt. Làm gì có. Có đi có lại cả thôi. Bán dâm thì có gì đặc biệt đâu. Nhận tiền rồi quan hệ thì là gái điếm chứ còn gì.","ko":"남자들한테 용돈 받는 여자들 꽤 있어\n미쳤다고 남자들이 공짜로 가방 사주고 용돈 주고 그래?\n아니잖아. 주고받는 거지\n매춘이 뭐 별거야?\n돈 받고 섹스하는 거 그게 창녀야","en":"They are many women getting money from men.\nAre they nuts? Giving money for free?\nThey are exchanging something.\nProstitution is not special.\nIt's getting money for having sex, that's a prostitute.","text":"Cũng có nhiều cô gái nhận tiền tiêu vặt từ đàn ông mà. Đàn ông đâu có điên mà cho không túi xách, rồi tiền tiêu vặt. Làm gì có. Có đi có lại cả thôi. Bán dâm thì có gì đặc biệt đâu. Nhận tiền rồi quan hệ thì là gái điếm chứ còn gì.\n남자들한테 용돈 받는 여자들 꽤 있어\n미쳤다고 남자들이 공짜로 가방 사주고 용돈 주고 그래?\n아니잖아. 주고받는 거지\n매춘이 뭐 별거야?\n돈 받고 섹스하는 거 그게 창녀야\nThey are many women getting money from men.\nAre they nuts? Giving money for free?\nThey are exchanging something.\ let idx=0,stop=false,viUrl='',koUrl='',unlocked=false,token=0;
const $=id=>document.getElementById(id);
const engine=()=>$('engine');
let audioCtx=null,gainNode=null,mediaSource=null,engineKind='vi';
const VOL_KEY='master_reader_volume_'+String(project.githubSlug||project.title||'reader').replace(/[^A-Za-z0-9._-]+/g,'_');

function esc2(s){return String(s||'').replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]})}
function fmt(t){t=Number(t||0);let h=Math.floor(t/3600),m=Math.floor((t%3600)/60),s=Math.floor(t%60),ms=Math.round((t-Math.floor(t))*1000);if(ms>=1000){s++;ms-=1000}return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+','+String(ms).padStart(3,'0')}
function rangeLabel(arr){if(!arr||!arr.length)return '';let a=arr[0],b=arr[arr.length-1];return fmt(a.start)+' → '+fmt(b.end)+(arr.length>1?' x'+arr.length:'')}
function hasRange(k,b){let arr=k==='vi'?b.viRanges:b.koRanges;return !!(arr&&arr.length)}
function folderPath(){let f=String(project.audioFolder||'audio').trim();while(f.endsWith('/'))f=f.slice(0,-1);return f||'audio'}
function pathFor(k){let folder=folderPath();let file=k==='vi'?project.viAudioFile:project.koAudioFile;if(!file)return '';if(file.startsWith('http://')||file.startsWith('https://'))return file;if(folder==='.'||folder==='')return './'+file;if(folder.startsWith('../')||folder.startsWith('./'))return folder+'/'+file;return './'+folder+'/'+file}
function clampVol(v){v=Number(v);if(!Number.isFinite(v))v=100;return Math.max(0,Math.min(200,v))}
function loadVolSettings(){try{return JSON.parse(localStorage.getItem(VOL_KEY)||'{}')||{}}catch(e){return {}}}
function saveVolSettings(){try{localStorage.setItem(VOL_KEY,JSON.stringify({vi:clampVol($('viVol')?.value||100),ko:clampVol($('koVol')?.value||100)}))}catch(e){}}
function volValue(k){return clampVol($(k+'Vol')?.value||100)}
function ensureGain(){
  try{
    const a=engine();
    if(!audioCtx)audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    if(!mediaSource){
      mediaSource=audioCtx.createMediaElementSource(a);
      gainNode=audioCtx.createGain();
      mediaSource.connect(gainNode);
      gainNode.connect(audioCtx.destination);
    }
    if(audioCtx.state==='suspended')audioCtx.resume().catch(()=>{});
    return true;
  }catch(e){return false}
}
function applyVisibleVolume(k){
  const v=volValue(k), label=$(k+'VolLabel');
  if(label)label.textContent=Math.round(v)+'%';
}
function applyEngineVolume(k){
  engineKind=k||engineKind||'vi';
  const v=volValue(engineKind), a=engine();
  const ok=ensureGain();
  if(ok&&gainNode){a.volume=1;gainNode.gain.value=v/100}
  else a.volume=Math.min(1,v/100);
  applyVisibleVolume(engineKind);
}
function setReaderVolume(k,v,persist=true){
  const slider=$(k+'Vol');
  if(slider)slider.value=String(clampVol(v));
  applyVisibleVolume(k);
  if(engineKind===k)applyEngineVolume(k);
  if(persist)saveVolSettings();
}
function initReaderVolumeControls(){
  const saved=loadVolSettings();
  ['vi','ko'].forEach(k=>{
    const slider=$(k+'Vol');
    const val=clampVol(saved[k]??100);
    if(slider){
      slider.value=String(val);
      slider.oninput=()=>setReaderVolume(k,slider.value,true);
      slider.onchange=()=>setReaderVolume(k,slider.value,true);
    }
    setReaderVolume(k,val,false);
  });
}
function loadPaths(){viUrl=pathFor('vi');koUrl=pathFor('ko');applyVisibleVolume('vi');applyVisibleVolume('ko');$('audioInfo').textContent='Paths: '+viUrl+' | '+koUrl}
function showAudioPaths(){alert('VI: '+viUrl+'\nKO: '+koUrl+'\n\nNếu đặt reader trong thư mục subtitle-master, audio folder thường là ../audio.')}
function loadLocal(k,f){if(!f)return;if(k==='vi')viUrl=URL.createObjectURL(f);else koUrl=URL.createObjectURL(f);applyVisibleVolume(k);$('audioInfo').textContent='Loaded local '+k+': '+f.name}
function toggleAudio(){const p=$('audioPanel');p.style.display=p.style.display==='block'?'none':'block'}

function badgeHtml(b){
  const vi=hasRange('vi',b)?'<span class="badge vi timingBadge">VI '+rangeLabel(b.viRanges)+'</span>':'<span class="badge no">No VI</span>';
  const ko=hasRange('ko',b)?'<span class="badge vi timingBadge">KO '+rangeLabel(b.koRanges)+'</span>':'<span class="badge no">No KO</span>';
  const type=b.kind==='narration'?'<span class="badge narr">Narration</span>':'<span class="badge">Cue</span>';
  return '<div class="badges">'+type+vi+ko+'</div>';
}
function render(){
  const q=($('q').value||'').toLowerCase();
  let h='';
  project.blocks.forEach(function(b,i){
    const hay=[b.vi,b.ko,b.en,b.text,b.displayNo,b.sourceNo].join(' ').toLowerCase();
    if(q&&!hay.includes(q))return;
    const title=(b.kind==='narration'?'Narration #':'Cue #')+(b.displayNo||b.sourceNo||i+1);
    h+='<div class="item '+(b.kind==='narration'?'narr':'')+' '+(i===idx?'active':'')+'" onclick="idx='+i+';render()">';
    h+='<div class="meta"><span>'+esc2(title)+'</span><span>'+(i===idx?'SELECTED':'')+'</span></div>';
    h+=badgeHtml(b);
    h+='<div class="txt">'+(b.vi?'<div>'+esc2(b.vi)+'</div>':'')+(b.ko?'<div class="ko">'+esc2(b.ko)+'</div>':'')+(b.en?'<div class="en">'+esc2(b.en)+'</div>':'')+'</div>';
    h+='<div class="row" style="margin-top:8px"><button onclick="event.stopPropagation();idx='+i+';readKoCurrent()">Read KO</button><button class="good" onclick="event.stopPropagation();idx='+i+';playCurrent(\'vi\')">VI Dub</button><button class="violet" onclick="event.stopPropagation();idx='+i+';playCurrent(\'ko\')">KO Live</button><button class="warn" onclick="event.stopPropagation();idx='+i+';playCueMode()">VI→VI→KO→KO</button></div>';
    h+='</div>';
  });
  $('list').innerHTML=h||'<div class="item">Không có cue phù hợp.</div>';
  const viCount=project.blocks.filter(b=>hasRange('vi',b)).length, koCount=project.blocks.filter(b=>hasRange('ko',b)).length;
  $('stat').textContent=project.blocks.length+' blocks · VI '+viCount+' · KO '+koCount+' · current '+(idx+1);
}
function cur(){return project.blocks[idx]||{}}
function prev(){idx=Math.max(0,idx-1);render();scrollActive()}
function next(){idx=Math.min(project.blocks.length-1,idx+1);render();scrollActive()}
function scrollActive(){document.querySelector('.item.active')?.scrollIntoView({block:'center',behavior:'smooth'})}
function stopAll(){stop=true;token++;engine().pause();try{speechSynthesis.cancel()}catch(e){}}

function wait(ms){return new Promise(r=>setTimeout(r,ms))}
function waitMedia(a,timeout){timeout=timeout||6000;return new Promise(res=>{if(a.readyState>=1)return res(true);let done=false;function ok(){if(done)return;done=true;clean();res(true)}function bad(){if(done)return;done=true;clean();res(false)}function clean(){a.removeEventListener('loadedmetadata',ok);a.removeEventListener('canplay',ok);a.removeEventListener('error',bad);clearTimeout(to)}a.addEventListener('loadedmetadata',ok,{once:true});a.addEventListener('canplay',ok,{once:true});a.addEventListener('error',bad,{once:true});let to=setTimeout(bad,timeout)})}
async function unlockAudio(){try{let a=engine();let src=viUrl||koUrl||pathFor('vi')||pathFor('ko');if(!src){alert('Chưa có audio path.');return false}if(a.src!==new URL(src,location.href).href){a.src=src;a.load();await waitMedia(a,5000)}let vol=a.volume;a.volume=0.001;await a.play();a.pause();a.volume=vol||1;applyEngineVolume(engineKind||'vi');unlocked=true;$('audioInfo').textContent+=' | unlocked';return true}catch(e){alert('iPhone chưa cho unlock audio. Bấm lại Unlock iPhone Audio. '+(e.message||e));return false}}
function playRange(src,r,myToken,k){
  return new Promise(async res=>{
    if(!src||!r){res(false);return}
    const a=engine();stop=false;
    try{
      const abs=new URL(src,location.href).href;
      if(a.src!==abs){a.pause();a.src=src;a.load();await waitMedia(a,7000)}
      applyEngineVolume(k||'vi');
      a.currentTime=Math.max(0,Number(r.start)||0);
      const end=Math.max(Number(r.end)||0,(Number(r.start)||0)+.2);
      function finish(ok){a.removeEventListener('timeupdate',tick);a.removeEventListener('ended',ended);a.removeEventListener('error',err);res(ok)}
      function tick(){if(stop||myToken!==token){a.pause();finish(false);return}if(a.currentTime>=end-0.03){a.pause();finish(true)}}
      function ended(){finish(true)} function err(){finish(false)}
      a.addEventListener('timeupdate',tick);a.addEventListener('ended',ended,{once:true});a.addEventListener('error',err,{once:true});
      await a.play();
    }catch(e){$('audioInfo').textContent='Không phát được audio: '+(e.message||e)+' | '+src;res(false)}
  })
}
async function playAudioKind(k,myToken){
  const b=cur();const ranges=k==='vi'?b.viRanges:b.koRanges;const src=k==='vi'?viUrl:koUrl;
  if(!ranges||!ranges.length)return false;
  let any=false;
  for(const r of ranges){if(stop||myToken!==token)break;let ok=await playRange(src,r,myToken,k);any=any||ok}
  return any;
}
async function playCurrent(k){const my=++token;stop=false;const ok=await playAudioKind(k,my);if(!ok)await readKoCurrent()}

function getBestVoice(lang){
  try{
    const voices=speechSynthesis.getVoices()||[];
    const prefix=String(lang||'').slice(0,2).toLowerCase();
    const scored=voices.map(v=>{
      const hay=((v.lang||'')+' '+(v.name||'')).toLowerCase();
      let score=0;
      if((v.lang||'').toLowerCase().startsWith(prefix))score+=100;
      if(lang==='ko-KR' && /ko|korean|한국|yuna|siri|google|microsoft|samsung|premium|enhanced/.test(hay))score+=60;
      if(lang==='vi-VN' && /vi|vietnam|tiếng việt|vietnamese|google|microsoft|premium|enhanced/.test(hay))score+=60;
      if(v.localService)score+=5;
      return {v,score};
    }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score);
    return scored[0]?.v||null;
  }catch(e){return null}
}
function readTts(text,lang,myToken,rate){
  return new Promise(res=>{
    text=String(text||'').trim();
    if(!text){res(false);return}
    try{
      speechSynthesis.cancel();
      const u=new SpeechSynthesisUtterance(text.slice(0,1200));
      u.lang=lang;
      u.rate=rate||1;
      u.pitch=1;
      const v=getBestVoice(lang); if(v)u.voice=v;
      let done=false;
      function finish(ok){if(done)return;done=true;res(ok)}
      u.onend=()=>finish(true);u.onerror=()=>finish(false);
      speechSynthesis.speak(u);
      setTimeout(()=>{if(myToken!==token){speechSynthesis.cancel();finish(false)}},50);
    }catch(e){res(false)}
  })
}
function readKo(text,myToken){return readTts(text,'ko-KR',myToken,0.88)}
function readVi(text,myToken){return readTts(text,'vi-VN',myToken,0.95)}
function readKoCurrent(){const my=++token;stop=false;return readKo(cur().ko||cur().text||'',my)}
function readViCurrent(){const my=++token;stop=false;return readVi(cur().vi||'',my)}
if('speechSynthesis' in window){speechSynthesis.onvoiceschanged=()=>{try{speechSynthesis.getVoices()}catch(e){}}}

async function playByModeForCurrent(mode,my){
  const b=cur();
  const hasVi=hasRange('vi',b), hasKo=hasRange('ko',b);
  if(mode==='vi-readvi-readko-ko'){
    if(hasVi) await playAudioKind('vi',my); else await readVi(b.vi||'',my);
    if(stop||my!==token)return;
    await readKo(b.ko||b.text||'',my);
    if(stop||my!==token)return;
    if(hasKo) await playAudioKind('ko',my);
  }else if(mode==='vi-readko-ko'){
    if(hasVi) await playAudioKind('vi',my);
    if(stop||my!==token)return;
    await readKo(b.ko||b.text||'',my);
    if(stop||my!==token)return;
    if(hasKo) await playAudioKind('ko',my);
  }else if(mode==='vi-ko'){
    if(hasVi)await playAudioKind('vi',my);
    if(stop||my!==token)return;
    if(hasKo)await playAudioKind('ko',my);
    else if(!hasVi)await readKo(b.ko||b.text||'',my);
  }else if(mode==='vi'){
    const ok=await playAudioKind('vi',my);
    if(!ok)await readVi(b.vi||'',my);
  }else if(mode==='ko'){
    const ok=await playAudioKind('ko',my);
    if(!ok)await readKo(b.ko||b.text||'',my);
  }else if(mode==='readko'){
    await readKo(b.ko||b.text||'',my);
  }
}
async function playCueMode(){
  const my=++token;stop=false;
  await playByModeForCurrent($('mode').value,my);
}
async function smart(){
  stop=false;const my=++token;
  const mode=$('mode').value;
  if((mode==='vi-readko-ko'||mode==='vi-readvi-readko-ko')&&!unlocked&&/iPad|iPhone|iPod/.test(navigator.userAgent)){await unlockAudio()}
  for(;idx<project.blocks.length&&my===token&&!stop;idx++){
    render();scrollActive();
    await playByModeForCurrent(mode,my);
    if(stop||my!==token)break;
  }
}
initReaderVolumeControls();loadPaths();render();
